name: leech
help: LEECH - agent orchestration system
version: "1.0"
environment_variables:
  - name: LEECH_NIXOS_DIR
    help: "Raiz do repo NixOS (default $HOME/nixos)"
  - name: OBSIDIAN_PATH
    help: "Caminho do vault Obsidian (default $HOME/.ovault/Work)"

flags:
  - long: --engine
    arg: engine
    help: "Engine da sessão/worker: opencode | claude | cursor (obrigatório em run se não estiver em ~/.leech)"
  - long: --model
    arg: model
    help: "Modelo Claude: haiku | opus (default: sonnet)"
  - long: --haiku
    help: "Shortcut: --model haiku"
  - long: --opus
    help: "Shortcut: --model opus"
  - long: --sonnet
    help: "Shortcut: --model sonnet"
  - long: --instance
    arg: id
    help: "Sufixo da instância (ex. 2 = leech-projeto-2)"
  - long: --rw
    help: Montar projeto em read-write (default para run)
  - long: --ro
    help: Montar projeto read-only
  - long: --danger
    help: "Bypass de permissões no engine (claude: --permission-mode bypassPermissions; cursor: --force; opencode: env auto-approve)"
  - long: --init-md
    arg: file
    default: contexto.md
    help: "Arquivo markdown inicial carregado por todos os engines (default: contexto.md no projeto). Claude: --append-system-prompt-file; Cursor: prompt com @file; OpenCode: env."
  - long: --resume
    arg: session_id
    help: "Retoma sessão: cursor/agent usa --resume=UUID; claude usa --resume; opencode: env LEECH_RESUME_SESSION."

  - long: --analysis-mode
    short: -A
    help: "Modo análise: injeta prompt experimental no container (proativo, self-modifying, debug livre sem output pro user)."

  - long: --no-splash
    help: "Desativa o loading screen de inicialização (equivalente a LEECH_SPLASH=0 em ~/.leech)."

  - long: --host
    help: "Monta ~/nixos em /workspace/host (rw) para editar NixOS/Leech. Equivalente a mount_host=true em ~/.leech."

  - long: --ghost
    help: "Ghost in the Shell — sessão isolada em obsidian/ghost/ (monta em /workspace/ghost, injeta GHOST_IN_THE_SHELL=ON)."

commands:
  - name: continue
    alias: [cont]
    help: Continua a última sessão.
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --host
        help: "Monta ~/nixos em /workspace/host (rw)"
    filename: commands/continue.sh

  - name: new
    alias: [open, code]
    default: force
    help: Nova sessão no container. Exige --engine (ou engine= em ~/.leech).
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --engine
        arg: engine
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
      - long: --host
        help: "Monta ~/nixos em /workspace/host (rw)"
      - long: --ghost
        help: "Ghost in the Shell — sessão isolada em obsidian/ghost/"
    examples:
      - leech new --engine=claude
      - leech new --engine=cursor ~/projects
      - leech new --engine=claude --host
    filename: commands/new_session.sh

  - name: shell
    alias: [sh]
    help: Abre bash no container com o projeto montado.
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --host
        help: "Monta ~/nixos em /workspace/host (rw)"
    filename: commands/shell.sh

  - name: resume
    help: Mostra lista de sessões e permite escolher qual retomar.
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --resume
        arg: session_id
        help: "UUID da sessão (opcional; sem isso mostra lista)"
      - long: --host
        help: "Monta ~/nixos em /workspace/host (rw)"
    filename: commands/resume.sh

  # Atalhos de engine (senão `leech cursor` cai no default `new` e interpreta "cursor" como dir)
  - name: cursor
    help: Nova sessão com engine Cursor (atalho para leech new --engine=cursor).
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
      - long: --host
        help: "Monta ~/nixos em /workspace/host (rw)"
    filename: commands/engine_cursor.sh

  - name: opencode
    alias: [oc]
    help: Nova sessão com engine OpenCode (atalho para leech new --engine=opencode).
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
      - long: --host
        help: "Monta ~/nixos em /workspace/host (rw)"
    filename: commands/engine_opencode.sh


  # ── Claude usage/token (sem sessão — só ferramentas) ────────
  - name: claude
    help: "Ferramentas Claude: usage, token."
    commands:
      - name: usage
        alias: [u]
        default: force
        help: "Estatísticas de uso Claude (API OAuth / claude.ai)."
        flags:
          - long: --waybar
            help: "Formato Waybar (text, tooltip, class) para o usage bar consumir"
          - long: --json
            help: "JSON bruto da API (five_hour, seven_day, seven_day_sonnet)"
          - long: --no-cache
            help: "Pula cache, busca direto na API"
          - long: --refresh
            help: "Alias de --no-cache"
        filename: commands/claude_usage.sh

      - name: token
        alias: [t]
        help: "Imprime o OAuth access token do Claude (util para curl manual)."
        filename: commands/claude_token.sh

  # ── Container (build / down / destroy) ─────────────────────
  - name: build
    help: Build da imagem Docker do leech (leech).
    flags:
      - long: --danger
        help: "Força rebuild sem cache (--no-cache)"
    filename: commands/build.sh

  - name: down
    help: Para todos os containers do projeto.
    filename: commands/down.sh

  - name: shutdown
    help: "Para containers do compose + mata qualquer stray com nome leech/claude/puppy."
    filename: commands/shutdown.sh


  - name: clean
    alias: [gc, prune]
    help: "Remove sessoes Leech paradas/exited e containers orfaos."
    flags:
      - long: --force
        short: -f
        help: "Remove sem pedir confirmacao"
    filename: commands/clean.sh

  - name: update
    alias: [install]
    help: Regenera CLI (bashly) e instala/atualiza symlink em ~/.local/bin.
    filename: commands/update.sh

  - name: set
    help: "Define engine padrão em ~/.leech (engine= claude | opencode | cursor)."
    args:
      - name: engine
        required: true
        help: "Engine padrão: claude | opencode | cursor"
    filename: commands/set_engine.sh

  # ── Docker (servicos estrategia) ──────────────────────────
  # servico: monolito | bo-container | front-student | monolito-worker
  # aliases:  mono    | bo           | front/fs      |
  - name: runner
    alias: [dk]
    help: "Gerencia servicos. Ex: leech runner monolito start | leech runner monolito logs"
    args:
      - name: service
        required: true
        help: "monolito | bo-container | front-student | monolito-worker (aliases: mono, bo, front, mw)"
      - name: action
        default: "start"
        allowed: [start, start-hotreload, stop, logs, test, shell, install, build, flush]
        help: "Acao (default: start)"
    flags:
      - long: --env
        short: -e
        arg: env
        default: "sand"
        help: "Ambiente (sand, prod, local)"
      - long: --debug
        help: "Modo debug (dlv)"
      - long: --tail
        short: -t
        arg: lines
        default: "100"
        help: "Linhas de log (para action=logs)"
      - long: --worktree
        arg: worktree
        help: "Worktree alternativo"
      - long: --vertical
        short: -V
        arg: vertical
        default: "carreiras-juridicas"
        help: "Vertical front-student"
      - long: --container
        short: -c
        arg: container
        default: "app"
        help: "Container para shell (app, worker, postgres, redis)"
      - long: --cmd
        arg: cmd
        help: "Comando a executar (para test/shell)"
    filename: commands/runner.sh

  # ── Worktree (atalho interativo) ──────────────────────────
  - name: hooks
    alias: [hook]
    help: "Executa um hook do Claude Code e mostra o que seria injetado."
    args:
      - name: hook
        help: "Nome do hook (ex: session-start, pre-tool-use, user-prompt-submit)"
        required: true
      - name: env_overrides
        help: "Variaveis de ambiente KEY=VALUE para override (ex: DEBUG=ON PERSONALITY=OFF)"
        repeatable: true
    flags:
      - long: --list
        short: -l
        help: "Lista hooks disponiveis"
    filename: commands/hooks.sh


  - name: tick
    alias: [auto]
    help: "Executa todos os agents e tasks vencidos (leech-tick.service)."
    flags:
      - long: --dry-run
        short: -n
        help: "Preview sem executar"
      - long: --steps
        short: -s
        arg: steps
        help: "Override #stepsN"
    filename: commands/auto.sh

  - name: tasker
    alias: [tk]
    help: "Lanca o agente Tasker para processar tasks atrasadas agora."
    flags:
      - long: --steps
        short: -s
        arg: steps
        help: "Numero de turnos (default: lido do agent.md)"
    filename: commands/tasker.sh

  - name: run
    alias: [r]
    help: "Roda um agente ou task imediatamente."
    args:
      - name: name
        required: true
        help: "Nome do agente ou task"
    flags:
      - long: --steps
        short: -s
        arg: steps
        help: "Numero de turnos"
    filename: commands/run.sh

  - name: agents
    alias: [ag, a, agent]
    help: "Gerencia agentes background."
    commands:
      - name: list
        alias: [ls]
        default: force
        help: "Lista todos os agentes e status."
        filename: commands/agents_list.sh

      - name: phone
        alias: [p, call]
        help: "Abre uma conversa com um agente. Sem nome: lista disponiveis."
        args:
          - name: name
            help: "Nome do agente (ex: wanderer, tamagochi, mechanic)"
        filename: commands/agents_phone.sh

      - name: status
        alias: [st, log]
        help: "Activity log: fila (running/scheduled) + historico de execucoes."
        args:
          - name: agent
            help: "Filtrar por agent (ex: coruja, hermes). Sem arg: todos."
        flags:
          - long: --tail
            short: -n
            arg: lines
            help: "Ultimas N entradas (default: 30)"
            default: "30"
          - long: --schedule
            short: -s
            help: "Mostrar view de _running/_schedule ao inves do activity log"
        filename: commands/agents_log.sh

  - name: tasks
    alias: [t]
    help: "Tasks do kanban (status, log)."
    commands:
      - name: log
        default: force
        help: "Kanban view: TODO/DOING/DONE recentes."
        filename: commands/tasks_log.sh

      - name: status
        alias: [st, dash]
        help: "Dashboard live de tasks + agents (kanban + activity + schedule)."
        flags:
          - long: --tick
            short: -t
            arg: seconds
            help: "Intervalo de refresh em segundos (default: 5)"
            default: "5"
        filename: commands/tasks_status.sh


  - name: status
    alias: [st]
    help: "Status agregado: sessoes e docker services. Atualiza a cada 30s por padrao."
    flags:
      - long: --tick
        short: -t
        arg: seconds
        default: "5"
        help: "Intervalo de atualizacao em segundos (padrao 5)"
    filename: commands/status.sh

  # ── Host operations (stow / os) ───────────────────────────
  - name: stow
    help: "Deploy dotfiles no host via GNU stow (restow, delete, status)."
    args:
      - name: action
        default: restow
        help: "Ação: restow (default), delete, status"
    flags:
      - long: --reload
        short: -r
        help: "Após deploy, recarrega Hyprland (hyprctl reload) e Waybar (SIGUSR2)"
    filename: commands/stow_command.sh

  - name: os
    help: "Aplica configuração NixOS no host via nh os."
    commands:
      - name: switch
        alias: [sw]
        help: "nh os switch (aplica imediatamente)"
        filename: commands/os_switch.sh
      - name: test
        alias: [t]
        help: "nh os test (aplica sem tornar default)"
        filename: commands/os_test.sh
      - name: boot
        alias: [b]
        help: "nh os boot (aplica no próximo boot)"
        filename: commands/os_boot.sh
      - name: build
        help: "nh os build (só compila, não aplica)"
        filename: commands/os_build.sh
      - name: update
        alias: [u]
        help: "nix flake update (atualiza inputs do flake)"
        filename: commands/os_update.sh
        args:
          - name: input
            help: "Input específico a atualizar (ex: nixpkgs). Sem arg: atualiza tudo."

  - name: leech
    alias: [l]
    help: "Engatou numa pasta — sessão efêmera (auto-detecta nixos → monta logs)."
    args:
      - name: dir
        help: "Pasta a engatou (default: ~/projects). nixos repo detectado automaticamente."
    flags:
      - long: --shell
        short: -s
        help: "Bash interativo em vez de engine AI"
      - long: --engine
        arg: engine
        help: "Engine: opencode | claude | cursor (default: ~/.leech)"
      - long: --model
        arg: model
        help: "Modelo Claude: haiku | sonnet | opus"
      - long: --resume
        arg: session_id
        help: "Retoma sessão (UUID)"
      - long: --danger
        help: "Bypass de permissões"
      - long: --ro
        help: "Montar read-only"
      - long: --rw
        help: "Montar read-write (default)"
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --host
        help: "Monta ~/nixos em /workspace/host (rw)"
    filename: commands/leech.sh

  - name: inbox
    alias: [ib]
    help: "Lista os arquivos do inbox."
    filename: commands/inbox.sh

  - name: outbox
    alias: [ob]
    help: "Lista os arquivos do outbox."
    filename: commands/outbox.sh

  - name: help
    help: Mostra o banner com comandos principais.
    filename: commands/help.sh

  - name: man
    help: Documentacao completa de todos os comandos e flags.
    filename: commands/man.sh

  - name: relay
    help: "Chrome Relay — inicia Chrome no host com CDP para o agent conectar."
    args:
      - name: action
        help: "Acao: start (default), stop, status"
        allowed: [start, stop, status]
        default: start
    filename: commands/relay.sh

  - name: caffeine
    help: "Mantem o computador acordado para acesso remoto (bloqueia sleep/idle/lid)."
    args:
      - name: action
        help: "Acao: start (default), stop, status, poweroff"
        allowed: [start, stop, status, poweroff]
        default: start
    filename: commands/caffeine.sh

  - name: uninstall
    help: "Remove o symlink do leech de ~/.local/bin (desinstala do PATH)."
    filename: commands/uninstall.sh
