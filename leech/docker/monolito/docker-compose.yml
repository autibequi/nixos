services:
  app:
    build:
      context: ${MONOLITO_DIR}
      dockerfile: ${LEECH_NIXOS_DIR}/leech/docker/monolito/Dockerfile
    container_name: leech-dk-monolito-app
    cpus: "14.4"
    env_file:
      - ${MONOLITO_DIR}/.env.${APP_ENV_FILE:-sandbox}
      - ./env/${APP_ENV:-sand}.env
    environment:
      - DOCKER_HOST=unix:///var/run/docker.sock
      - TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE=/var/run/docker.sock
    volumes:
      - ${MONOLITO_DIR}/configuration:/go/app/configuration:ro
      - /var/run/docker.sock:/var/run/docker.sock
      # Canal de comunicação rápida host ↔ container
      - ${HOME}/.leech:/.leech:rw
    ports:
      - "4004:4004"
      - "2345:2345"
    networks:
      default:
        aliases:
          - api.local.estrategia-sandbox.com.br
    restart: unless-stopped

networks:
  default:
    name: nixos_default
    external: true
