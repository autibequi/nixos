x-env-base: &env-base
  PATH: /home/claude/.local/bin:/home/claude/.nix-profile/bin:/home/claude/.local/bin:/usr/bin:/bin
  CLAUDE_ENV: container
  XDG_CACHE_HOME: /workspace/.ephemeral/cache
  DOCKER_HOST: tcp://localhost:2375
  WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-1}
  XDG_RUNTIME_DIR: /run/user/1000
  PULSE_SERVER: unix:/run/user/1000/pulse/native
  EDITOR: vim
  VISUAL: vim
  DISABLE_AUTOUPDATER: false
  LEECH_NIXOS_DIR: ${HOME}/nixos
  HOST_HOME: ${HOME}
  HOST_PROJECTS_DIR: ${HOME}/projects
  HOST_NIXOS_DIR: ${HOME}/nixos

x-extra-hosts: &extra-hosts
  - "host.docker.internal:host-gateway"

# Ghost mode: igual ao leech normal mas SEM /workspace/self (source code oculto do agente).
x-base-volumes: &base-volumes
  - ${OBSIDIAN_PATH:-${HOME}/.ovault/Work}:/workspace/obsidian
  - ${CLAUDIO_MOUNT:-${HOME}/nixos}:/workspace/mnt:${CLAUDIO_MOUNT_OPTS:-rw}
  - ${HOME}/.claude:/home/claude/.claude
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/claude.bypass.json:/home/claude/.claude/settings.json:rw
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/skills:/home/claude/.claude/skills
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/commands:/home/claude/.claude/commands
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/agents:/home/claude/.claude/agents
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/hooks:/home/claude/.claude/hooks:ro
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/scripts:/home/claude/.claude/scripts
  - ${HOME}/.claude.json:/home/claude/.claude.json
  - ${HOME}/.cursor:/home/claude/.cursor
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/hooks/cursor:/home/claude/.cursor/leech-hooks:ro
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/hooks/cursor/hooks.json:/home/claude/.cursor/hooks.json:ro
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/skills:/home/claude/.cursor/skills
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/commands:/home/claude/.cursor/commands
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/commands:/home/claude/.cursor/rules
  - cursor_config:/home/claude/.config/cursor
  - ${LEECH_ROOT:-${HOME}/nixos/leech/self}/.opencode:/home/claude/.config/opencode
  - ${HOME}/projects:/home/claude/projects
  - ${XDG_RUNTIME_DIR:-/run/user/1000}/${WAYLAND_DISPLAY:-wayland-1}:/run/user/1000/${WAYLAND_DISPLAY:-wayland-1}
  - ${XDG_RUNTIME_DIR:-/run/user/1000}/pulse:/run/user/1000/pulse
  - /proc/meminfo:/host/proc/meminfo:ro
  - /proc/loadavg:/host/proc/loadavg:ro
  - /proc/uptime:/host/proc/uptime:ro
  - /proc/cpuinfo:/host/proc/cpuinfo:ro
  - /proc/version:/host/proc/version:ro
  - /run/current-system:/host/run/current-system:ro
  - /etc/os-release:/host/etc/os-release:ro
  - /tmp/leech-hive-mind:/workspace/.hive-mind
  - /var/log/journal:/workspace/logs/host/journal:ro
  - /run/log/journal:/workspace/logs/host/journal-runtime:ro
  - /var/log:/workspace/logs/host/var-log:ro
  - /var/lib/systemd/coredump:/workspace/logs/host/coredump:ro
  - /sys/class/hwmon:/host/sys/class/hwmon:ro
  - /sys/class/thermal:/host/sys/class/thermal:ro
  - /sys/class/net:/host/sys/class/net:ro
  - /sys/block:/host/sys/block:ro
  - ${XDG_DATA_HOME:-${HOME}/.local/share}/leech/logs/dockerized:/workspace/logs/docker:ro
  - ${HOME}/.local/share/leech/containers:/workspace/dockerized
  - ${XDG_DATA_HOME:-${HOME}/.local/share}/leech:/home/claude/.local/share/leech
  - ${HOME}/projects:${HOME}/projects
  - ${HOME}/nixos:${HOME}/nixos:${CLAUDIO_HOST_OPTS:-ro}
  - ${HOME}/nixos:/workspace/host:${CLAUDIO_HOST_OPTS:-ro}
  - ${HOME}/.leech:/home/claude/.leech:rw

services:
  leech:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: leech
    mem_limit: 12g
    memswap_limit: 12g
    network_mode: host
    stdin_open: true
    tty: true
    working_dir: /workspace/mnt
    entrypoint: ["/entrypoint.sh"]
    command: ["/bin/bash", "-c", "sleep infinity"]
    group_add:
      - "${JOURNAL_GID:-62}"
    cap_drop:
      - NET_RAW
      - SYS_PTRACE
      - SYS_RAWIO
      - MKNOD
      - AUDIT_WRITE
      - NET_BIND_SERVICE
    environment:
      <<: *env-base
      GIT_AUTHOR_NAME: Pedrinho
      GIT_AUTHOR_EMAIL: pedro.correa@estrategia.com
      GIT_COMMITTER_NAME: Zion
      GIT_COMMITTER_EMAIL: zion@autibequi.com
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    tmpfs:
      - /tmp:size=512m,mode=1777
    extra_hosts: *extra-hosts
    volumes: *base-volumes

volumes:
  cursor_config:

networks:
  default:
    name: nixos_default
    external: true
