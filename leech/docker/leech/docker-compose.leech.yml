x-env-base: &env-base
  # Tokens e boot flags vêm de ~/.leech (sourced pelo entrypoint + todos os hooks)
  PATH: /home/claude/.local/bin:/home/claude/.nix-profile/bin:/home/claude/.local/bin:/usr/bin:/bin
  CLAUDE_ENV: container
  # Cache (Bun/OpenCode, etc.) — volume efémero já com chown no entrypoint; evita EACCES em ~/.cache
  XDG_CACHE_HOME: /workspace/.ephemeral/cache
  # Podman user socket (rootless)
  DOCKER_HOST: unix:///run/user/1000/podman/podman.sock
  WAYLAND_DISPLAY: ${WAYLAND_DISPLAY}
  XDG_RUNTIME_DIR: /run/user/1000
  PULSE_SERVER: unix:/run/user/1000/pulse/native
  EDITOR: vim
  VISUAL: vim
  DISABLE_AUTOUPDATER: false
  # Docker autonomy: host paths for container→host translation
  LEECH_NIXOS_DIR: ${HOME}/nixos
  HOST_HOME: ${HOME}
  HOST_PROJECTS_DIR: ${HOME}/projects
  HOST_NIXOS_DIR: ${HOME}/nixos

x-extra-hosts: &extra-hosts
  - "host.docker.internal:host-gateway"

# /workspace: self (leech engine), obsidian (vault), mnt (projeto), host (nixos repo, ro/rw via --host).
x-base-volumes: &base-volumes
  - ${LEECH_ROOT}:/workspace/self
  - ${OBSIDIAN_PATH}:/workspace/obsidian
  - ${CLAUDIO_MOUNT}:/workspace/mnt:${CLAUDIO_MOUNT_OPTS}
  - ${HOME}/.claude:/home/claude/.claude
  # bypass: settings.json padrão para containers — sobrescreve o do host
  - ${LEECH_ROOT}/claude.bypass.json:/home/claude/.claude/settings.json:rw
  # leech/skills e leech/commands sobrescrevem o ~/.claude do host
  - ${LEECH_ROOT}/skills:/home/claude/.claude/skills
  - ${LEECH_ROOT}/commands:/home/claude/.claude/commands
  - ${LEECH_ROOT}/agents:/home/claude/.claude/agents
  # Hooks: leech/hooks → Claude; leech/hooks/cursor → ~/.cursor/leech-hooks
  - ${LEECH_ROOT}/hooks:/home/claude/.claude/hooks:ro
  - ${LEECH_ROOT}/scripts:/home/claude/.claude/scripts
  - ${HOME}/.claude.json:/home/claude/.claude.json
  # Cursor: credenciais do host + skills/commands/rules do leech
  - ${HOME}/.cursor:/home/claude/.cursor
  # Cursor: só subpasta hooks/cursor (cursor-hook + hooks.json) → leech-hooks
  - ${LEECH_ROOT}/hooks/cursor:/home/claude/.cursor/leech-hooks:ro
  - ${LEECH_ROOT}/hooks/cursor/hooks.json:/home/claude/.cursor/hooks.json:ro
  # Mesma árvore que ~/.claude/skills — montagem total em ~/.cursor/skills (substitui o dir no container)
  - ${LEECH_ROOT}/skills:/home/claude/.cursor/skills
  - ${LEECH_ROOT}/commands:/home/claude/.cursor/commands
  - ${LEECH_ROOT}/commands:/home/claude/.cursor/rules
  # cursor_config: bind mount do host — token do `agent login` persiste entre sessões
  - ${HOME}/.config/cursor:/home/claude/.config/cursor
  # opencode
  - ${LEECH_ROOT}/.opencode:/home/claude/.config/opencode
  - ${HOME}/projects:/home/claude/projects
  - ${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}:/run/user/1000/${WAYLAND_DISPLAY}
  - ${XDG_RUNTIME_DIR}/pulse:/run/user/1000/pulse
  # Tmux compartilhado host ↔ container (leech tmux run/capture)
  # Diretório (não arquivo) evita inode stale ao recriar socket
  - ${XDG_RUNTIME_DIR}/zion-tmux:/run/user/1000/zion-tmux:rw
  # Host /proc e /etc (observabilidade)
  - /proc/meminfo:/host/proc/meminfo:ro
  - /proc/loadavg:/host/proc/loadavg:ro
  - /proc/uptime:/host/proc/uptime:ro
  - /proc/cpuinfo:/host/proc/cpuinfo:ro
  - /proc/version:/host/proc/version:ro
  - /run/current-system:/host/run/current-system:ro
  - /etc/os-release:/host/etc/os-release:ro
  - /tmp/leech-hive-mind:/workspace/.hive-mind
  # Logs do host — observabilidade e debug de sistema
  - /var/log/journal:/workspace/logs/host/journal:ro
  - /run/log/journal:/workspace/logs/host/journal-runtime:ro
  - /var/log:/workspace/logs/host/var-log:ro
  - /var/lib/systemd/coredump:/workspace/logs/host/coredump:ro
  # Hardware/kernel state (sem senhas)
  - /sys/class/hwmon:/host/sys/class/hwmon:ro
  - /sys/class/thermal:/host/sys/class/thermal:ro
  - /sys/class/net:/host/sys/class/net:ro
  - /sys/block:/host/sys/block:ro
  # Logs de servicos Podman (leech podman run/test) — acessiveis pelo agente
  - ${XDG_DATA_HOME}/leech/logs/podmanized:/workspace/logs/podman:ro
  # Podman socket (rootless user socket)
  - /run/user/1000/podman/podman.sock:/run/user/1000/podman/podman.sock
  # Podmanized configs — agente pode editar podman-compose, .env, etc.
  - ${HOME}/.local/share/leech/containers:/workspace/podmanized
  # Dados locais do Leech (usage cache, estado compartilhado host↔container)
  - ${XDG_DATA_HOME}/leech:/home/claude/.local/share/leech
  # Mirror mounts: host paths acessiveis dentro do container (Docker build context + daemon volumes)
  - ${HOME}/projects:${HOME}/projects
  - ${HOME}/nixos:${HOME}/nixos:${CLAUDIO_HOST_OPTS}
  # Lab mode: nixos repo editavel em /workspace/host (rw apenas quando CLAUDIO_HOST_OPTS=rw)
  - ${HOME}/nixos:/workspace/host:${CLAUDIO_HOST_OPTS}
  # NÃO montar volume em /nix: volume vazio substitui o store da imagem → /bin/bash quebra
  # (symlink para /nix/store) e o kernel acusa "exec /entrypoint.sh: no such file or directory".
  # Canal de comunicação rápida host ↔ agente
  - ${HOME}/.leech:/home/claude/.leech:rw

services:
  leech:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: leech
    mem_limit: 12g
    memswap_limit: 12g
    network_mode: host
    stdin_open: true
    tty: true
    working_dir: /workspace/mnt
    entrypoint: ["/entrypoint.sh"]
    command: ["/bin/bash", "-c", "sleep infinity"]
    # docker-proxy roda como container standalone — sem depends_on (evita conflito entre projetos compose)
    group_add:
      - "${JOURNAL_GID:-62}"
    cap_drop:
      - NET_RAW
      - SYS_PTRACE
      - SYS_RAWIO
      - MKNOD
      - AUDIT_WRITE
      - NET_BIND_SERVICE
    environment:
      <<: *env-base
      # Host: exporte LEECH_CONTAINER_UID/GID ou use o CLI leech (define via id -u / id -g).
      LEECH_CONTAINER_UID: ${LEECH_CONTAINER_UID:-1000}
      LEECH_CONTAINER_GID: ${LEECH_CONTAINER_GID:-1000}
      GIT_AUTHOR_NAME: Pedrinho
      GIT_AUTHOR_EMAIL: pedro.correa@estrategia.com
      GIT_COMMITTER_NAME: Zion
      GIT_COMMITTER_EMAIL: zion@autibequi.com
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    tmpfs:
      - /tmp:size=4g,mode=1777
    extra_hosts: *extra-hosts
    volumes: *base-volumes

networks:
  default:
    name: nixos_default
    external: true
