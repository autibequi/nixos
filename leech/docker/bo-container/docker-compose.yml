services:
  app:
    build:
      context: ${BO_CONTAINER_DIR}
      dockerfile: ${LEECH_NIXOS_DIR}/leech/docker/bo-container/Dockerfile
    container_name: leech-dk-bo-container-app
    cpus: "14.4"
    mem_limit: 4g
    memswap_limit: 4g
    env_file:
      - ./env/${APP_ENV_FILE:-sandbox}.env
    environment:
      - FORCE_COLOR=1
      - TERM=xterm-256color
    tty: true
    volumes:
      # Bind mount completo: source + node_modules (gerado por leech docker install)
      - ${BO_CONTAINER_DIR}:/app
      # Canal de comunicação rápida host ↔ container
      - ${HOME}/.leech:/.leech:rw
    ports:
      - "9090:9090"
    networks:
      - default
    restart: unless-stopped

networks:
  default:
    name: nixos_default
    external: true
