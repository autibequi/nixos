<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Holodeck — Mermaid</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: #1e1e2e;
    font-family: 'JetBrains Mono', monospace;
  }
  #wrap {
    width: 100vw; height: 100vh;
    display: flex; align-items: flex-start; justify-content: center;
    overflow: hidden; position: relative;
    cursor: grab; touch-action: none; user-select: none;
  }
  #wrap.panning { cursor: grabbing; }
  #diagram { transform-origin: 0 0; position: absolute; top: 0; left: 0; }

  /* hint */
  #hint {
    position: fixed; bottom: 14px; right: 16px;
    color: #45475a; font: 11px 'JetBrains Mono', monospace;
    pointer-events: none; letter-spacing: 0.03em;
  }

  /* legend */
  #legend {
    position: fixed; bottom: 44px; right: 20px;
    background: rgba(24,24,37,0.92);
    border: 1px solid #313244; border-radius: 8px;
    padding: 10px 14px;
    font: 11px 'JetBrains Mono', monospace;
    color: #a6adc8; z-index: 100;
    backdrop-filter: blur(6px);
    line-height: 1.9; min-width: 220px;
  }
  #legend .leg-title {
    color: #585b70; font-size: 10px; margin-bottom: 4px;
    letter-spacing: 0.06em; text-transform: uppercase;
  }
  #legend .leg-row { display: flex; align-items: center; gap: 8px; pointer-events: none; }
  #legend .leg-dot { display: inline-block; width: 14px; text-align: center; }
  #legend .leg-sep { border: none; border-top: 1px solid #313244; margin: 6px 0; }
  #btn-raw {
    width: 100%; margin-top: 2px;
    background: #313244; border: none; border-radius: 4px;
    color: #cdd6f4; font: 11px 'JetBrains Mono', monospace;
    padding: 4px 8px; cursor: pointer; text-align: left;
    transition: background 0.15s;
  }
  #btn-raw:hover { background: #45475a; }

  /* raw modal */
  #raw-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(17,17,27,0.88);
    backdrop-filter: blur(4px);
    z-index: 200; align-items: center; justify-content: center;
  }
  #raw-modal.open { display: flex; }
  #raw-box {
    background: #181825; border: 1px solid #313244; border-radius: 10px;
    width: min(860px, 90vw); max-height: 80vh;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.6);
  }
  #raw-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 16px; border-bottom: 1px solid #313244;
    color: #585b70; font: 11px 'JetBrains Mono', monospace;
  }
  #raw-header span { color: #cba6f7; font-weight: bold; }
  #btn-close {
    background: none; border: none; color: #585b70;
    font-size: 16px; cursor: pointer; padding: 0 4px; line-height: 1;
  }
  #btn-close:hover { color: #cdd6f4; }
  #raw-code {
    overflow: auto; padding: 16px;
    font: 12px/1.6 'JetBrains Mono', monospace;
    color: #cdd6f4; white-space: pre; flex: 1;
  }
</style>
</head>
<body>

<div id="wrap">
  <div id="diagram" class="mermaid">
MERMAID_DIAGRAM_HERE
  </div>
</div>

<div id="hint">scroll = zoom &nbsp;&middot;&nbsp; drag = pan</div>

<div id="legend">
  <div class="leg-title">Legenda</div>
LEGEND_ITEMS_HERE
  <hr class="leg-sep">
  <button id="btn-raw" onclick="document.getElementById('raw-modal').classList.add('open')">
    ver código Mermaid
  </button>
</div>

<div id="raw-modal">
  <div id="raw-box">
    <div id="raw-header">
      <span>mermaid</span>
      <span style="flex:1;padding:0 12px;color:#585b70">RAW_DIAGRAM_TITLE</span>
      <button id="btn-close" onclick="document.getElementById('raw-modal').classList.remove('open')">&#x2715;</button>
    </div>
    <div id="raw-code"></div>
  </div>
</div>

<script>window.RAW_MERMAID = "RAW_MERMAID_SOURCE";</script>
<script>
mermaid.initialize({ startOnLoad: true, theme: 'dark' });

mermaid.run().then(function() { setTimeout(init, 120); });

document.getElementById('raw-code').textContent = window.RAW_MERMAID || '(sem source)';
document.getElementById('raw-modal').addEventListener('click', function(e) {
  if (e.target === this) this.classList.remove('open');
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('raw-modal').classList.remove('open');
});

function init() {
  var wrap = document.getElementById('wrap');
  var diag = document.getElementById('diagram');
  var svg  = diag && diag.querySelector('svg');
  if (!svg) { setTimeout(init, 150); return; }

  var sw = svg.getBoundingClientRect().width;
  var sh = svg.getBoundingClientRect().height;
  if (sw < 10) { setTimeout(init, 150); return; }

  var s  = Math.min((window.innerWidth / sw) * 0.98, (window.innerHeight / sh) * 0.98);
  var tx = (window.innerWidth  - sw * s) / 2;
  var ty = Math.max((window.innerHeight - sh * s) / 2, 10);

  function put() {
    diag.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + s + ')';
  }
  put();

  wrap.addEventListener('wheel', function(e) {
    e.preventDefault(); e.stopPropagation();
    var rect = wrap.getBoundingClientRect();
    var mx = e.clientX - rect.left;
    var my = e.clientY - rect.top;
    var f  = e.deltaY < 0 ? 1.12 : 0.87;
    var ns = Math.min(Math.max(s * f, 0.05), 20);
    tx = mx - (mx - tx) * (ns / s);
    ty = my - (my - ty) * (ns / s);
    s  = ns;
    put();
  }, { passive: false });

  var dragging = false, ox = 0, oy = 0;
  wrap.addEventListener('pointerdown', function(e) {
    dragging = true; ox = e.clientX - tx; oy = e.clientY - ty;
    wrap.setPointerCapture(e.pointerId);
    wrap.classList.add('panning');
  });
  wrap.addEventListener('pointermove', function(e) {
    if (!dragging) return;
    tx = e.clientX - ox; ty = e.clientY - oy;
    put();
  });
  wrap.addEventListener('pointerup', function()    { dragging = false; wrap.classList.remove('panning'); });
  wrap.addEventListener('pointercancel', function() { dragging = false; wrap.classList.remove('panning'); });
}
</script>
</body>
</html>
