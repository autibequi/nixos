<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>GLaDOS</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#050400; height:100vh; overflow:hidden; cursor:none; }
  #info      { position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
               font:10px 'Courier New',monospace; color:#2a1e00; letter-spacing:0.2em; }
  #step-label{ position:fixed; top:14px; right:18px;
               font:10px 'Courier New',monospace; color:#3a2a00; letter-spacing:0.15em; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="info">SPACE=pause · H S A Z R=emocao manual · F=fullscreen</div>
<div id="step-label">—</div>

<script>
window.SEQUENCE = [
  //  name                  dur      emotion        scale  shX  shY  shHz  twAmp twFreq twFlow glitch  ease
  { name:'observe',         dur:2200, emotion:'neutral',   scale:1.00, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:0,   twistFreq:2, twistFlow:0,   glitch:0,    ease:'linear'  },
  { name:'scan-in',         dur:600,  emotion:'neutral',   scale:1.00, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:2,   twistFreq:4, twistFlow:1.5, glitch:0,    ease:'inout'   },
  { name:'scan-hold',       dur:800,  emotion:'neutral',   scale:1.00, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:2.5, twistFreq:4, twistFlow:1.8, glitch:0.02, ease:'linear'  },
  { name:'scan-out',        dur:500,  emotion:'neutral',   scale:1.00, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:0,   twistFreq:4, twistFlow:0,   glitch:0,    ease:'inout'   },
  { name:'observe-2',       dur:1600, emotion:'neutral',   scale:1.00, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:0,   twistFreq:2, twistFlow:0,   glitch:0,    ease:'linear'  },
  { name:'mock-surprise',   dur:300,  emotion:'surprised', scale:1.60, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:0,   twistFreq:2, twistFlow:0,   glitch:0,    ease:'out'     },
  { name:'mock-hold',       dur:700,  emotion:'surprised', scale:1.60, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:0,   twistFreq:2, twistFlow:0,   glitch:0.01, ease:'linear'  },
  { name:'mock-recover',    dur:400,  emotion:'neutral',   scale:1.00, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:0,   twistFreq:2, twistFlow:0,   glitch:0,    ease:'in'      },
  { name:'observe-3',       dur:1800, emotion:'neutral',   scale:1.00, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:0,   twistFreq:2, twistFlow:0,   glitch:0,    ease:'linear'  },
  { name:'irritation',      dur:700,  emotion:'angry',     scale:1.00, shakeX:1.8, shakeY:0.5, shakeHz:12, twistAmp:1.5, twistFreq:5, twistFlow:2.0, glitch:0.08, ease:'linear'  },
  { name:'compose',         dur:500,  emotion:'neutral',   scale:1.00, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:0,   twistFreq:2, twistFlow:0,   glitch:0,    ease:'out'     },
  { name:'sarcasm',         dur:900,  emotion:'happy',     scale:0.95, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:0,   twistFreq:2, twistFlow:0,   glitch:0,    ease:'inout'   },
  { name:'contempt',        dur:600,  emotion:'neutral',   scale:0.90, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:0,   twistFreq:2, twistFlow:0,   glitch:0,    ease:'in'      },
  { name:'deep-scan',       dur:1200, emotion:'neutral',   scale:1.05, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:4,   twistFreq:3, twistFlow:1.0, glitch:0.01, ease:'inout'   },
  { name:'recalibrate',     dur:350,  emotion:'neutral',   scale:1.00, shakeX:0.8, shakeY:0,   shakeHz:16, twistAmp:0,   twistFreq:2, twistFlow:0,   glitch:0.04, ease:'linear'  },
  { name:'idle-long',       dur:2500, emotion:'neutral',   scale:1.00, shakeX:0,   shakeY:0,   shakeHz:8,  twistAmp:0,   twistFreq:2, twistFlow:0,   glitch:0,    ease:'out'     },
];
</script>
<script>
(function () {
  const SEQ   = window.SEQUENCE;
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const label  = document.getElementById('step-label');

  const DOT  = 8;
  const GAP  = 5;
  const STEP = DOT + GAP;

  const AMBER_ON  = '#FFB800';
  const AMBER_DIM = '#1a1200';
  const BG        = '#050400';

  let W, H, COLS, ROWS, OX, OY;
  let faceBuffer, target, current;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    COLS = Math.ceil(W / STEP) + 2;
    ROWS = Math.ceil(H / STEP) + 2;
    const cx = Math.floor(COLS / 2);
    const cy = Math.floor(ROWS / 2);
    OX = Math.round(W / 2 - cx * STEP - DOT / 2);
    OY = Math.round(H / 2 - cy * STEP - DOT / 2);
    faceBuffer = new Float32Array(COLS * ROWS);
    target     = new Float32Array(COLS * ROWS);
    current    = new Float32Array(COLS * ROWS);
  }
  window.addEventListener('resize', resize);

  let seqIdx = 0, seqT = 0;
  let paused = false;
  let manualEmotion = null;

  function advanceSeq(dt) {
    if (paused) return;
    seqT += dt / SEQ[seqIdx].dur;
    if (seqT >= 1) {
      seqT = seqT % 1;
      seqIdx = (seqIdx + 1) % SEQ.length;
      manualEmotion = null;
    }
  }

  function ease(t, type) {
    switch (type) {
      case 'in':     return t * t;
      case 'out':    return 1 - (1-t)*(1-t);
      case 'inout':  return t < 0.5 ? 2*t*t : 1-2*(1-t)*(1-t);
      case 'bounce': {
        let n = 1-t;
        if (n < 1/2.75)      return 1 - 7.5625*n*n;
        if (n < 2/2.75)      return 1 - 7.5625*(n-=1.5/2.75)*n - .75;
        if (n < 2.5/2.75)    return 1 - 7.5625*(n-=2.25/2.75)*n - .9375;
                             return 1 - 7.5625*(n-=2.625/2.75)*n - .984375;
      }
      case 'elastic': {
        if (t <= 0 || t >= 1) return t;
        return Math.pow(2,-10*t) * Math.sin((t-.075)*(2*Math.PI)/.3) + 1;
      }
      default: return t;
    }
  }

  function getCurrentTransform() {
    const cur  = SEQ[seqIdx];
    const prev = SEQ[(seqIdx - 1 + SEQ.length) % SEQ.length];
    const e    = ease(seqT, cur.ease || 'linear');

    const scale     = lerp(prev.scale     || 1, cur.scale     || 1, e);
    const twistAmp  = lerp(prev.twistAmp  || 0, cur.twistAmp  || 0, e);
    const twistFreq = lerp(prev.twistFreq || 2, cur.twistFreq || 2, e);
    const twistFlow = lerp(prev.twistFlow || 0, cur.twistFlow || 0, e);

    const hz    = cur.shakeHz || 8;
    const angle = seqT * Math.PI * 2 * hz * (cur.dur / 1000);
    const offX  = Math.sin(angle)             * (cur.shakeX || 0);
    const offY  = Math.sin(angle + Math.PI/3) * (cur.shakeY || 0);

    return {
      scale, offX, offY,
      twistAmp, twistFreq, twistFlow,
      glitch:  cur.glitch  || 0,
      emotion: manualEmotion || cur.emotion || 'neutral',
    };
  }

  let mouse  = { x: 0, y: 0 };
  let pupOff = { x: 0, y: 0 };
  let blinkClose = 0, blinkTarget = 0, blinkNext = 4000+Math.random()*5000, blinking = false;
  let breath = 0, scanY = 0, globalTime = 0;

  document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

  function lerp(a, b, t) { return a + (b-a)*t; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  function fdot(c, r, v=1) {
    if (c<0||c>=COLS||r<0||r>=ROWS) return;
    faceBuffer[r*COLS+c] = Math.max(faceBuffer[r*COLS+c], v);
  }
  function fhline(r, c0, c1, v=1) { for (let c=c0;c<=c1;c++) fdot(c,r,v); }
  function fvline(c, r0, r1, v=1) { for (let r=r0;r<=r1;r++) fdot(c,r,v); }
  function frect(c0, r0, c1, r1, v=1) {
    fhline(r0,c0,c1,v); fhline(r1,c0,c1,v);
    fvline(c0,r0+1,r1-1,v); fvline(c1,r0+1,r1-1,v);
  }

  function buildFaceBuffer(emotion, px, py) {
    faceBuffer.fill(0);
    const cx = Math.floor(COLS/2);
    const cy = Math.floor(ROWS/2);

    const L = { c0:cx-12, c1:cx-4,  r0:cy-6, r1:cy+2 };
    const R = { c0:cx+4,  c1:cx+12, r0:cy-6, r1:cy+2 };

    drawEye(L, px, py, emotion);
    drawEye(R, px, py, emotion);
    drawBrows(L, R, emotion);

    if (blinkClose > 0.02) {
      applyBlink(L);
      applyBlink(R);
    }
  }

  function drawEye({c0,c1,r0,r1}, px, py, emo) {
    const ecx = Math.floor((c0+c1)/2);
    const ecy = Math.floor((r0+r1)/2);

    if (emo === 'happy') {
      fhline(r0, c0+1, c1-1);
      fdot(c0,r0+1); fdot(c1,r0+1);
      fdot(c0+1,r0+2,0.6); fdot(c1-1,r0+2,0.6);
      return;
    }
    if (emo === 'sad') {
      fhline(r1, c0+1, c1-1);
      fdot(c0,r1-1); fdot(c1,r1-1);
      fdot(c0+1,r1-2,0.6); fdot(c1-1,r1-2,0.6);
      return;
    }

    frect(c0,r0,c1,r1);

    if (emo === 'sleepy') {
      fhline(r0+1,c0+1,c1-1,0.9);
      fhline(r0+2,c0+1,c1-1,0.8);
      fdot(ecx+px, ecy+1+py);
      fdot(ecx+px, ecy+2+py, 0.7);
      return;
    }

    const ir = emo === 'surprised' ? 3 : 2;
    for (let a=0; a<16; a++) {
      const ang = a/16*Math.PI*2;
      fdot(Math.round(ecx+px+Math.cos(ang)*ir), Math.round(ecy+py+Math.sin(ang)*ir), 0.7);
    }
    fdot(ecx+px,   ecy+py,   1.0);
    fdot(ecx+px+1, ecy+py,   0.9);
    fdot(ecx+px,   ecy+py+1, 0.9);
    fdot(ecx+px-1, ecy+py,   0.8);
    fdot(ecx+px,   ecy+py-1, 0.8);
    fdot(ecx+px-1, ecy+py-1, 0.95);

    if (emo === 'surprised') {
      for (let a=0; a<20; a++) {
        const ang = a/20*Math.PI*2;
        fdot(Math.round(ecx+px+Math.cos(ang)*(ir+2)), Math.round(ecy+py+Math.sin(ang)*(ir+2)), 0.35);
      }
    }
  }

  function drawBrows(L, R, emo) {
    const lby = L.r0-3, rby = R.r0-3;
    if (emo === 'angry') {
      fhline(lby,  L.c0+2,L.c1,  1); fhline(lby+1,L.c0,  L.c0+1,1);
      fhline(rby,  R.c0,  R.c1-2,1); fhline(rby+1,R.c1-1,R.c1,  1);
    } else if (emo === 'sad') {
      fhline(lby,  L.c0,  L.c1-2,1); fhline(lby+1,L.c1-1,L.c1,  1);
      fhline(rby,  R.c0+2,R.c1,  1); fhline(rby+1,R.c0,  R.c0+1,1);
    } else if (emo === 'surprised') {
      fhline(lby-1,L.c0+1,L.c1-1,1);
      fhline(rby-1,R.c0+1,R.c1-1,1);
    } else {
      fhline(lby,  L.c0+1,L.c1-1,1);
      fhline(rby,  R.c0+1,R.c1-1,1);
    }
  }

  function applyBlink({c0,c1,r0,r1}) {
    const lid = Math.min(Math.round(blinkClose*(r1-r0+1)), r1-r0+1);
    for (let r=r0; r<=r0+lid&&r<=r1; r++)
      for (let c=c0; c<=c1; c++) faceBuffer[r*COLS+c] = 0;
    const sr = r0+lid;
    if (sr <= r1) fhline(sr, c0, c1, 0.7);
  }

  function applyTransform(T) {
    target.fill(0);
    const cx = Math.floor(COLS/2);
    const cy = Math.floor(ROWS/2);

    for (let r=0; r<ROWS; r++) {
      for (let c=0; c<COLS; c++) {
        const v = faceBuffer[r*COLS+c];
        if (v < 0.01) continue;
        const fc = c - cx;
        const fr = r - cy;
        let tc = cx + Math.round(fc * T.scale + T.offX);
        let tr = cy + Math.round(fr * T.scale + T.offY);
        if (T.twistAmp > 0.01) {
          const phase = (tr / ROWS) * Math.PI * 2 * T.twistFreq
                      + globalTime * 0.001 * T.twistFlow * 6;
          tc += Math.round(Math.sin(phase) * T.twistAmp);
        }
        if (tc>=0 && tc<COLS && tr>=0 && tr<ROWS)
          target[tr*COLS+tc] = Math.max(target[tr*COLS+tc], v);
      }
    }

    if (T.glitch > 0) {
      for (let i=0; i<COLS*ROWS; i++) {
        if (Math.random() < T.glitch * 0.08)
          target[i] = Math.random() > 0.5 ? Math.random()*0.9 : 0;
      }
    }
  }

  function drawDots(breathOff) {
    for (let r=0; r<ROWS; r++) {
      for (let c=0; c<COLS; c++) {
        const v = current[r*COLS+c];
        const x = OX + c*STEP + DOT/2;
        const y = OY + r*STEP + DOT/2 + breathOff;
        if (v > 0.05) {
          ctx.shadowColor = AMBER_ON;
          ctx.shadowBlur  = v * 16;
          ctx.fillStyle   = `rgba(255,184,0,${v})`;
        } else {
          ctx.shadowBlur = 0;
          ctx.fillStyle  = AMBER_DIM;
        }
        ctx.beginPath();
        ctx.arc(x, y, DOT/2, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.shadowBlur = 0;
  }

  function drawScanline(dt) {
    scanY = (scanY + dt*0.04) % (H + 80);
    const sy = -40 + scanY;
    const sg = ctx.createLinearGradient(0, sy-40, 0, sy+40);
    sg.addColorStop(0,   'rgba(255,184,0,0)');
    sg.addColorStop(0.5, 'rgba(255,184,0,0.04)');
    sg.addColorStop(1,   'rgba(255,184,0,0)');
    ctx.fillStyle = sg;
    ctx.fillRect(0, sy-40, W, 80);
  }

  let last = 0;
  function frame(ts) {
    const dt = ts - last; last = ts;
    globalTime += dt;
    breath += dt * 0.0006;

    advanceSeq(dt);

    blinkNext -= dt;
    if (blinkNext <= 0 && !blinking) {
      blinking = true; blinkTarget = 1;
      blinkNext = 4000 + Math.random()*6000;
      setTimeout(() => { blinkTarget = 0; setTimeout(() => { blinking = false; }, 100); }, 60);
    }
    blinkClose = lerp(blinkClose, blinkTarget, blinking ? 0.18 : 0.22);

    pupOff.x = lerp(pupOff.x, clamp((mouse.x - W/2) / (W/2), -1, 1), 0.05);
    pupOff.y = lerp(pupOff.y, clamp((mouse.y - H/2) / (H/2), -1, 1), 0.05);
    const px = Math.round(clamp(pupOff.x * 3.5, -3, 3));
    const py = Math.round(clamp(pupOff.y * 2.5, -2, 2));

    const T = getCurrentTransform();
    buildFaceBuffer(T.emotion, px, py);
    applyTransform(T);

    for (let i=0; i<COLS*ROWS; i++) current[i] = lerp(current[i], target[i], 0.15);

    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = BG;
    ctx.fillRect(0, 0, W, H);

    drawDots(Math.sin(breath) * 3);
    drawScanline(dt);

    if (label) label.textContent = (paused ? '|| ' : '') + SEQ[seqIdx].name;

    requestAnimationFrame(frame);
  }

  const KEY = { h:'happy', s:'sad', a:'angry', z:'sleepy', r:'surprised', n:'neutral' };
  document.addEventListener('keydown', e => {
    if (e.key === ' ')               paused = !paused;
    if (e.key==='f'||e.key==='F')    document.documentElement.requestFullscreen?.();
    if (KEY[e.key.toLowerCase()])    manualEmotion = KEY[e.key.toLowerCase()];
  });
  document.addEventListener('click', () => {
    const em = ['neutral','angry','surprised','neutral','neutral','happy'];
    manualEmotion = em[Math.floor(Math.random() * em.length)];
  });

  resize();
  requestAnimationFrame(frame);

  window.EYE = {
    pause:  ()  => { paused = true; },
    resume: ()  => { paused = false; },
    toggle: ()  => { paused = !paused; },
    goto:   (i) => { seqIdx = ((i % SEQ.length) + SEQ.length) % SEQ.length; seqT = 0; paused = true; },
    next:   ()  => { seqIdx = (seqIdx + 1) % SEQ.length; seqT = 0; paused = true; },
    prev:   ()  => { seqIdx = (seqIdx - 1 + SEQ.length) % SEQ.length; seqT = 0; paused = true; },
    play:   ()  => { paused = false; },
    emotion:(e) => { manualEmotion = e; },
    seq:    (s) => { window.SEQUENCE = s; seqIdx = 0; seqT = 0; },
    list:   ()  => SEQ.map((s,i) => `${i}: ${s.name}`).join('\n'),
  };
})();
</script>
</body>
</html>
