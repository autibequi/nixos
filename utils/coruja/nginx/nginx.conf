# nginx.conf — Estratégia Dev Stack (rede interna docker)
#
# Diferença em relação ao original:
#   - proxy_pass aponta para nomes de container na rede `estrategia`,
#     NÃO para 127.0.0.1 (que era necessário no modo network_mode: host).
#   - front-student : http://front-student:3005
#   - bo-container  : https://bo-container:9090  (Quasar expõe HTTPS self-signed)
#   - monolito      : http://monolito:4004
#
# Certs gerados por: scripts/gen-cert.sh (mkcert)
# Montados em: /etc/nginx/certs/ (via CERT_DIR no docker-compose)

server_names_hash_bucket_size 128;

# resolver = DNS interno do podman (aardvark-dns), que escuta no gateway da rede `estrategia`.
# Sem isto + sem variável no proxy_pass, o nginx resolve o nome do upstream UMA vez no startup
# e cacheia o IP pra sempre → quando o monolito/front/bo reinicia (IP novo), o nginx segue
# batendo no IP morto e responde 502. Com resolver + variável (ver os proxy_pass abaixo), o
# nginx re-resolve em runtime respeitando o `valid=10s`, então restart de app não derruba o proxy.
#
# resolver = aardvark-dns do podman, que escuta no GATEWAY da rede `estrategia` (confirmado:
# `cat /etc/resolv.conf` dos containers → `nameserver 10.89.1.1`, o gateway). Este IP é estável
# PORQUE a subnet está PINADA no docker-compose.yml (networks.estrategia.ipam → 10.89.1.0/24,
# gateway 10.89.1.1). Sem o pin, o podman reatribuía a subnet a cada recriação da rede — foi o que
# quebrou no bump podman 5.7→5.8 (10.89.10.x → 10.89.1.x): o resolver ficava stale →
# "bo-container could not be resolved (Operation timed out)" → 502.
#
# NÃO trocar por ${NGINX_LOCAL_RESOLVERS}: nesta imagem (nginx 1.31.1) o envsubst do passo 20 NÃO
# substitui a var exportada pelo 15-local-resolvers.envsh → ela fica LITERAL no conf renderizado →
# nginx morre com "host not found in resolver \"${NGINX_LOCAL_RESOLVERS}\"" (crash loop). Testado.
#
# ⚠️ Este IP e o ipam do compose são UM PAR: se mudar a faixa, mude os DOIS juntos.
resolver 10.89.1.1 valid=10s ipv6=off;

ssl_certificate     /etc/nginx/certs/fullchain.pem;
ssl_certificate_key /etc/nginx/certs/privkey.pem;

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Health check interno (usado pelo healthcheck do compose)
server {
    listen 8080;
    location / { return 200 'OK'; }
}

# HTTP → HTTPS redirect
server {
    listen 80;
    return 301 https://$host$request_uri;
}

# front-student — apex + todos os subdomínios exceto admin. e api.
server {
    listen 443 ssl;
    server_name local.estrategia-sandbox.com.br *.local.estrategia-sandbox.com.br;

    # Exclui admin. e api. (declarados em blocos mais específicos abaixo)
    # nginx usa o server_name mais específico — subdomínios exatos têm precedência.

    location / {
        # ${FRONT_PORT} resolvido pelo envsubst do entrypoint do nginx — segue a vertical
        # (concursos=3000 … carreiras-juridicas=3005). Os $host/$scheme/etc. são preservados
        # (não são env vars, então o envsubst não os toca).
        # $upstream_front em variável (+ resolver no topo) força re-resolução em runtime —
        # ver comentário do `resolver`. $request_uri repassa o path/query original intacto.
        set                $upstream_front front-student;
        proxy_pass         http://$upstream_front:${FRONT_PORT}$request_uri;
        proxy_http_version 1.1;
        proxy_set_header   Host       $host;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}

# bo-container — admin.local.estrategia-sandbox.com.br
# Quasar dev (porta 9090) expõe HTTPS self-signed — proxy_ssl_verify off necessário.
server {
    listen 443 ssl;
    server_name admin.local.estrategia-sandbox.com.br;

    location / {
        set              $upstream_bo bo-container;
        proxy_pass       https://$upstream_bo:9090$request_uri;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# monolito — api.local.estrategia-sandbox.com.br
server {
    listen 443 ssl;
    server_name api.local.estrategia-sandbox.com.br;

    location / {
        set              $upstream_mono monolito;
        proxy_pass       http://$upstream_mono:4004$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
