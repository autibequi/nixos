server {
    listen 2375;

    # Docker CLI: info, ping, version
    location ~ ^(/v[\d.]+)?/(info|ping|version)$ {
        proxy_pass http://unix:/var/run/docker.sock;
        proxy_set_header Host localhost;
    }

    # Inspect container
    location ~ ^(/v[\d.]+)?/containers/[^/]+/json$ {
        limit_except GET { deny all; }
        proxy_pass http://unix:/var/run/docker.sock;
        proxy_set_header Host localhost;
    }

    # Logs de qualquer container (GET)
    location ~ ^(/v[\d.]+)?/containers/[^/]+/logs$ {
        limit_except GET { deny all; }
        proxy_pass http://unix:/var/run/docker.sock;
        proxy_set_header Host localhost;
    }

    # Create, start, stop, restart, kill container (POST)
    location ~ ^(/v[\d.]+)?/containers/[^/]+/(create|start|stop|restart|kill|pause|unpause)$ {
        limit_except POST { deny all; }
        proxy_pass http://unix:/var/run/docker.sock;
        proxy_set_header Host localhost;
    }

    # Remove container (DELETE)
    location ~ ^(/v[\d.]+)?/containers/[^/]+(\?.*)?$ {
        limit_except DELETE { deny all; }
        proxy_pass http://unix:/var/run/docker.sock;
        proxy_set_header Host localhost;
    }

    # List containers (GET)
    location ~ ^(/v[\d.]+)?/containers/json$ {
        limit_except GET { deny all; }
        proxy_pass http://unix:/var/run/docker.sock;
        proxy_set_header Host localhost;
    }

    # Tudo mais bloqueado
    location / {
        return 403 "blocked by docker-socket-filter";
    }
}
