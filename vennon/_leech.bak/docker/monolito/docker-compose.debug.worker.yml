services:
  worker:
    build:
      dockerfile: ${LEECH_NIXOS_DIR}/leech/docker/monolito/Dockerfile.debug
    command: ["/go/bin/dlv", "exec", "./worker",
              "--headless", "--listen=:2346", "--api-version=2",
              "--accept-multiclient", "--continue"]
    # ptrace is required for delve to work inside Docker
    security_opt:
      - apparmor:unconfined
    cap_add:
      - SYS_PTRACE
    ports:
      - "2346:2346"
