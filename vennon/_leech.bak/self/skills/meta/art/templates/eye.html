<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Grid Face</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:#020904;
    display:flex; align-items:center; justify-content:center;
    height:100vh; overflow:hidden; cursor:none;
  }
  #hint {
    position:fixed; bottom:14px; font-size:10px;
    color:#1a3a1a; letter-spacing:0.2em;
    font-family:'Courier New',monospace;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">H · S · A · Z · R &nbsp;|&nbsp; CLICK &nbsp;|&nbsp; F = fullscreen</div>
<script>
const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');

const DOT  = 8;
const GAP  = 5;
const STEP = DOT + GAP;

let W, H, COLS, ROWS, GW, GH;

let OX = 0, OY = 0;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  COLS = Math.ceil(W / STEP) + 2;
  ROWS = Math.ceil(H / STEP) + 2;
  GW   = COLS * STEP;
  GH   = ROWS * STEP;
  // offset so center col/row lands exactly on screen center
  const cx = Math.floor(COLS / 2);
  const cy = Math.floor(ROWS / 2);
  OX = Math.round(W / 2 - cx * STEP - DOT / 2);
  OY = Math.round(H / 2 - cy * STEP - DOT / 2);
  target  = new Float32Array(COLS * ROWS);
  current = new Float32Array(COLS * ROWS);
}

window.addEventListener('resize', resize);

// ── palette ───────────────────────────────────────────────────────────────
const GREEN_ON   = '#39ff6a';
const GREEN_DIM  = '#071509';
const BG         = '#020904';

// ── state ─────────────────────────────────────────────────────────────────
let mouse = {x:0, y:0};
document.addEventListener('mousemove', e=>{ mouse.x=e.clientX; mouse.y=e.clientY; });

const EMOTIONS = ['neutral','happy','sad','angry','surprised','sleepy'];
let emotion = 'neutral';

let target, current;

let pupOff  = {x:0, y:0};
let blinkClose = 0, blinkTarget = 0, blinkNext = 2800+Math.random()*3000, blinking = false;
let breath = 0;
let scanY  = 0;

// ── utils ─────────────────────────────────────────────────────────────────
function lerp(a,b,t){ return a+(b-a)*t; }
function clamp(v,lo,hi){ return Math.max(lo,Math.min(hi,v)); }

function dot(c,r,v=1){
  if(c<0||c>=COLS||r<0||r>=ROWS) return;
  target[r*COLS+c] = Math.max(target[r*COLS+c], v);
}
function hline(r,c0,c1,v=1){ for(let c=c0;c<=c1;c++) dot(c,r,v); }
function vline(c,r0,r1,v=1){ for(let r=r0;r<=r1;r++) dot(c,r,v); }
function rect(c0,r0,c1,r1,v=1){
  hline(r0,c0,c1,v); hline(r1,c0,c1,v);
  vline(c0,r0+1,r1-1,v); vline(c1,r0+1,r1-1,v);
}

// ── face (coords relativas ao centro do grid) ─────────────────────────────
function buildFace(){
  target.fill(0);

  // fill all dots dim — o grid inteiro aceso no mínimo
  for(let r=0;r<ROWS;r++)
    for(let c=0;c<COLS;c++)
      target[r*COLS+c] = 0; // serão renderizados como dim no draw

  const cx = Math.floor(COLS/2);
  const cy = Math.floor(ROWS/2);

  const px = Math.round(clamp(pupOff.x*3.5,-3,3));
  const py = Math.round(clamp(pupOff.y*2.5,-2,2));

  // olhos (offset relativo ao centro)
  const L = { c0:cx-12, c1:cx-4,  r0:cy-6, r1:cy+2 };
  const R = { c0:cx+4,  c1:cx+12, r0:cy-6, r1:cy+2 };

  drawEye(L, px, py);
  drawEye(R, px, py);
  drawBrows(L, R);


  if(blinkClose > 0.02){
    applyBlink(L);
    applyBlink(R);
  }
}

function drawEye({c0,c1,r0,r1}, px, py){
  const ecx = Math.floor((c0+c1)/2);
  const ecy = Math.floor((r0+r1)/2);

  if(emotion==='happy'){
    hline(r0, c0+1, c1-1);
    dot(c0, r0+1); dot(c1, r0+1);
    dot(c0+1, r0+2, 0.6); dot(c1-1, r0+2, 0.6);
    return;
  }
  if(emotion==='sad'){
    hline(r1, c0+1, c1-1);
    dot(c0, r1-1); dot(c1, r1-1);
    dot(c0+1, r1-2, 0.6); dot(c1-1, r1-2, 0.6);
    return;
  }

  rect(c0,r0,c1,r1);

  if(emotion==='sleepy'){
    hline(r0+1, c0+1, c1-1, 0.9);
    hline(r0+2, c0+1, c1-1, 0.8);
    dot(ecx+px, ecy+1+py);
    dot(ecx+px, ecy+2+py, 0.7);
    return;
  }

  const ir = emotion==='surprised' ? 3 : 2;
  for(let a=0;a<16;a++){
    const ang = a/16*Math.PI*2;
    dot(Math.round(ecx+px+Math.cos(ang)*ir), Math.round(ecy+py+Math.sin(ang)*ir), 0.7);
  }
  dot(ecx+px,   ecy+py,   1.0);
  dot(ecx+px+1, ecy+py,   0.9);
  dot(ecx+px,   ecy+py+1, 0.9);
  dot(ecx+px-1, ecy+py,   0.8);
  dot(ecx+px,   ecy+py-1, 0.8);
  dot(ecx+px-1, ecy+py-1, 0.95);

  if(emotion==='surprised'){
    for(let a=0;a<20;a++){
      const ang=a/20*Math.PI*2;
      dot(Math.round(ecx+px+Math.cos(ang)*(ir+2)), Math.round(ecy+py+Math.sin(ang)*(ir+2)), 0.35);
    }
  }
}

function drawBrows(L, R){
  const lby = L.r0-3, rby = R.r0-3;
  if(emotion==='angry'){
    hline(lby,   L.c0+2, L.c1,   1); hline(lby+1, L.c0,   L.c0+1, 1);
    hline(rby,   R.c0,   R.c1-2, 1); hline(rby+1, R.c1-1, R.c1,   1);
  } else if(emotion==='sad'){
    hline(lby,   L.c0,   L.c1-2, 1); hline(lby+1, L.c1-1, L.c1,   1);
    hline(rby,   R.c0+2, R.c1,   1); hline(rby+1, R.c0,   R.c0+1, 1);
  } else if(emotion==='surprised'){
    hline(lby-1, L.c0+1, L.c1-1, 1);
    hline(rby-1, R.c0+1, R.c1-1, 1);
  } else {
    hline(lby, L.c0+1, L.c1-1, 1);
    hline(rby, R.c0+1, R.c1-1, 1);
  }
}

function applyBlink({c0,c1,r0,r1}){
  const eH = r1-r0;
  const lid = Math.min(Math.round(blinkClose*(eH+1)), eH+1);
  for(let r=r0; r<=r0+lid && r<=r1; r++)
    for(let c=c0; c<=c1; c++) target[r*COLS+c]=0;
  const scanR = r0+lid;
  if(scanR<=r1) hline(scanR, c0, c1, 0.7);
}

// ── render ─────────────────────────────────────────────────────────────────
function drawDots(breathOff){
  for(let r=0;r<ROWS;r++){
    for(let c=0;c<COLS;c++){
      const v = current[r*COLS+c];
      const x = OX + c*STEP + DOT/2;
      const y = OY + r*STEP + DOT/2 + breathOff;

      if(v > 0.05){
        ctx.shadowColor = GREEN_ON;
        ctx.shadowBlur  = v*14;
        ctx.fillStyle   = `rgba(57,255,106,${v})`;
      } else {
        ctx.shadowBlur  = 0;
        ctx.fillStyle   = GREEN_DIM;
      }
      ctx.beginPath();
      ctx.arc(x, y, DOT/2, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.shadowBlur = 0;
}

function drawScanline(dt){
  scanY = (scanY + dt*0.05) % (H + 80);
  const sy = -40 + scanY;
  const sg = ctx.createLinearGradient(0, sy-40, 0, sy+40);
  sg.addColorStop(0,   'rgba(57,255,106,0)');
  sg.addColorStop(0.5, 'rgba(57,255,106,0.05)');
  sg.addColorStop(1,   'rgba(57,255,106,0)');
  ctx.fillStyle = sg;
  ctx.fillRect(0, sy-40, W, 80);
}

// ── loop ───────────────────────────────────────────────────────────────────
let last = 0;
function frame(ts){
  const dt = ts-last; last=ts;
  breath += dt*0.0009;

  blinkNext -= dt;
  if(blinkNext<=0 && !blinking){
    blinking=true; blinkTarget=1; blinkNext=2400+Math.random()*4000;
    setTimeout(()=>{ blinkTarget=0; setTimeout(()=>{ blinking=false; },120); },80);
  }
  blinkClose = lerp(blinkClose, blinkTarget, blinking?0.2:0.25);

  pupOff.x = lerp(pupOff.x, clamp((mouse.x-W/2)/(W/2),-1,1), 0.07);
  pupOff.y = lerp(pupOff.y, clamp((mouse.y-H/2)/(H/2),-1,1), 0.07);

  buildFace();
  for(let i=0;i<COLS*ROWS;i++) current[i]=lerp(current[i],target[i],0.18);

  ctx.clearRect(0,0,W,H);
  ctx.fillStyle=BG;
  ctx.fillRect(0,0,W,H);

  const breathOff = Math.sin(breath)*4;
  drawDots(breathOff);
  drawScanline(dt);

  requestAnimationFrame(frame);
}

// ── input ──────────────────────────────────────────────────────────────────
const KEY = {h:'happy',s:'sad',a:'angry',z:'sleepy',r:'surprised',n:'neutral'};
document.addEventListener('keydown', e=>{
  if(KEY[e.key.toLowerCase()]) emotion=KEY[e.key.toLowerCase()];
  if(e.key==='f'||e.key==='F') document.documentElement.requestFullscreen?.();
});
document.addEventListener('click', ()=>{
  emotion = EMOTIONS[Math.floor(Math.random()*EMOTIONS.length)];
});

resize();
requestAnimationFrame(frame);
</script>
</body>
</html>
