<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MERMAID_TITLE_HERE</title>
  <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #18181c;
      --border: #2a2a30;
      --text: #e4e4e7;
      --text-muted: #71717a;
      --ctp-mauve: #cba6f7;
      --ctp-sapphire: #74c7ec;
      --ctp-green: #a6e3a1;
    }
    * { box-sizing: border-box; }
    html {
      height: 100%;
      margin: 0;
    }
    body {
      width: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      height: 100vh;
      height: 100dvh;
      max-height: 100vh;
      max-height: 100dvh;
      margin: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      font-family: ui-sans-serif, system-ui, sans-serif;
      background: var(--bg); color: var(--text);
    }

    .hk-head {
      flex-shrink: 0;
      display: flex; align-items: flex-start; justify-content: space-between;
      gap: 1rem; flex-wrap: wrap;
      padding: 0.65rem 1rem;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .hk-brand h1 {
      margin: 0; font-size: 1rem; font-weight: 600;
      color: var(--ctp-mauve); letter-spacing: 0.02em;
    }
    .hk-sub {
      margin: 0.25rem 0 0; font-size: 0.78rem; color: var(--text-muted);
      max-width: 48rem;
    }
    .hk-sub.hk-hidden { display: none; }

    .hk-toolbar {
      display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
    }
    .hk-zoom {
      font: 500 0.75rem ui-monospace, monospace;
      color: var(--ctp-sapphire);
      min-width: 3.2rem; text-align: right;
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      background: rgba(116, 199, 236, 0.08);
    }
    .hk-btn {
      font: 500 0.72rem ui-monospace, monospace;
      color: var(--text-muted);
      background: rgba(15, 15, 18, 0.85);
      border: 1px solid var(--border);
      padding: 0.35rem 0.65rem;
      border-radius: 4px; cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
    }
    .hk-btn:hover, .hk-btn:focus-visible {
      color: var(--text);
      border-color: var(--ctp-mauve);
      outline: none;
    }
    .hk-kbd-hint {
      font-size: 0.65rem; color: var(--text-muted);
      opacity: 0.85;
      max-width: 14rem; line-height: 1.35;
    }

    #hk-stage {
      flex: 1 1 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }
    .mermaid {
      position: relative;
      overflow: hidden;
      cursor: grab;
      flex: 1 1 0;
      min-height: 0;
      width: 100%;
      user-select: none; -webkit-user-select: none; touch-action: none;
    }
    .mermaid.panning { cursor: grabbing; }
    .mermaid svg { display: block; transform-origin: 0 0; will-change: transform; }
    .z-hint {
      position: absolute; bottom: 10px; right: 12px; pointer-events: none;
      font: 500 0.62rem/1.3 ui-monospace, monospace; color: var(--text-muted);
      opacity: 0; transition: opacity 0.2s; white-space: pre;
    }
    .mermaid:hover .z-hint { opacity: 1; }
    .z-reset {
      position: absolute; top: 10px; right: 12px; z-index: 5;
      font: 500 0.62rem ui-monospace, monospace; color: var(--text-muted);
      background: rgba(15,15,18,0.75); border: 1px solid var(--border);
      padding: 3px 10px; border-radius: 4px; cursor: pointer;
      opacity: 0; transition: opacity 0.2s; backdrop-filter: blur(4px);
    }
    .mermaid:hover .z-reset { opacity: 1; }
    .z-reset:focus-visible { opacity: 1; outline: 2px solid var(--ctp-sapphire); }

    @media (prefers-reduced-motion: reduce) {
      .z-hint, .z-reset, .hk-btn { transition: none; }
    }
  </style>
</head>
<body>
  <header class="hk-head">
    <div class="hk-brand">
      <h1>MERMAID_TITLE_HERE</h1>
      <p class="hk-sub" id="hk-sub">MERMAID_SUBTITLE_HERE</p>
    </div>
    <div class="hk-toolbar">
      <span id="hk-zoom-pct" class="hk-zoom" aria-live="polite" title="Zoom % relativo ao encaixe inicial">100%</span>
      <button type="button" class="hk-btn" id="hk-btn-reset" aria-label="Repor zoom e posição (atalho R)">Reset</button>
      <button type="button" class="hk-btn" id="hk-btn-copy" aria-label="Copiar código Mermaid">Copiar</button>
      <button type="button" class="hk-btn" id="hk-btn-svg" aria-label="Exportar diagrama como ficheiro SVG">SVG</button>
      <button type="button" class="hk-btn" id="hk-btn-fs" aria-label="Alternar ecrã inteiro (atalho F)">⛶</button>
      <span class="hk-kbd-hint" title="Atalhos">R reset · +/- zoom · 0 fit · F ecrã · duplo clique no diagrama</span>
    </div>
  </header>
  <div id="hk-stage">
    <div class="mermaid">
MERMAID_DIAGRAM_HERE
    </div>
  </div>
  <script>
(function () {
  'use strict';

  var REDUCE_MOTION = typeof window.matchMedia === 'function' &&
    window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var sub = document.getElementById('hk-sub');
  if (sub) {
    var t = sub.textContent.trim();
    if (!t || t === 'MERMAID_SUBTITLE_HERE') sub.classList.add('hk-hidden');
  }

  mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
      primaryColor: '#7c3aed',
      primaryTextColor: '#e4e4e7',
      primaryBorderColor: '#2a2a30',
      lineColor: '#71717a',
      secondaryColor: '#18181c',
      tertiaryColor: '#0f0f12'
    }
  });

  var sources = [];
  document.querySelectorAll('.mermaid').forEach(function (box, i) {
    sources[i] = box.textContent.trim();
  });

  function getPrimaryBox() {
    return document.querySelector('.mermaid');
  }

  function updateZoomLabel(box) {
    var el = document.getElementById('hk-zoom-pct');
    if (!el || !box || !box._holodeck) return;
    el.textContent = box._holodeck.getScalePct() + '%';
  }

  function makeZoomable(box) {
    if (box.dataset.z) return;
    var svg = box.querySelector('svg');
    if (!svg) return;
    box.dataset.z = '1';

    var s, tx, ty, initS, initTx, initTy;
    var pinchMul = REDUCE_MOTION ? 0.85 : 1;

    function put() {
      svg.style.transform = 'translate(' + tx + 'px,' + ty + 'px) scale(' + s + ')';
      updateZoomLabel(box);
    }

    var nat = svg.getBoundingClientRect();
    if (nat.height < 20) {
      setTimeout(function () { box.dataset.z = ''; makeZoomable(box); }, 150);
      return;
    }
    svg.style.margin = '0';
    var headEl = document.querySelector('.hk-head');
    var headH = headEl ? headEl.getBoundingClientRect().height : 0;
    var bw = box.offsetWidth || box.getBoundingClientRect().width || window.innerWidth;
    var bh = box.offsetHeight || box.getBoundingClientRect().height;
    if (bh < 64) {
      bh = Math.max(200, window.innerHeight - headH);
    }
    if (bw < 64) {
      bw = window.innerWidth;
    }
    var pad = 40;
    var scaleX = (bw - pad * 2) / nat.width;
    var scaleY = (bh - pad * 2) / nat.height;
    s = Math.min(scaleX, scaleY, 1);
    tx = (bw - nat.width * s) / 2;
    ty = (bh - nat.height * s) / 2;
    initS = s; initTx = tx; initTy = ty;
    put();

    function zoomAt(f, cx, cy) {
      var r = box.getBoundingClientRect();
      var mx = typeof cx === 'number' ? cx : r.width / 2;
      var my = typeof cy === 'number' ? cy : r.height / 2;
      var ns = Math.min(Math.max(s * f, 0.08), 15);
      tx = mx - (mx - tx) * (ns / s);
      ty = my - (my - ty) * (ns / s);
      s = ns;
      put();
    }

    box._holodeck = {
      reset: function () {
        s = initS; tx = initTx; ty = initTy;
        put();
      },
      zoomIn: function () {
        zoomAt(1.12);
      },
      zoomOut: function () {
        zoomAt(0.89);
      },
      fit: function () {
        this.reset();
      },
      getScalePct: function () {
        return Math.round((s / initS) * 100);
      },
      getSvg: function () { return svg; },
      getBox: function () { return box; }
    };

    var hint = document.createElement('div');
    hint.className = 'z-hint';
    hint.textContent = 'scroll = zoom  ·  drag = pan';
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'z-reset';
    btn.textContent = '⟳ reset';
    btn.setAttribute('aria-label', 'Repor zoom e posição ao encaixe inicial');
    box.appendChild(hint);
    box.appendChild(btn);

    btn.addEventListener('click', function (e) {
      e.stopPropagation();
      box._holodeck.reset();
    });

    box.addEventListener('wheel', function (e) {
      e.preventDefault();
      e.stopPropagation();
      var r = box.getBoundingClientRect();
      var mx = e.clientX - r.left, my = e.clientY - r.top;
      var f = e.deltaY < 0 ? 1.12 : 0.89;
      zoomAt(f, mx, my);
    }, { passive: false });

    var px, py, ptx, pty;
    box.addEventListener('pointerdown', function (e) {
      if (e.button && e.button !== 0) return;
      box.setPointerCapture(e.pointerId);
      px = e.clientX; py = e.clientY; ptx = tx; pty = ty;
      box.classList.add('panning');
      e.preventDefault();
    });
    box.addEventListener('pointermove', function (e) {
      if (!box.hasPointerCapture(e.pointerId)) return;
      tx = ptx + (e.clientX - px); ty = pty + (e.clientY - py);
      put();
    });
    box.addEventListener('pointerup', function (e) {
      box.releasePointerCapture(e.pointerId);
      box.classList.remove('panning');
    });
    box.addEventListener('pointercancel', function (e) {
      box.releasePointerCapture(e.pointerId);
      box.classList.remove('panning');
    });

    var ptrs = {};
    box.addEventListener('pointerdown', function (e) {
      ptrs[e.pointerId] = { x: e.clientX, y: e.clientY };
    });
    box.addEventListener('pointermove', function (e) {
      ptrs[e.pointerId] = { x: e.clientX, y: e.clientY };
      var ids = Object.keys(ptrs);
      if (ids.length === 2) {
        var a = ptrs[ids[0]], b = ptrs[ids[1]];
        var nd = Math.hypot(a.x - b.x, a.y - b.y);
        if (box._pd) {
          var ratio = nd / box._pd;
          if (REDUCE_MOTION) ratio = 1 + (ratio - 1) * pinchMul;
          s = Math.min(Math.max(s * ratio, 0.08), 15);
          put();
        }
        box._pd = nd;
      }
    });
    box.addEventListener('pointerup', function (e) {
      delete ptrs[e.pointerId];
      if (!Object.keys(ptrs).length) box._pd = 0;
    });

    box.addEventListener('dblclick', function (e) {
      if (e.target.closest('.z-reset')) return;
      e.preventDefault();
      box._holodeck.reset();
    });
  }

  function copySources() {
    var text = sources.join('\n\n---\n\n');
    if (navigator.clipboard && navigator.clipboard.writeText) {
      return navigator.clipboard.writeText(text);
    }
    return Promise.reject();
  }

  function exportSvg() {
    var box = getPrimaryBox();
    if (!box || !box._holodeck) return;
    var svg = box._holodeck.getSvg();
    if (!svg) return;
    var clone = svg.cloneNode(true);
    if (!clone.getAttribute('xmlns')) {
      clone.setAttribute('xmlns', 'http://www.w3.org/2000/svg');
    }
    var xml = '<?xml version="1.0" encoding="UTF-8"?>\n' + clone.outerHTML;
    var blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'mermaid-diagram.svg';
    a.rel = 'noopener';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(a.href);
  }

  function toggleFs() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(function () {});
    } else {
      document.exitFullscreen().catch(function () {});
    }
  }

  document.getElementById('hk-btn-reset').addEventListener('click', function () {
    var b = getPrimaryBox();
    if (b && b._holodeck) b._holodeck.reset();
  });
  document.getElementById('hk-btn-copy').addEventListener('click', function () {
    copySources().catch(function () {
      window.prompt('Copiar código Mermaid:', sources.join('\n\n'));
    });
  });
  document.getElementById('hk-btn-svg').addEventListener('click', exportSvg);
  document.getElementById('hk-btn-fs').addEventListener('click', toggleFs);

  document.addEventListener('keydown', function (e) {
    var tag = (e.target && e.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA' || e.target.isContentEditable) return;

    var b = getPrimaryBox();
    if (!b || !b._holodeck) return;

    var k = e.key;
    if (k === 'r' || k === 'R' || k === '0') {
      e.preventDefault();
      b._holodeck.reset();
      return;
    }
    if (k === '+' || k === '=') {
      e.preventDefault();
      b._holodeck.zoomIn();
      return;
    }
    if (k === '-' || k === '_') {
      e.preventDefault();
      b._holodeck.zoomOut();
      return;
    }
    if (k === 'f' || k === 'F') {
      e.preventDefault();
      toggleFs();
    }
  });

  (async function () {
    try {
      await mermaid.run({ nodes: document.querySelectorAll('.mermaid'), suppressErrors: true });
    } catch (err) { console.warn('mermaid', err); }
    setTimeout(function () {
      document.querySelectorAll('.mermaid').forEach(makeZoomable);
    }, 80);
  })();
})();
  </script>
</body>
</html>
