services:
  app:
    build:
      context: ${FRONT_STUDENT_DIR}
      dockerfile: ${ZION_NIXOS_DIR}/zion/dockerized/front-student/Dockerfile
    container_name: zion-dk-front-student-app
    cpus: "14.4"
    mem_limit: 4g
    memswap_limit: 4g
    env_file:
      - ./env/${APP_ENV_FILE:-sandbox}.env
    environment:
      - FORCE_COLOR=1
      - TERM=xterm-256color
      - VERTICAL=${VERTICAL:-carreiras-juridicas}
      - NPM_SCRIPT_ENV=${NPM_SCRIPT_ENV:-dev}
    tty: true
    volumes:
      # Bind mount completo: source + node_modules (gerado por zion docker install)
      - ${FRONT_STUDENT_DIR}:/app
    ports:
      - "3005:3005"
    extra_hosts:
      # Resolve *.local.estrategia-sandbox.com.br via host (onde o reverse proxy roda)
      - "api.local.estrategia-sandbox.com.br:host-gateway"
    networks:
      - default
    restart: unless-stopped

networks:
  default:
    name: nixos_default
    external: true
