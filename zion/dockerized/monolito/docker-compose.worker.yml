services:
  worker:
    build:
      context: ${MONOLITO_DIR}
      dockerfile: ${ZION_NIXOS_DIR}/zion/dockerized/monolito/Dockerfile.worker
    container_name: zion-dk-monolito-worker
    env_file:
      - ./env/${APP_ENV:-sand}.env
    networks:
      - default
    restart: unless-stopped

networks:
  default:
    name: nixos_default
    external: true
