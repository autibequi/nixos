services:
  app:
    build:
      context: ${MONOLITO_DIR}
      dockerfile: ${ZION_NIXOS_DIR}/zion/dockerized/monolito/Dockerfile
    container_name: zion-dk-monolito-app
    env_file:
      - ${MONOLITO_DIR}/.env.${APP_ENV_FILE:-sandbox}
      - ./env/${APP_ENV:-sand}.env
    volumes:
      - ${MONOLITO_DIR}/configuration:/go/app/configuration:ro
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "4004:4004"
      - "2345:2345"
    networks:
      - default
    restart: unless-stopped

networks:
  default:
    name: nixos_default
    external: true
