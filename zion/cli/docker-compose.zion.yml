x-env-base: &env-base
  PATH: /home/claude/.local/bin:/home/claude/.nix-profile/bin:/usr/bin:/bin
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  CURSOR_API_KEY: ${CURSOR_API_KEY:-}
  CLAUDE_SESSION: ${CLAUDE_SESSION:-}
  GH_TOKEN: ${GH_TOKEN:-}
  CLAUDE_ENV: container
  WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-1}
  XDG_RUNTIME_DIR: /run/user/1000
  DISABLE_AUTOUPDATER: false

x-extra-hosts: &extra-hosts
  - "host.docker.internal:host-gateway"

# /workspace: zion (/zion), obsidian e o projeto (mnt). Nixos e logs só em zion edit.
# CLAUDE.OVERRIDE.md montado na raiz do workspace e em mnt/zion/ (prioridade sobre CLAUDE.md do projeto).
x-base-volumes: &base-volumes
  - ${ZION_ROOT:-${HOME}/nixos/zion}:/zion
  - ${OBSIDIAN_PATH:-/tmp}:/workspace/obsidian
  - ${CLAUDIO_MOUNT:-${HOME}/projects}:/workspace/mnt:${CLAUDIO_MOUNT_OPTS:-rw}
  - ${ZION_ROOT:-${HOME}/nixos/zion}/system/CLAUDE.OVERRIDE.md:/workspace/mnt/CLAUDE.OVERRIDE.md:ro
  - ${ZION_ROOT:-${HOME}/nixos/zion}/system/CLAUDE.OVERRIDE.md:/workspace/mnt/zion/CLAUDE.OVERRIDE.md:ro
  - ${HOME}/.claude:/home/claude/.claude
  # zion/skills e zion/commands sobrescrevem o ~/.claude do host
  - ${ZION_ROOT:-${HOME}/nixos/zion}/skills:/home/claude/.claude/skills
  - ${ZION_ROOT:-${HOME}/nixos/zion}/commands:/home/claude/.claude/commands
  - ${ZION_ROOT:-${HOME}/nixos/zion}/agents:/home/claude/.claude/agents
  # Hooks: zion/hooks/claude-code (bootstrap não wiped — stow/.claude/hooks está vazio)
  - ${ZION_ROOT:-${HOME}/nixos/zion}/hooks/claude-code:/home/claude/.claude/hooks
  - ${ZION_ROOT:-${HOME}/nixos/zion}/scripts:/home/claude/.claude/scripts
  - ${HOME}/.claude.json:/home/claude/.claude.json
  # Cursor: credenciais do host + skills/commands/rules do zion
  - ${HOME}/.cursor:/home/claude/.cursor
  - ${ZION_ROOT:-${HOME}/nixos/zion}/skills:/home/claude/.cursor/skills
  - ${ZION_ROOT:-${HOME}/nixos/zion}/commands:/home/claude/.cursor/commands
  - ${ZION_ROOT:-${HOME}/nixos/zion}/commands:/home/claude/.cursor/rules
  # cursor_config: volume nomeado (chmod pelo agent causa EPERM em bind mount)
  - cursor_config:/home/claude/.config/cursor
  # opencode
  - ${ZION_ROOT:-${HOME}/nixos/zion}/.opencode:/home/claude/.config/opencode
  - ${HOME}/projects:/home/claude/projects
  - ${XDG_RUNTIME_DIR:-/run/user/1000}/${WAYLAND_DISPLAY:-wayland-1}:/run/user/1000/${WAYLAND_DISPLAY:-wayland-1}
  # Host /proc e /etc (observabilidade)
  - /proc/meminfo:/host/proc/meminfo:ro
  - /proc/loadavg:/host/proc/loadavg:ro
  - /proc/uptime:/host/proc/uptime:ro
  - /proc/cpuinfo:/host/proc/cpuinfo:ro
  - /proc/version:/host/proc/version:ro
  - /run/current-system:/host/run/current-system:ro
  - /etc/os-release:/host/etc/os-release:ro
  - /tmp/zion-hive-mind:/workspace/.hive-mind
  # Logs de servicos Docker (zion docker run) — acessiveis pelo agente
  - ${HOME}/.local/share/zion/logs:/workspace/logs/docker:ro
  # Docker socket — permite agente gerenciar containers (zion docker run/install/logs)
  - /var/run/docker.sock:/var/run/docker.sock
  # Dockerized configs — agente pode editar docker-compose, .env, etc.
  - ${HOME}/.local/share/zion/dockerized:/workspace/dockerized

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-nix-sandbox
    network_mode: host
    stdin_open: true
    tty: true
    working_dir: /workspace/mnt
    entrypoint: ["/bin/bash", "-c"]
    command: ["sleep infinity"]
    group_add:
      - "${DOCKER_GID:-999}"
    environment:
      <<: *env-base
      GIT_AUTHOR_NAME: Pedrinho
      GIT_AUTHOR_EMAIL: pedro.correa@estrategia.com
      GIT_COMMITTER_NAME: Zion
      GIT_COMMITTER_EMAIL: zion@autibequi.com
    extra_hosts: *extra-hosts
    volumes: *base-volumes

volumes:
  cursor_config:

networks:
  default:
    name: nixos_default
    external: true
