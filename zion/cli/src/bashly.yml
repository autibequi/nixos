name: zion
help: ZION - agent orchestration system
version: "1.0"
environment_variables:
  - name: ZION_NIXOS_DIR
    help: "Raiz do repo NixOS (default $HOME/nixos)"
  - name: OBSIDIAN_PATH
    help: "Caminho do vault Obsidian (default $HOME/.ovault)"

flags:
  - long: --engine
    arg: engine
    help: "Engine da sessão/worker: opencode | claude | cursor (obrigatório em run se não estiver em ~/.zion)"
  - long: --model
    arg: model
    help: "Modelo Claude: haiku | opus (default: sonnet)"
  - long: --instance
    arg: id
    help: "Sufixo da instância (ex. 2 = zion-projeto-2)"
  - long: --rw
    help: Montar projeto em read-write (default para run)
  - long: --ro
    help: Montar projeto read-only
  - long: --danger
    help: "Bypass de permissões no engine (claude: --permission-mode bypassPermissions; cursor: --force; opencode: env auto-approve)"
  - long: --init-md
    arg: file
    default: contexto.md
    help: "Arquivo markdown inicial carregado por todos os engines (default: contexto.md no projeto). Claude: --append-system-prompt-file; Cursor: prompt com @file; OpenCode: env."
  - long: --resume
    arg: session_id
    help: "Retoma sessão: cursor/agent usa --resume=UUID; claude usa --resume; opencode: env ZION_RESUME_SESSION."

commands:
  - name: continue
    alias: [cont]
    help: Continua a última sessão.
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    filename: commands/continue.sh

  - name: new
    alias: [run, r, open, code]
    default: force
    help: Nova sessão no container. Exige --engine (ou engine= em ~/.zion).
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --engine
        arg: engine
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
    examples:
      - zion new --engine=claude
      - zion new --engine=cursor ~/projects
      - zion run --engine=opencode ~/meu-projeto
    filename: commands/new_session.sh

  - name: shell
    alias: [sh]
    help: Abre bash no container com o projeto montado.
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    filename: commands/shell.sh

  - name: resume
    help: Mostra lista de sessões e permite escolher qual retomar.
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --resume
        arg: session_id
        help: "UUID da sessão (opcional; sem isso mostra lista)"
    filename: commands/resume.sh

  - name: start
    help: "[DEPRECATED] Use 'zion new --engine=claude --danger'. Mantido por compatibilidade."
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    filename: commands/start.sh

  # ── Claude (sessão ou usage) ─────────────────────────────────
  - name: claude
    help: "Nova sessão Claude ou consultar uso. Sem subcomando = nova sessão."
    commands:
      - name: new
        help: "Nova sessão com engine Claude (= zion new --engine=claude)."
        default: true
        args:
          - name: dir
            help: "Diretório do projeto (default ~/projects)"
        flags:
          - long: --init-md
            arg: file
            default: contexto.md
          - long: --danger
          - long: --resume
            arg: session_id
          - long: --model
            arg: model
          - long: --instance
            arg: id
          - long: --rw
          - long: --ro
        filename: commands/engine_claude.sh
      - name: usage
        alias: [u]
        help: "Estatísticas de uso Claude (API OAuth / claude.ai)."
        flags:
          - long: --waybar
            help: "Formato Waybar (text, tooltip, class) para o usage bar consumir"
          - long: --json
            help: "JSON bruto da API (five_hour, seven_day, seven_day_sonnet)"
          - long: --no-cache
            help: "Pula cache, busca direto na API"
          - long: --refresh
            help: "Alias de --no-cache"
        filename: commands/claude_usage.sh

      - name: token
        alias: [t]
        help: "Imprime o OAuth access token do Claude (util para curl manual)."
        filename: commands/claude_token.sh

  - name: cursor
    help: "Atalho: nova sessão com engine Cursor (= zion new --engine=cursor)."
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
    filename: commands/engine_cursor.sh

  - name: opencode
    alias: [oc]
    help: "Atalho: nova sessão com engine OpenCode (= zion new --engine=opencode)."
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
    filename: commands/engine_opencode.sh

  # ── Ask (atalho para puppy query) ───────────────────────────
  - name: ask
    help: "Atalho: envia prompt ao Puppy (= zion puppy query)."
    args:
      - name: prompt
        required: true
        help: "Prompt a enviar (ex. 'diga oi')"
    flags:
      - long: --headless
        help: "Modo headless: ninguém está observando, vá o mais longe possível"
      - long: --timeout
        arg: seconds
        help: "Timeout em segundos (default 300)"
      - long: --model
        arg: model
        help: "Modelo Claude: haiku | sonnet | opus (default: haiku)"
    filename: commands/ask.sh

  # ── Container (build / down / destroy) ─────────────────────
  - name: build
    help: Build da imagem Docker do sandbox.
    filename: commands/build.sh

  - name: down
    help: Para todos os containers do projeto.
    filename: commands/down.sh

  - name: destroy
    help: Para containers e remove imagens/volumes.
    filename: commands/destroy.sh

  - name: clean
    alias: [gc, prune]
    help: "Remove sessoes Zion paradas/exited e containers orfaos."
    flags:
      - long: --force
        short: -f
        help: "Remove sem pedir confirmacao"
    filename: commands/clean.sh

  - name: update
    alias: [install]
    help: Regenera CLI (bashly) e instala/atualiza symlink em stow/.local/bin.
    filename: commands/update.sh

  - name: init
    help: Cria ~/.zion a partir de config.example (não sobrescreve se já existir).
    flags:
      - long: --force
        help: Sobrescreve ~/.zion se já existir
    filename: commands/init.sh

  - name: set
    help: "Define engine padrão em ~/.zion (engine= claude | opencode | cursor)."
    args:
      - name: engine
        required: true
        help: "Engine padrão: claude | opencode | cursor"
    filename: commands/set_engine.sh

  # ── Puppy (worker persistente) ────────────────────────────
  - name: puppy
    alias: [p]
    help: "Gerencia o Puppy worker (container persistente + task runner)."
    commands:
      - name: start
        help: "Inicia o container puppy e o daemon interno."
        filename: commands/puppy_start.sh
      - name: stop
        help: "Para o container puppy."
        filename: commands/puppy_stop.sh
      - name: restart
        help: "Reinicia o container puppy (stop + start)."
        filename: commands/puppy_restart.sh
      - name: run
        help: "Roda uma task especifica dentro do container puppy."
        args:
          - name: task
            required: true
            help: "Nome da task (de _scheduled/ ou backlog/)"
        filename: commands/puppy_run.sh
      - name: status
        alias: [st]
        help: "Mostra estado do container e tasks."
        filename: commands/puppy_status.sh
      - name: logs
        help: "Segue logs do container puppy."
        flags:
          - long: --follow
            short: -f
            help: "Follow log output"
        filename: commands/puppy_logs.sh
      - name: shell
        help: "Abre bash dentro do container puppy."
        filename: commands/puppy_shell.sh
      - name: tick
        help: "Roda 1 tick do scheduler imediatamente (para teste)."
        filename: commands/puppy_tick.sh
      - name: query
        alias: [q]
        help: "Envia um prompt ao Claude dentro do container puppy (headless = sem supervisão)."
        args:
          - name: prompt
            required: true
            help: "Prompt a enviar (ex. 'diga oi')"
        flags:
          - long: --headless
            help: "Modo headless: ninguém está observando, vá o mais longe possível"
          - long: --timeout
            arg: seconds
            help: "Timeout em segundos (default 300). O agente é informado do deadline."
          - long: --model
            arg: model
            help: "Modelo Claude: haiku | sonnet | opus (default: haiku)"
        filename: commands/puppy_query.sh

      - name: task
        help: "Executa uma task com o agente genérico Puppy (ou agente específico via --agent)."
        args:
          - name: task
            required: true
            help: "Nome da task (ex. minha-tarefa)"
        flags:
          - long: --agent
            arg: agent
            help: "Agente específico (default: puppy genérico)"
          - long: --model
            arg: model
            help: "Modelo Claude: haiku | sonnet | opus (default: haiku)"
          - long: --timeout
            arg: seconds
            default: "300"
            help: "Timeout em segundos (default 300)"
          - long: --headless
            help: "Modo headless: ninguém está observando"
          - long: --max-turns
            arg: max_turns
            default: "12"
            help: "Máximo de turnos Claude (default 12)"
        filename: commands/puppy_task.sh

      - name: agent
        help: "Executa um agente nomeado, opcionalmente em uma task."
        args:
          - name: agent
            required: true
            help: "Nome do agente (ex. monolito, orquestrador)"
        flags:
          - long: --task
            arg: task
            help: "Nome da task (opcional)"
          - long: --model
            arg: model
            help: "Modelo Claude: haiku | sonnet | opus (default: haiku)"
          - long: --timeout
            arg: seconds
            default: "300"
            help: "Timeout em segundos (default 300)"
          - long: --headless
            help: "Modo headless: ninguém está observando"
          - long: --max-turns
            arg: max_turns
            default: "12"
            help: "Máximo de turnos Claude (default 12)"
        filename: commands/puppy_agent.sh

  # ── Docker (servicos estrategia) ──────────────────────────
  - name: docker
    alias: [dk]
    help: "Gerencia servicos Docker da estrategia"
    commands:
      - name: monolito
        alias: [mono]
        help: "Servico monolito (Go API)"
        commands:
          - name: install
            help: "Instala dependencias Go no container"
            filename: commands/docker_monolito_install.sh
            flags:
              - long: --env
                short: -e
                arg: env
                default: sand
                help: "Ambiente (sand, prod)"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: shell
            help: "Abre shell no container (ou executa comando)"
            filename: commands/docker_monolito_shell.sh
            flags:
              - long: --container
                short: -c
                arg: container
                default: app
                help: "Container (app, worker, postgres, redis)"
              - long: --cmd
                arg: cmd
                help: "Comando a executar"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: logs
            help: "Exibe logs do servico"
            filename: commands/docker_monolito_logs.sh
            flags:
              - long: --follow
                short: -f
                help: "Seguir logs em tempo real"
              - long: --tail
                short: -t
                arg: tail
                default: "100"
                help: "Numero de linhas"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: status
            help: "Status dos containers"
            filename: commands/docker_monolito_status.sh
          - name: build
            help: "Constroi imagem Docker"
            filename: commands/docker_monolito_build.sh
            flags:
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: flush
            help: "Para containers e remove volumes"
            filename: commands/docker_monolito_flush.sh
            flags:
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: test
            help: "Roda testes no container (default: make test-ldi)"
            filename: commands/docker_monolito_test.sh
            flags:
              - long: --cmd
                arg: cmd
                help: "Comando a executar (default: make test-ldi)"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: server
            help: "Gerencia servidor monolito"
            commands:
              - name: start
                alias: [up]
                help: "Sobe o servidor"
                filename: commands/docker_monolito_server_start.sh
                flags:
                  - long: --env
                    short: -e
                    arg: env
                    default: sand
                    help: "Ambiente (sand, prod)"
                  - long: --detach
                    short: -d
                    help: "Modo detach"
                  - long: --debug
                    help: "Modo debug (dlv)"
                  - long: --worktree
                    arg: worktree
                    help: "Worktree alternativo"
              - name: stop
                alias: [down]
                help: "Para o servidor"
                filename: commands/docker_monolito_server_stop.sh
                flags:
                  - long: --worktree
                    arg: worktree
                    help: "Worktree alternativo"
          - name: worker
            help: "Gerencia worker monolito"
            commands:
              - name: start
                alias: [up]
                help: "Sobe o worker"
                filename: commands/docker_monolito_worker_start.sh
                flags:
                  - long: --env
                    short: -e
                    arg: env
                    default: sand
                    help: "Ambiente (sand, prod)"
                  - long: --detach
                    short: -d
                    help: "Modo detach"
                  - long: --debug
                    help: "Modo debug (dlv)"
                  - long: --worktree
                    arg: worktree
                    help: "Worktree alternativo"
              - name: stop
                alias: [down]
                help: "Para o worker"
                filename: commands/docker_monolito_worker_stop.sh
                flags:
                  - long: --worktree
                    arg: worktree
                    help: "Worktree alternativo"

      - name: bo-container
        alias: [bo]
        help: "Servico bo-container (Vue2 admin)"
        commands:
          - name: install
            help: "Instala dependencias Node no container"
            filename: commands/docker_bo_container_install.sh
            flags:
              - long: --env
                short: -e
                arg: env
                default: sand
                help: "Ambiente (sand, prod)"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: shell
            help: "Abre shell no container (ou executa comando)"
            filename: commands/docker_bo_container_shell.sh
            flags:
              - long: --container
                short: -c
                arg: container
                default: app
                help: "Container (app)"
              - long: --cmd
                arg: cmd
                help: "Comando a executar"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: logs
            help: "Exibe logs do servico"
            filename: commands/docker_bo_container_logs.sh
            flags:
              - long: --follow
                short: -f
                help: "Seguir logs em tempo real"
              - long: --tail
                short: -t
                arg: tail
                default: "100"
                help: "Numero de linhas"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: status
            help: "Status dos containers"
            filename: commands/docker_bo_container_status.sh
          - name: build
            help: "Constroi imagem Docker"
            filename: commands/docker_bo_container_build.sh
            flags:
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: flush
            help: "Para containers e remove volumes"
            filename: commands/docker_bo_container_flush.sh
            flags:
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: test
            help: "Roda testes no container (default: yarn test)"
            filename: commands/docker_bo_container_test.sh
            flags:
              - long: --cmd
                arg: cmd
                help: "Comando a executar (default: yarn test)"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: server
            help: "Gerencia servidor bo-container"
            commands:
              - name: start
                alias: [up]
                help: "Sobe o servidor"
                filename: commands/docker_bo_container_server_start.sh
                flags:
                  - long: --env
                    short: -e
                    arg: env
                    default: sand
                    help: "Ambiente (sand, prod)"
                  - long: --detach
                    short: -d
                    help: "Modo detach"
                  - long: --debug
                    help: "Modo debug (dlv)"
                  - long: --worktree
                    arg: worktree
                    help: "Worktree alternativo"
              - name: stop
                alias: [down]
                help: "Para o servidor"
                filename: commands/docker_bo_container_server_stop.sh
                flags:
                  - long: --worktree
                    arg: worktree
                    help: "Worktree alternativo"

      - name: front-student
        alias: [front, fs]
        help: "Servico front-student (Nuxt2)"
        commands:
          - name: install
            help: "Instala dependencias Node no container"
            filename: commands/docker_front_student_install.sh
            flags:
              - long: --env
                short: -e
                arg: env
                default: sand
                help: "Ambiente (sand, prod)"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: shell
            help: "Abre shell no container (ou executa comando)"
            filename: commands/docker_front_student_shell.sh
            flags:
              - long: --container
                short: -c
                arg: container
                default: app
                help: "Container (app)"
              - long: --cmd
                arg: cmd
                help: "Comando a executar"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: logs
            help: "Exibe logs do servico"
            filename: commands/docker_front_student_logs.sh
            flags:
              - long: --follow
                short: -f
                help: "Seguir logs em tempo real"
              - long: --tail
                short: -t
                arg: tail
                default: "100"
                help: "Numero de linhas"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: status
            help: "Status dos containers"
            filename: commands/docker_front_student_status.sh
          - name: build
            help: "Constroi imagem Docker"
            filename: commands/docker_front_student_build.sh
            flags:
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: flush
            help: "Para containers e remove volumes"
            filename: commands/docker_front_student_flush.sh
            flags:
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: test
            help: "Roda testes no container (default: yarn test)"
            filename: commands/docker_front_student_test.sh
            flags:
              - long: --cmd
                arg: cmd
                help: "Comando a executar (default: yarn test)"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
          - name: server
            help: "Gerencia servidor front-student"
            commands:
              - name: start
                alias: [up]
                help: "Sobe o servidor"
                filename: commands/docker_front_student_server_start.sh
                flags:
                  - long: --env
                    short: -e
                    arg: env
                    default: sand
                    help: "Ambiente (sand, prod)"
                  - long: --detach
                    short: -d
                    help: "Modo detach"
                  - long: --debug
                    help: "Modo debug (dlv)"
                  - long: --vertical
                    short: -V
                    arg: vertical
                    default: carreiras-juridicas
                    help: "Vertical (carreiras-juridicas, concursos, medicina, etc.)"
                  - long: --worktree
                    arg: worktree
                    help: "Worktree alternativo"
              - name: stop
                alias: [down]
                help: "Para o servidor"
                filename: commands/docker_front_student_server_stop.sh
                flags:
                  - long: --worktree
                    arg: worktree
                    help: "Worktree alternativo"

  # ── Worktree (atalho interativo) ──────────────────────────
  - name: hooks
    alias: [hook]
    help: "Executa um hook do Claude Code e mostra o que seria injetado."
    args:
      - name: hook
        help: "Nome do hook (ex: session-start, pre-tool-use, user-prompt-submit)"
        required: true
      - name: env_overrides
        help: "Variaveis de ambiente KEY=VALUE para override (ex: DEBUG=ON PERSONALITY=OFF)"
        repeatable: true
    flags:
      - long: --list
        short: -l
        help: "Lista hooks disponiveis"
    filename: commands/hooks.sh

  - name: worktree
    alias: [wt]
    help: "Lista worktrees dos servicos Docker e permite escolher worktree + comando interativamente."
    args:
      - name: service
        help: "Filtrar por servico (opcional; sem = todos)"
    filename: commands/worktree.sh

  - name: new-task
    alias: [task-new]
    help: Cria task + card no kanban (Puppy).
    args:
      - name: name
        required: true
        help: Nome da task (ex. minha-tarefa).
    flags:
      - long: --type
        arg: type
        default: pending
        help: "pending ou recurring"
      - long: --model
        arg: model
        help: "haiku ou sonnet"
      - long: --clock
        arg: clock
        help: "every10 ou every60"
      - long: --timeout
        arg: timeout
        help: Timeout em segundos
    filename: commands/new_task.sh

  - name: status
    alias: [st]
    help: "Status agregado: sessoes, docker services e puppy workers."
    filename: commands/status.sh

  # ── Host operations (stow / switch) ──────────────────────
  - name: stow
    help: "Deploy dotfiles no host via GNU stow (restow, delete, status)."
    args:
      - name: action
        default: restow
        help: "Ação: restow (default), delete, status"
    flags:
      - long: --reload
        short: -r
        help: "Após deploy, recarrega Hyprland (hyprctl reload) e Waybar (SIGUSR2)"
    filename: commands/stow_command.sh

  - name: switch
    alias: [sw]
    help: "Aplica configuração NixOS no host (nh os switch/test/boot/build)."
    args:
      - name: mode
        default: switch
        help: "Modo: switch (default), test, boot, build"
    filename: commands/switch.sh

  - name: edit
    help: Abre sessao com ~/nixos em /workspace/mnt e /workspace/logs.
    flags:
      - long: --engine
        arg: engine
        help: "Engine: opencode | claude | cursor (default: cursor)"
      - long: --resume
        arg: session_id
        help: "Retoma sessão (UUID ou 1 para última)"
      - long: --model
        arg: model
        help: "Modelo Claude: haiku | sonnet | opus (default: sonnet)"
    filename: commands/host_edit.sh

  - name: help
    help: Mostra o banner com comandos principais.
    filename: commands/help.sh

  - name: man
    help: Documentacao completa de todos os comandos e flags.
    filename: commands/man.sh

  - name: debug
    help: "Toggle do modo DEBUG (testing overrides). Liga/desliga observacao da sessao."
    filename: commands/debug.sh
