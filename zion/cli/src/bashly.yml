name: zion
help: ZION - agent orchestration system
version: "1.0"
environment_variables:
  - name: ZION_NIXOS_DIR
    help: "Raiz do repo NixOS (default $HOME/nixos)"
  - name: OBSIDIAN_PATH
    help: "Caminho do vault Obsidian (default $HOME/.ovault/Work)"

flags:
  - long: --engine
    arg: engine
    help: "Engine da sessão/worker: opencode | claude | cursor (obrigatório em run se não estiver em ~/.zion)"
  - long: --model
    arg: model
    help: "Modelo Claude: haiku | opus (default: sonnet)"
  - long: --instance
    arg: id
    help: "Sufixo da instância (ex. 2 = zion-projeto-2)"
  - long: --rw
    help: Montar projeto em read-write (default para run)
  - long: --ro
    help: Montar projeto read-only
  - long: --danger
    help: "Bypass de permissões no engine (claude: --permission-mode bypassPermissions; cursor: --force; opencode: env auto-approve)"
  - long: --init-md
    arg: file
    default: contexto.md
    help: "Arquivo markdown inicial carregado por todos os engines (default: contexto.md no projeto). Claude: --append-system-prompt-file; Cursor: prompt com @file; OpenCode: env."
  - long: --resume
    arg: session_id
    help: "Retoma sessão: cursor/agent usa --resume=UUID; claude usa --resume; opencode: env ZION_RESUME_SESSION."

  - long: --analysis-mode
    short: -A
    help: "Modo análise: injeta prompt experimental no container (proativo, self-modifying, debug livre sem output pro user)."
commands:
  - name: continue
    alias: [cont]
    help: Continua a última sessão.
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    filename: commands/continue.sh

  - name: new
    alias: [run, r, open, code]
    default: force
    help: Nova sessão no container. Exige --engine (ou engine= em ~/.zion).
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --engine
        arg: engine
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
    examples:
      - zion new --engine=claude
      - zion new --engine=cursor ~/projects
      - zion run --engine=opencode ~/meu-projeto
    filename: commands/new_session.sh

  - name: shell
    alias: [sh]
    help: Abre bash no container com o projeto montado.
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    filename: commands/shell.sh

  - name: resume
    help: Mostra lista de sessões e permite escolher qual retomar.
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --resume
        arg: session_id
        help: "UUID da sessão (opcional; sem isso mostra lista)"
    filename: commands/resume.sh

  - name: start
    help: "[DEPRECATED] Use 'zion new --engine=claude --danger'. Mantido por compatibilidade."
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    filename: commands/start.sh

  # ── Claude (sessão ou usage) ─────────────────────────────────
  - name: claude
    help: "Nova sessão Claude ou consultar uso. Sem subcomando = nova sessão."
    commands:
      - name: new
        help: "Nova sessão com engine Claude (= zion new --engine=claude)."
        default: true
        args:
          - name: dir
            help: "Diretório do projeto (default ~/projects)"
        flags:
          - long: --init-md
            arg: file
            default: contexto.md
          - long: --danger
          - long: --resume
            arg: session_id
          - long: --model
            arg: model
          - long: --instance
            arg: id
          - long: --rw
          - long: --ro
        filename: commands/engine_claude.sh
      - name: usage
        alias: [u]
        help: "Estatísticas de uso Claude (API OAuth / claude.ai)."
        flags:
          - long: --waybar
            help: "Formato Waybar (text, tooltip, class) para o usage bar consumir"
          - long: --json
            help: "JSON bruto da API (five_hour, seven_day, seven_day_sonnet)"
          - long: --no-cache
            help: "Pula cache, busca direto na API"
          - long: --refresh
            help: "Alias de --no-cache"
        filename: commands/claude_usage.sh

      - name: token
        alias: [t]
        help: "Imprime o OAuth access token do Claude (util para curl manual)."
        filename: commands/claude_token.sh

  - name: cursor
    help: "Atalho: nova sessão com engine Cursor (= zion new --engine=cursor)."
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
    filename: commands/engine_cursor.sh

  - name: opencode
    alias: [oc]
    help: "Atalho: nova sessão com engine OpenCode (= zion new --engine=opencode)."
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
    filename: commands/engine_opencode.sh

  # ── Container (build / down / destroy) ─────────────────────
  - name: build
    help: Build da imagem Docker do leech (claude-nix-sandbox).
    filename: commands/build.sh

  - name: down
    help: Para todos os containers do projeto.
    filename: commands/down.sh

  - name: shutdown
    help: "Para containers do compose + mata qualquer stray com nome zion/claude/puppy."
    filename: commands/shutdown.sh

  - name: destroy
    help: Para containers e remove imagens/volumes.
    filename: commands/destroy.sh

  - name: clean
    alias: [gc, prune]
    help: "Remove sessoes Zion paradas/exited e containers orfaos."
    flags:
      - long: --force
        short: -f
        help: "Remove sem pedir confirmacao"
    filename: commands/clean.sh

  - name: update
    alias: [install]
    help: Regenera CLI (bashly) e instala/atualiza symlink em stow/.local/bin.
    filename: commands/update.sh

  - name: init
    help: Cria ~/.zion a partir de config.example (não sobrescreve se já existir).
    flags:
      - long: --force
        help: Sobrescreve ~/.zion se já existir
    filename: commands/init.sh

  - name: set
    help: "Define engine padrão em ~/.zion (engine= claude | opencode | cursor)."
    args:
      - name: engine
        required: true
        help: "Engine padrão: claude | opencode | cursor"
    filename: commands/set_engine.sh

  # ── Docker (servicos estrategia) ──────────────────────────
  # servico: monolito | bo-container | front-student (aliases: mono | bo | front/fs)
  - name: docker
    alias: [dk]
    help: "Gerencia servicos Docker. Ex: zion docker logs monolito --follow"
    commands:
      - name: install
        help: "Instala dependencias no container (mono|bo|front)"
        args:
          - name: service
            required: true
            help: "Servico: monolito | bo-container | front-student"
        flags:
          - long: --env
            short: -e
            arg: env
            default: sand
            help: "Ambiente (sand, prod)"
          - long: --worktree
            arg: worktree
            help: "Worktree alternativo"
        filename: commands/docker_install.sh

      - name: shell
        help: "Abre shell no container (mono|bo|front)"
        args:
          - name: service
            required: true
            help: "Servico: monolito | bo-container | front-student"
        flags:
          - long: --container
            short: -c
            arg: container
            default: app
            help: "Container (app, worker, postgres, redis)"
          - long: --cmd
            arg: cmd
            help: "Comando a executar"
          - long: --worktree
            arg: worktree
            help: "Worktree alternativo"
        filename: commands/docker_shell.sh

      - name: logs
        help: "Exibe logs do servico (mono|bo|front)"
        args:
          - name: service
            required: true
            help: "Servico: monolito | bo-container | front-student"
        flags:
          - long: --follow
            short: -f
            help: "Seguir logs em tempo real"
          - long: --tail
            short: -t
            arg: tail
            default: "100"
            help: "Numero de linhas"
          - long: --worktree
            arg: worktree
            help: "Worktree alternativo"
        filename: commands/docker_logs.sh

      - name: status
        help: "Status dos containers (mono|bo|front)"
        args:
          - name: service
            required: true
            help: "Servico: monolito | bo-container | front-student"
        filename: commands/docker_status.sh

      - name: build
        help: "Constroi imagem Docker (mono|bo|front)"
        args:
          - name: service
            required: true
            help: "Servico: monolito | bo-container | front-student"
        flags:
          - long: --worktree
            arg: worktree
            help: "Worktree alternativo"
        filename: commands/docker_build.sh

      - name: flush
        help: "Para containers e remove volumes (mono|bo|front)"
        args:
          - name: service
            required: true
            help: "Servico: monolito | bo-container | front-student"
        flags:
          - long: --worktree
            arg: worktree
            help: "Worktree alternativo"
        filename: commands/docker_flush.sh

      - name: test
        help: "Roda testes no container (mono|bo|front)"
        args:
          - name: service
            required: true
            help: "Servico: monolito | bo-container | front-student"
        flags:
          - long: --cmd
            arg: cmd
            help: "Comando (default: make test-ldi para mono, yarn test para bo/front)"
          - long: --worktree
            arg: worktree
            help: "Worktree alternativo"
        filename: commands/docker_test.sh

      - name: server
        help: "Gerencia servidor (mono|bo|front)"
        commands:
          - name: start
            alias: [up]
            help: "Sobe o servidor"
            args:
              - name: service
                required: true
                help: "Servico: monolito | bo-container | front-student"
            flags:
              - long: --env
                short: -e
                arg: env
                default: sand
                help: "Ambiente (sand, prod)"
              - long: --detach
                short: -d
                help: "Modo detach"
              - long: --debug
                help: "Modo debug (dlv)"
              - long: --vertical
                short: -V
                arg: vertical
                default: carreiras-juridicas
                help: "Vertical front-student (carreiras-juridicas, concursos, etc.)"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
            filename: commands/docker_server_start.sh
          - name: stop
            alias: [down]
            help: "Para o servidor"
            args:
              - name: service
                required: true
                help: "Servico: monolito | bo-container | front-student"
            flags:
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
            filename: commands/docker_server_stop.sh

      - name: worker
        help: "Gerencia worker (apenas monolito)"
        commands:
          - name: start
            alias: [up]
            help: "Sobe o worker"
            args:
              - name: service
                default: monolito
                help: "Servico (default: monolito)"
            flags:
              - long: --env
                short: -e
                arg: env
                default: sand
                help: "Ambiente (sand, prod)"
              - long: --detach
                short: -d
                help: "Modo detach"
              - long: --debug
                help: "Modo debug (dlv)"
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
            filename: commands/docker_worker_start.sh
          - name: stop
            alias: [down]
            help: "Para o worker"
            args:
              - name: service
                default: monolito
                help: "Servico (default: monolito)"
            flags:
              - long: --worktree
                arg: worktree
                help: "Worktree alternativo"
            filename: commands/docker_worker_stop.sh

  # ── Worktree (atalho interativo) ──────────────────────────
  - name: hooks
    alias: [hook]
    help: "Executa um hook do Claude Code e mostra o que seria injetado."
    args:
      - name: hook
        help: "Nome do hook (ex: session-start, pre-tool-use, user-prompt-submit)"
        required: true
      - name: env_overrides
        help: "Variaveis de ambiente KEY=VALUE para override (ex: DEBUG=ON PERSONALITY=OFF)"
        repeatable: true
    flags:
      - long: --list
        short: -l
        help: "Lista hooks disponiveis"
    filename: commands/hooks.sh

  - name: worktree
    alias: [wt]
    help: "Lista worktrees dos servicos Docker e permite escolher worktree + comando interativamente."
    args:
      - name: service
        help: "Filtrar por servico (opcional; sem = todos)"
    filename: commands/worktree.sh

  # ── Tasks (card system) ──────────────────────────────────────
  - name: tasks
    alias: [t, task]
    help: "Gerencia tasks (cards em TODO/DOING/DONE)."
    commands:
      - name: run
        help: "Executa uma task card pelo nome (sem prefixo de data, sem .md)."
        args:
          - name: name
            required: true
            help: "Nome da task (ex: doctor). Busca em TODO/ e DOING/."
        flags:
          - long: --max-turns
            short: -t
            arg: max_turns
            help: "Sobrescreve max_turns do frontmatter do card."
        filename: commands/tasks_run.sh
      - name: list
        alias: [ls, status, st, log]
        help: "Lista cards em TODO/DOING/DONE. Com --log mostra log de execucao."
        flags:
          - long: --all
            short: -a
            help: "Mostra todas as pastas (TODO + DOING + DONE)"
          - long: --log
            short: -l
            help: "Mostra log de execucao em vez dos cards"
          - long: --lines
            short: -n
            arg: lines
            default: "20"
            help: "Linhas do log (default 20, so com --log)"
        filename: commands/tasks_list.sh
      - name: new
        help: "Cria um novo card de task."
        args:
          - name: name
            required: true
            help: "Nome da task (ex: minha-tarefa)"
        flags:
          - long: --model
            arg: model
            default: haiku
            help: "Modelo: haiku | sonnet | opus"
          - long: --timeout
            arg: timeout
            default: "300"
            help: "Timeout em segundos"
          - long: --when
            arg: when
            help: "Data/hora (YYYYMMDD_HH_MM). Default: agora."
          - long: --agent
            arg: agent
            help: "Nome do agente (carrega memory)"
        filename: commands/tasks_new.sh
      - name: tick
        alias: [tk]
        help: "Roda um tick local: lista cards vencidos e executa serialmente. Usa #stepsN no card como max_turns (default 30)."
        flags:
          - long: --dry-run
            short: -d
            help: "Apenas lista o que seria executado, sem rodar."
          - long: --steps
            short: -s
            arg: steps
            help: "Sobrescreve #stepsN de todos os cards."
        filename: commands/tasks_tick.sh

  - name: status
    alias: [st]
    help: "Status agregado: sessoes e docker services."
    filename: commands/status.sh

  # ── Host operations (stow / os) ───────────────────────────
  - name: stow
    help: "Deploy dotfiles no host via GNU stow (restow, delete, status)."
    args:
      - name: action
        default: restow
        help: "Ação: restow (default), delete, status"
    flags:
      - long: --reload
        short: -r
        help: "Após deploy, recarrega Hyprland (hyprctl reload) e Waybar (SIGUSR2)"
    filename: commands/stow_command.sh

  - name: os
    help: "Aplica configuração NixOS no host via nh os."
    commands:
      - name: switch
        alias: [sw]
        help: "nh os switch (aplica imediatamente)"
        filename: commands/os_switch.sh
      - name: test
        alias: [t]
        help: "nh os test (aplica sem tornar default)"
        filename: commands/os_test.sh
      - name: boot
        alias: [b]
        help: "nh os boot (aplica no próximo boot)"
        filename: commands/os_boot.sh
      - name: build
        help: "nh os build (só compila, não aplica)"
        filename: commands/os_build.sh

  - name: leech
    alias: [l]
    help: "Engatou numa pasta — sessão efêmera (auto-detecta nixos → monta logs)."
    args:
      - name: dir
        help: "Pasta a engatou (default: ~/projects). nixos repo detectado automaticamente."
    flags:
      - long: --shell
        short: -s
        help: "Bash interativo em vez de engine AI"
      - long: --engine
        arg: engine
        help: "Engine: opencode | claude | cursor (default: ~/.zion)"
      - long: --model
        arg: model
        help: "Modelo Claude: haiku | sonnet | opus"
      - long: --resume
        arg: session_id
        help: "Retoma sessão (UUID)"
      - long: --danger
        help: "Bypass de permissões"
      - long: --ro
        help: "Montar read-only"
      - long: --rw
        help: "Montar read-write (default)"
      - long: --init-md
        arg: file
        default: contexto.md
    filename: commands/leech.sh

  - name: lab
    help: "Abre sessão lab: ~/nixos em /workspace/mnt + /workspace/logs (lab_mode=1)."
    flags:
      - long: --engine
        arg: engine
        help: "Engine: opencode | claude | cursor (default: cursor)"
      - long: --resume
        arg: session_id
        help: "Retoma sessão (UUID ou 1 para última)"
      - long: --model
        arg: model
        help: "Modelo Claude: haiku | sonnet | opus (default: sonnet)"
    filename: commands/lab.sh

  # ── Git helpers ───────────────────────────────────────────
  - name: git
    alias: [g]
    help: "Utilitarios Git. Ex: zion git sandbox"
    commands:
      - name: append
        alias: [ap]
        help: "Merge da branch atual em <BRANCH> (recriada limpa do remote), push e volta."
        args:
          - name: branch
            required: true
            help: "Branch destino (ex: sandbox, staging)"
        flags:
          - long: --no-push
            help: "Nao faz push (apenas merge local)"
          - long: --yes
            short: -y
            help: "Pula confirmacao interativa"
        filename: commands/git_sandbox.sh

  - name: help
    help: Mostra o banner com comandos principais.
    filename: commands/help.sh

  - name: man
    help: Documentacao completa de todos os comandos e flags.
    filename: commands/man.sh

  - name: beta
    help: "Toggle do modo BETA (beta overrides). Liga/desliga observacao da sessao."
    filename: commands/beta.sh
