name: zion
help: ZION - agent orchestration system
version: "1.0"
environment_variables:
  - name: ZION_NIXOS_DIR
    help: "Raiz do repo NixOS (default $HOME/nixos)"
  - name: OBSIDIAN_PATH
    help: "Caminho do vault Obsidian (default $HOME/.ovault)"

flags:
  - long: --engine
    arg: engine
    help: "Engine da sessão/worker: opencode | claude | cursor (obrigatório em run se não estiver em ~/.zion)"
  - long: --model
    arg: model
    help: "Modelo Claude: haiku | opus (default: sonnet)"
  - long: --instance
    arg: id
    help: "Sufixo da instância (ex. 2 = zion-projeto-2)"
  - long: --rw
    help: Montar projeto em read-write (default para run)
  - long: --ro
    help: Montar projeto read-only
  - long: --danger
    help: "Bypass de permissões no engine (claude: --permission-mode bypassPermissions; cursor: --force; opencode: env auto-approve)"
  - long: --init-md
    arg: file
    default: contexto.md
    help: "Arquivo markdown inicial carregado por todos os engines (default: contexto.md no projeto). Claude: --append-system-prompt-file; Cursor: prompt com @file; OpenCode: env."
  - long: --resume
    arg: session_id
    help: "Retoma sessão: cursor/agent usa --resume=UUID; claude usa --resume; opencode: env ZION_RESUME_SESSION."

commands:
  - name: continue
    alias: [cont]
    default: force
    help: Continua a última sessão (mesmo que digitar só zion).
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    filename: commands/continue.sh

  - name: new
    alias: [run, r, open, code]
    help: Nova sessão no container. Exige --engine (ou engine= em ~/.zion).
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --engine
        arg: engine
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
    examples:
      - zion new --engine=claude
      - zion new --engine=cursor ~/projects
      - zion run --engine=opencode ~/meu-projeto
    filename: commands/new_session.sh

  - name: shell
    alias: [sh]
    help: Abre bash no container com o projeto montado.
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    filename: commands/shell.sh

  - name: resume
    help: Mostra lista de sessões e permite escolher qual retomar.
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --resume
        arg: session_id
        help: "UUID da sessão (opcional; sem isso mostra lista)"
    filename: commands/resume.sh

  - name: start
    help: "[DEPRECATED] Use 'zion new --engine=claude --danger'. Mantido por compatibilidade."
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    filename: commands/start.sh

  # ── Claude (sessão ou usage) ─────────────────────────────────
  - name: claude-usage
    help: "Estatísticas de uso Claude (API OAuth / claude.ai). Saída: --waybar = JSON para usage bar; sem flag = JSON bruto."
    flags:
      - long: --waybar
        help: "Formato Waybar (text, tooltip, class) para o usage bar consumir"
      - long: --json
        help: "JSON bruto da API (five_hour, seven_day, seven_day_sonnet)"
      - long: --refresh
        help: "Força fetch, ignora cache"
    filename: commands/claude_usage.sh

  - name: claude
    help: "Atalho: nova sessão com engine Claude (= zion new --engine=claude)."
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
    filename: commands/engine_claude.sh

  - name: cursor
    help: "Atalho: nova sessão com engine Cursor (= zion new --engine=cursor)."
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
    filename: commands/engine_cursor.sh

  - name: opencode
    alias: [oc]
    help: "Atalho: nova sessão com engine OpenCode (= zion new --engine=opencode)."
    args:
      - name: dir
        help: "Diretório do projeto (default ~/projects)"
    flags:
      - long: --init-md
        arg: file
        default: contexto.md
      - long: --danger
      - long: --resume
        arg: session_id
      - long: --model
        arg: model
      - long: --instance
        arg: id
      - long: --rw
      - long: --ro
    filename: commands/engine_opencode.sh

  # ── Ask (atalho para puppy query) ───────────────────────────
  - name: ask
    help: "Atalho: envia prompt ao Puppy (= zion puppy query)."
    args:
      - name: prompt
        required: true
        help: "Prompt a enviar (ex. 'diga oi')"
    flags:
      - long: --headless
        help: "Modo headless: ninguém está observando, vá o mais longe possível"
      - long: --timeout
        arg: seconds
        help: "Timeout em segundos (default 300)"
      - long: --model
        arg: model
        help: "Modelo Claude: haiku | sonnet | opus (default: haiku)"
    filename: commands/ask.sh

  # ── Container (build / down / destroy) ─────────────────────
  - name: build
    help: Build da imagem Docker do sandbox.
    filename: commands/build.sh

  - name: down
    help: Para todos os containers do projeto.
    filename: commands/down.sh

  - name: destroy
    help: Para containers e remove imagens/volumes.
    filename: commands/destroy.sh

  - name: clean
    alias: [gc, prune]
    help: "Remove sessoes Zion paradas/exited e containers orfaos."
    flags:
      - long: --force
        short: -f
        help: "Remove sem pedir confirmacao"
    filename: commands/clean.sh

  - name: update
    alias: [install]
    help: Regenera CLI (bashly) e instala/atualiza symlink em stow/.local/bin.
    filename: commands/update.sh

  - name: init
    help: Cria ~/.zion a partir de config.example (não sobrescreve se já existir).
    flags:
      - long: --force
        help: Sobrescreve ~/.zion se já existir
    filename: commands/init.sh

  - name: set
    help: "Define engine padrão em ~/.zion (engine= claude | opencode | cursor)."
    args:
      - name: engine
        required: true
        help: "Engine padrão: claude | opencode | cursor"
    filename: commands/set_engine.sh

  # ── Puppy (worker persistente) ────────────────────────────
  - name: puppy
    alias: [p]
    help: "Gerencia o Puppy worker (container persistente + task runner)."
    commands:
      - name: start
        help: "Inicia o container puppy e o daemon interno."
        filename: commands/puppy_start.sh
      - name: stop
        help: "Para o container puppy."
        filename: commands/puppy_stop.sh
      - name: restart
        help: "Reinicia o container puppy (stop + start)."
        filename: commands/puppy_restart.sh
      - name: run
        help: "Roda uma task especifica dentro do container puppy."
        args:
          - name: task
            required: true
            help: "Nome da task (de _scheduled/ ou backlog/)"
        filename: commands/puppy_run.sh
      - name: status
        alias: [st]
        help: "Mostra estado do container e tasks."
        filename: commands/puppy_status.sh
      - name: logs
        help: "Segue logs do container puppy."
        flags:
          - long: --follow
            short: -f
            help: "Follow log output"
        filename: commands/puppy_logs.sh
      - name: shell
        help: "Abre bash dentro do container puppy."
        filename: commands/puppy_shell.sh
      - name: tick
        help: "Roda 1 tick do scheduler imediatamente (para teste)."
        filename: commands/puppy_tick.sh
      - name: query
        alias: [q]
        help: "Envia um prompt ao Claude dentro do container puppy (headless = sem supervisão)."
        args:
          - name: prompt
            required: true
            help: "Prompt a enviar (ex. 'diga oi')"
        flags:
          - long: --headless
            help: "Modo headless: ninguém está observando, vá o mais longe possível"
          - long: --timeout
            arg: seconds
            help: "Timeout em segundos (default 300). O agente é informado do deadline."
          - long: --model
            arg: model
            help: "Modelo Claude: haiku | sonnet | opus (default: haiku)"
        filename: commands/puppy_query.sh

  # ── Docker (servicos estrategia) ──────────────────────────
  - name: docker
    alias: [dk]
    help: "Gerencia servicos Docker da estrategia (monolito, bo-container, front-student, etc.)"
    commands:
      - name: run
        alias: [up]
        help: "Levanta um servico em container Docker."
        args:
          - name: service
            required: true
            help: "Nome do servico (monolito, bo-container, front-student)"
        flags:
          - long: --env
            short: -e
            arg: environment
            default: sand
            help: "Ambiente: sand | prod | qa | local (default: sand)"
          - long: --detach
            short: -d
            help: "Roda em background (detached, sem follow de logs)"
          - long: --debug
            help: "Modo debug: compila sem otimizações e expõe delve na porta 2345 (attach via VS Code DAP)"
          - long: --worktree
            short: -w
            arg: name
            help: "Usa um git worktree alternativo (nome = ultimo componente do path)"
          - long: --vertical
            short: -V
            arg: vertical
            help: "Vertical do front-student (carreiras-juridicas, concursos, medicina, etc.)"
        filename: commands/docker_run.sh

      - name: stop
        help: "Para um servico Docker."
        args:
          - name: service
            required: true
            help: "Nome do servico"
        flags:
          - long: --worktree
            short: -w
            arg: name
            help: "Worktree alternativo"
        filename: commands/docker_stop.sh

      - name: logs
        help: "Mostra logs de um servico Docker."
        args:
          - name: service
            required: true
            help: "Nome do servico"
        flags:
          - long: --follow
            short: -f
            help: "Follow log output"
          - long: --tail
            arg: lines
            default: "100"
            help: "Numero de linhas (default 100)"
          - long: --worktree
            short: -w
            arg: name
            help: "Worktree alternativo"
        filename: commands/docker_logs.sh

      - name: status
        alias: [ps]
        help: "Status dos servicos Docker."
        args:
          - name: service
            help: "Nome do servico (opcional; sem = todos)"
        filename: commands/docker_status.sh

      - name: shell
        help: "Abre shell interativo ou executa comando com Go toolchain no container do servico."
        args:
          - name: service
            required: true
            help: "Nome do servico"
        flags:
          - long: --container
            short: -C
            arg: name
            default: app
            help: "Container especifico (app, worker, postgres, redis). Default: app (usado sem -c)"
          - long: --cmd
            short: -c
            arg: command
            help: "Comando a executar em container dev (golang + make, source montado). Ex: make test"
          - long: --worktree
            short: -w
            arg: name
            help: "Worktree alternativo"
        examples:
          - zion docker shell monolito
          - zion docker shell monolito -c make test
          - zion docker shell monolito -c "make test-ldi"
          - zion docker shell monolito -C worker
          - zion docker shell monolito --worktree feat-xyz
        filename: commands/docker_shell.sh

      - name: restart
        help: "Reinicia um servico Docker."
        args:
          - name: service
            required: true
        flags:
          - long: --env
            short: -e
            arg: environment
            help: "Ambiente (se omitido, mantem o atual)"
          - long: --worktree
            short: -w
            arg: name
            help: "Worktree alternativo"
        filename: commands/docker_restart.sh

      - name: build
        help: "Rebuilda a imagem Docker do servico (sem derrubar containers)."
        args:
          - name: service
            required: true
            help: "Nome do servico (monolito, bo-container, front-student)"
        flags:
          - long: --worktree
            short: -w
            arg: name
            help: "Worktree alternativo"
        filename: commands/docker_build.sh

      - name: flush
        help: "Remove tudo do servico: containers, imagens, volumes, logs e vendor/."
        args:
          - name: service
            required: true
            help: "Nome do servico (monolito, bo-container, front-student)"
        flags:
          - long: --worktree
            short: -w
            arg: name
            help: "Worktree alternativo"
        filename: commands/docker_flush.sh

      - name: install
        help: "Instala dependencias do servico (monta SSH do host, roda go mod download + build automaticamente)."
        args:
          - name: service
            required: true
            help: "Nome do servico (monolito, bo-container, front-student)"
        flags:
          - long: --env
            short: -e
            arg: environment
            default: sand
            help: "Ambiente: sand | prod | qa | local (default: sand)"
          - long: --worktree
            short: -w
            arg: name
            help: "Worktree alternativo"
        filename: commands/docker_install.sh

  # ── Worktree (atalho interativo) ──────────────────────────
  - name: worktree
    alias: [wt]
    help: "Lista worktrees dos servicos Docker e permite escolher worktree + comando interativamente."
    args:
      - name: service
        help: "Filtrar por servico (opcional; sem = todos)"
    filename: commands/worktree.sh

  - name: new-task
    alias: [task-new]
    help: Cria task + card no kanban (Puppy).
    args:
      - name: name
        required: true
        help: Nome da task (ex. minha-tarefa).
    flags:
      - long: --type
        arg: type
        default: pending
        help: "pending ou recurring"
      - long: --model
        arg: model
        help: "haiku ou sonnet"
      - long: --clock
        arg: clock
        help: "every10 ou every60"
      - long: --timeout
        arg: timeout
        help: Timeout em segundos
    filename: commands/new_task.sh

  - name: status
    alias: [st]
    help: "Status agregado: sessoes, docker services e puppy workers."
    filename: commands/status.sh

  - name: edit
    help: Abre sessao com ~/nixos em /workspace/mnt e /workspace/logs.
    flags:
      - long: --engine
        arg: engine
        help: "Engine: opencode | claude | cursor (default: cursor)"
      - long: --resume
        arg: session_id
        help: "Retoma sessão (UUID ou 1 para última)"
    filename: commands/host_edit.sh

  - name: help
    help: Mostra o banner com comandos principais.
    filename: commands/help.sh

  - name: man
    help: Documentacao completa de todos os comandos e flags.
    filename: commands/man.sh
