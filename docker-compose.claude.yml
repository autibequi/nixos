x-common: &common
  build:
    context: .
    dockerfile: Dockerfile.claude
  image: claude-nix-sandbox
  environment:
    # PATH explícito (evita host sobrescrever; claude e ferramentas no .nix-profile)
    - PATH=/home/claude/.nix-profile/bin:/usr/bin:/bin
    # openclaw: config isolada para container (gateway local + lmstudio via host.docker.internal)
    - OPENCLAW_CONFIG_PATH=/home/claude/.openclaw/openclaw-container.json
    - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
    - XDG_RUNTIME_DIR=/run/user/1000
    - PULSE_SERVER=unix:/run/user/1000/pulse/native
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    - ANTHROPIC_ADMIN_KEY=${ANTHROPIC_ADMIN_KEY:-}
    - CLAUDE_SESSION=${CLAUDE_SESSION:-}
    - GH_TOKEN=${GH_TOKEN:-}
    - GIT_AUTHOR_NAME=${GIT_AUTHOR_NAME:-Pedrinho}
    - GIT_AUTHOR_EMAIL=${GIT_AUTHOR_EMAIL:-pedro.correa@estrategia.com}
    - GIT_COMMITTER_NAME=${GIT_AUTHOR_NAME:-Pedrinho}
    - GIT_COMMITTER_EMAIL=${GIT_AUTHOR_EMAIL:-pedro.correa@estrategia.com}
    - CLAUDE_ENV=container
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ${HOME}/projects:/home/claude/projects
    - ${HOME}/.openclaw:/home/claude/.openclaw
    - ${HOME}/.claude.json:/home/claude/.claude.json
    - ${HOME}/.local/share/claude-code:/home/claude/.claude
    - ${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}:/run/user/1000/${WAYLAND_DISPLAY}
    - ${XDG_RUNTIME_DIR}/pulse:/run/user/1000/pulse
    - .:/workspace
    # Obsidian vault (interface CLAUDINHO → Obsidian)
    - ${HOME}/.ovault/Work:/workspace/vault
    # Host read-only mounts (observabilidade)
    - /var/log/journal:/host/journal:ro
    - /proc/meminfo:/host/proc/meminfo:ro
    - /proc/loadavg:/host/proc/loadavg:ro
    - /proc/uptime:/host/proc/uptime:ro
    - ${CONTAINER_SOCK:-/var/run/docker.sock}:/host/podman.sock:ro

services:
  # Container persistente pra sessões interativas
  sandbox:
    <<: *common
    container_name: claude-sandbox
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash", "-c"]
    command: ["sleep infinity"]

  # OpenClaw Gateway — isolado do claude-sandbox
  # Vault completo em leitura; vault/openclaw exclusivo em escrita
  # Pré-requisito: mkdir -p ~/.ovault/Work/openclaw
  # Attach TUI: docker exec -it claude-openclaw bash  (ou make claw)
  openclaw:
    <<: *common
    container_name: claude-openclaw
    network_mode: host
    stdin_open: true
    tty: true
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command: ["openclaw gateway & sleep infinity"]
    volumes:
      - ${HOME}/.openclaw:/home/claude/.openclaw
      # vault completo read-only
      - ${HOME}/.ovault/Work:/workspace/vault:ro
      # pasta exclusiva openclaw read-write (override do :ro acima)
      - ${HOME}/.ovault/Work/openclaw:/workspace/vault/openclaw

  # Worker every60 — tasks longas (a cada hora)
  worker:
    <<: *common
    mem_limit: 12g
    memswap_limit: 16g
    entrypoint: ["/bin/bash"]
    command: ["/workspace/scripts/clau-runner.sh"]

  # Worker every10 — tasks rápidas (a cada 10 min)
  worker-fast:
    <<: *common
    mem_limit: 4g
    memswap_limit: 6g
    entrypoint: ["/bin/bash"]
    command: ["/workspace/scripts/clau-runner.sh"]
