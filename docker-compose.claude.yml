x-common-env: &common-env
  PATH: /home/claude/.nix-profile/bin:/usr/bin:/bin
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_ADMIN_KEY: ${ANTHROPIC_ADMIN_KEY:-}
  CLAUDE_SESSION: ${CLAUDE_SESSION:-}
  GH_TOKEN: ${GH_TOKEN:-}
  CLAUDE_ENV: container

x-extra-hosts: &extra-hosts
  - "host.docker.internal:host-gateway"

x-media-env: &media-env
  OPENCLAW_CONFIG_PATH: /home/claude/.openclaw/openclaw-container.json
  WAYLAND_DISPLAY: ${WAYLAND_DISPLAY}
  XDG_RUNTIME_DIR: /run/user/1000
  PULSE_SERVER: unix:/run/user/1000/pulse/native

x-full-volumes: &full-volumes
  - .:/workspace
  - ${CLAUDIO_MOUNT:-/tmp/claude-mount-empty}:/workspace/mount:${CLAUDIO_MOUNT_OPTS:-rw}
  - ${HOME}/.ovault/Work:/workspace/obsidian
  - ${HOME}/projects:/home/claude/projects
  - ${CLAUDE_DATA_DIR:-${HOME}/.local/share/claude-code}:/home/claude/.claude
  - ${HOME}/.claude.json:/home/claude/.claude.json
  - ${HOME}/.openclaw:/home/claude/.openclaw
  - ${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}:/run/user/1000/${WAYLAND_DISPLAY}
  - ${XDG_RUNTIME_DIR}/pulse:/run/user/1000/pulse
  - /var/log/journal:/host/journal:ro
  - /proc/meminfo:/host/proc/meminfo:ro
  - /proc/loadavg:/host/proc/loadavg:ro
  - /proc/uptime:/host/proc/uptime:ro
  - ${CONTAINER_SOCK:-/var/run/docker.sock}:/host/podman.sock:ro

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-nix-sandbox
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash", "-c"]
    command: ["sleep infinity"]
    environment:
      <<: [*common-env, *media-env]
      GIT_AUTHOR_NAME: Pedrinho
      GIT_AUTHOR_EMAIL: pedro.correa@estrategia.com
      GIT_COMMITTER_NAME: Claudinho
      GIT_COMMITTER_EMAIL: claudinho@autibequi.com
    extra_hosts: *extra-hosts
    volumes: *full-volumes

  claudio:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-nix-sandbox
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash", "-c"]
    command: ["sleep infinity"]
    environment:
      <<: [*common-env, *media-env]
      GIT_AUTHOR_NAME: Pedrinho
      GIT_AUTHOR_EMAIL: pedro.correa@estrategia.com
      GIT_COMMITTER_NAME: Claudinho
      GIT_COMMITTER_EMAIL: claudinho@autibequi.com
    extra_hosts: *extra-hosts
    volumes: *full-volumes

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-nix-sandbox
    container_name: claude-openclaw
    network_mode: host
    stdin_open: true
    tty: true
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command: ["openclaw gateway & sleep infinity"]
    environment:
      <<: [*common-env, *media-env]
    extra_hosts: *extra-hosts
    volumes: *full-volumes

  opencode:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-nix-sandbox
    container_name: opencode
    network_mode: host
    stdin_open: true
    tty: true
    restart: unless-stopped
    entrypoint: ["/bin/bash", "-c"]
    command: ["sleep infinity"]
    environment:
      <<: *common-env
    extra_hosts: *extra-hosts
    volumes:
      - .:/workspace
      - ${HOME}/.opencode:/home/claude/.opencode
      - ./stow/.claude:/workspace/.claude

  codio:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-nix-sandbox
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash", "-c"]
    command: ["sleep infinity"]
    environment:
      <<: *common-env
    extra_hosts: *extra-hosts
    volumes:
      - .:/workspace
      - ${CLAUDIO_MOUNT:-/tmp/claude-mount-empty}:/workspace/mount:${CLAUDIO_MOUNT_OPTS:-rw}
      - ${HOME}/.opencode:/home/claude/.opencode
      - ${CLAUDE_DATA_DIR:-${HOME}/.local/share/claude-code}:/home/claude/.claude
      - ./stow/.claude:/workspace/.claude

  worker:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-nix-sandbox
    mem_limit: 12g
    memswap_limit: 16g
    entrypoint: ["/bin/bash"]
    command: ["/workspace/scripts/clau-runner.sh"]
    environment:
      <<: [*common-env, *media-env]
      GIT_AUTHOR_NAME: Buchecha
      GIT_AUTHOR_EMAIL: buchecha@autibequi.com
      GIT_COMMITTER_NAME: Buchecha
      GIT_COMMITTER_EMAIL: buchecha@autibequi.com
    extra_hosts: *extra-hosts
    volumes: *full-volumes
