services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-nix-sandbox
    container_name: claude-sandbox
    userns_mode: keep-id
    environment:
      # Permite Clipboard em CLI em Wayland
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=/run/user/1000
      # PipeWire/PulseAudio para gravação de áudio (Claude /voice)
      - PULSE_SERVER=unix:/run/user/1000/pulse/native
    volumes:
      # Host Claude Attach
      - ${HOME}/.claude:/home/claude/.claude
      - ${HOME}/.claude.json:/home/claude/.claude.json
      - ./stow/.claude/commands:/home/claude/.claude/commands
      # Settings do Claudinho (stow como fonte de verdade)
      - ./stow/.claude/settings.json:/home/claude/.claude/settings.json:ro
      # Wayland display forwarding
      - ${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}:/run/user/1000/${WAYLAND_DISPLAY}
      # PipeWire/PulseAudio socket para áudio
      - ${XDG_RUNTIME_DIR}/pulse:/run/user/1000/pulse
      - .:/workspace
    stdin_open: true
    tty: true
    entrypoint: ["/home/claude/.nix-profile/bin/bash", "-c"]
    command: ["sleep infinity"]
