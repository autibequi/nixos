x-common-env: &common-env
  PATH: /home/claude/.nix-profile/bin:/usr/bin:/bin
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  ANTHROPIC_ADMIN_KEY: ${ANTHROPIC_ADMIN_KEY:-}
  CLAUDE_SESSION: ${CLAUDE_SESSION:-}
  GH_TOKEN: ${GH_TOKEN:-}
  CLAUDE_ENV: container

x-extra-hosts: &extra-hosts
  - "host.docker.internal:host-gateway"

x-base-volumes: &base-volumes
  - ${HOME}/nixos:/workspace/host
  - claude-credentials:/home/claude/.claude
  - ${HOME}/.claude.json:/home/claude/.claude.json

services:
  sandbox:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-nix-sandbox
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash", "-c"]
    command: ["sleep infinity"]
    environment:
      <<: *common-env
      GIT_AUTHOR_NAME: Pedrinho
      GIT_AUTHOR_EMAIL: pedro.correa@estrategia.com
      GIT_COMMITTER_NAME: Claudinho
      GIT_COMMITTER_EMAIL: claudinho@autibequi.com
    extra_hosts: *extra-hosts
    volumes: *base-volumes

  claudio:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-nix-sandbox
    network_mode: host
    stdin_open: true
    tty: true
    entrypoint: ["/bin/bash", "-c"]
    command: ["sleep infinity"]
    environment:
      <<: *common-env
      GIT_AUTHOR_NAME: Pedrinho
      GIT_AUTHOR_EMAIL: pedro.correa@estrategia.com
      GIT_COMMITTER_NAME: Claudinho
      GIT_COMMITTER_EMAIL: claudinho@autibequi.com
    extra_hosts: *extra-hosts
    volumes: *base-volumes

  worker:
    build:
      context: .
      dockerfile: Dockerfile.claude
    image: claude-nix-sandbox
    mem_limit: 12g
    memswap_limit: 16g
    entrypoint: ["/bin/bash"]
    command: ["/workspace/host/scripts/clau-runner.sh"]
    environment:
      <<: *common-env
      GIT_AUTHOR_NAME: Buchecha
      GIT_AUTHOR_EMAIL: buchecha@autibequi.com
      GIT_COMMITTER_NAME: Buchecha
      GIT_COMMITTER_EMAIL: buchecha@autibequi.com
    extra_hosts: *extra-hosts
    volumes: *base-volumes

volumes:
  claude-credentials:
    # Shared ~/.claude/ across all claude containers.
    # Persists auth tokens, project history between starts.
    driver: local
