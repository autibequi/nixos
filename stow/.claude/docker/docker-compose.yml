services:
  claude:
    build:
      context: .
      dockerfile: Dockerfile.claude
    container_name: claude-persistent
    restart: unless-stopped
    userns_mode: keep-id
    command: ["sleep", "infinity"]
    volumes:
      # Tulpa Workspace
      - .:/workspace
      # Bloqueio de acesso aos arquivos de configuração da Tulpa
      - ./.claude/settings.local.json:/workspace/.claude/settings.local.json:ro
      - ./.claude/settings.json:/workspace/.claude/settings.json:ro
      # Credenciais SSH (github)
      - ~/.ssh/claudinho:/root/.ssh/claudinho:ro
      - ~/.ssh/claudinho.pub:/root/.ssh/claudinho.pub:ro
      # Permite Wayland Clipboard
      - ${XDG_RUNTIME_DIR}/${WAYLAND_DISPLAY}:/run/user/1000/${WAYLAND_DISPLAY}
      # PipeWire/PulseAudio socket para áudio
      - ${XDG_RUNTIME_DIR}/pulse:/run/user/1000/pulse
      # Dependencias
      # Cache de módulos Go
      - ./.gomod:/home/node/go
    env_file:
      - .env
    environment:
      - INSIDE_DOCKER=true
      - GIT_AUTHOR_NAME
      - GIT_AUTHOR_EMAIL
      # Permite Clipboard em CLI em Wayland
      - WAYLAND_DISPLAY=${WAYLAND_DISPLAY}
      - XDG_RUNTIME_DIR=/run/user/1000
      # PipeWire/PulseAudio para gravação de áudio (Claude/voice)
      - PULSE_SERVER=unix:/run/user/1000/pulse/native

