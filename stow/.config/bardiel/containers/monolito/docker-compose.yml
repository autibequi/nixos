# Stack unificada. Um Dockerfile com targets runtime | runtime-debug.
# Perfil app-debug / worker-debug: build com DEBUG_BUILD=1 (binários para Delve).

x-app-base: &app-base
  build:
    context: ${MONOLITO_DIR}
    dockerfile: ${VENNON_SERVICE_DIR}/Dockerfile
    target: runtime
    args:
      DEBUG_BUILD: "0"
  container_name: vennon-dk-monolito-app
  cpus: "14.4"
  depends_on:
    postgres:
      condition: service_healthy
    monolito-redis:
      condition: service_healthy
    localstack:
      condition: service_started
  env_file:
    - ${MONOLITO_DIR}/.${APP_ENV:-sandbox}.env
  environment:
    - APP_ENV=${APP_ENV:-sandbox}
    - REDIS_URL=monolito-redis:6379
    - REDIS_STUDY_TIME_URL=monolito-redis:6379
    - DB_HOST=postgres
    - DOCKER_HOST=unix:///var/run/docker.sock
    - TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE=/var/run/docker.sock
  volumes:
    - ${MONOLITO_DIR}/configuration:/go/app/configuration:ro
    - /var/run/docker.sock:/var/run/docker.sock
    - ${HOME}/.vennon:/.vennon:rw
  ports:
    - "4004:4004"
    - "2345:2345"
  networks:
    default:
      aliases:
        - api.local.estrategia-sandbox.com.br
  restart: unless-stopped

x-worker-base: &worker-base
  build:
    context: ${MONOLITO_DIR}
    dockerfile: ${VENNON_SERVICE_DIR}/Dockerfile
    target: runtime
    args:
      DEBUG_BUILD: "0"
  container_name: vennon-dk-monolito-worker-app
  command: ["./worker"]
  cpus: "14.4"
  depends_on:
    postgres:
      condition: service_healthy
    monolito-redis:
      condition: service_healthy
  env_file:
    - ${MONOLITO_DIR}/.${APP_ENV:-sandbox}.env
  environment:
    - REDIS_URL=monolito-redis:6379
    - REDIS_STUDY_TIME_URL=monolito-redis:6379
    - DB_HOST=postgres
  volumes:
    - ${MONOLITO_DIR}/configuration:/go/app/configuration:ro
    - ${HOME}/.vennon:/.vennon:rw
  networks:
    - default
  restart: unless-stopped

services:
  postgres:
    image: postgres:16-alpine
    container_name: vennon-dk-monolito-postgres
    cpus: "2"
    environment:
      POSTGRES_USER: ${DB_USER:-estrategia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-estrategia}
      POSTGRES_DB: ${DB_NAME:-estrategia}
    volumes:
      - monolito-pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-estrategia}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  monolito-redis:
    image: redis:7-alpine
    container_name: vennon-dk-monolito-redis
    cpus: "1"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  localstack:
    image: localstack/localstack:3.8
    container_name: vennon-dk-monolito-localstack
    cpus: "2"
    environment:
      SERVICES: sqs,s3
      DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health >/dev/null 2>&1 || exit 1"]
      interval: 8s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - default

  app:
    <<: *app-base
    profiles: [app]

  app-debug:
    <<: *app-base
    profiles: [app-debug]
    build:
      context: ${MONOLITO_DIR}
      dockerfile: ${VENNON_SERVICE_DIR}/Dockerfile
      target: runtime-debug
      args:
        DEBUG_BUILD: "1"
    security_opt:
      - apparmor:unconfined
    cap_add:
      - SYS_PTRACE

  worker:
    <<: *worker-base
    profiles: [worker]

  worker-debug:
    <<: *worker-base
    profiles: [worker-debug]
    build:
      context: ${MONOLITO_DIR}
      dockerfile: ${VENNON_SERVICE_DIR}/Dockerfile
      target: runtime-debug
      args:
        DEBUG_BUILD: "1"
    command:
      [
        "/usr/local/bin/dlv", "exec", "./worker",
        "--headless", "--listen=:2346", "--api-version=2",
        "--accept-multiclient", "--continue",
      ]
    security_opt:
      - apparmor:unconfined
    cap_add:
      - SYS_PTRACE
    ports:
      - "2346:2346"

volumes:
  monolito-pgdata:

networks:
  default:
    name: nixos_default
    external: true
