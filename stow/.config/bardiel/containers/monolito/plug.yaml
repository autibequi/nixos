# monolito — `.<ambiente>.env` na raiz (ex.: .local.env, .sandbox.env, .prod.env).
# `serve` e `serve-debug` exigem `--env` (sandbox|prod|local). Debug usa o mesmo Dockerfile (target runtime-debug + Delve).

commands:
  serve:
    description: Sobe app + deps; APP_ENV conforme --env (local|sandbox|prod)
    options:
      - name: env
        long: env
        required: true
        values: [sandbox, prod, local]
    argv:
      - bash
      - -c
      - |
        set -euo pipefail
        M="${MONOLITO_DIR:-$HOME/projects/estrategia/monolito}"
        export MONOLITO_DIR="$M"
        export VENNON_SERVICE_DIR="$(pwd)"
        case "{env}" in
          local) export APP_ENV=local ;;
          sandbox) export APP_ENV=sandbox ;;
          prod) export APP_ENV=prod ;;
        esac
        CF=()
        ENVF="$M/.${APP_ENV}.env"
        [[ -f "$ENVF" ]] || { echo "monolito: falta $ENVF (no repo: .local.env, .sandbox.env, .prod.env)" >&2; exit 1; }
        CF+=(--env-file "$ENVF")
        exec podman compose "${CF[@]}" --profile app -f docker-compose.yml up -d --force-recreate

  serve-debug:
    description: API com Delve (porta 2345); --env obrigatório como em serve
    options:
      - name: env
        long: env
        required: true
        values: [sandbox, prod, local]
    argv:
      - bash
      - -c
      - |
        set -euo pipefail
        M="${MONOLITO_DIR:-$HOME/projects/estrategia/monolito}"
        export MONOLITO_DIR="$M"
        export VENNON_SERVICE_DIR="$(pwd)"
        case "{env}" in
          local) export APP_ENV=local ;;
          sandbox) export APP_ENV=sandbox ;;
          prod) export APP_ENV=prod ;;
        esac
        CF=()
        ENVF="$M/.${APP_ENV}.env"
        [[ -f "$ENVF" ]] || { echo "monolito: falta $ENVF (no repo: .local.env, .sandbox.env, .prod.env)" >&2; exit 1; }
        CF+=(--env-file "$ENVF")
        exec podman compose "${CF[@]}" --profile app-debug -f docker-compose.yml up -d --force-recreate

  install:
    description: go mod download / tidy / vendor (imagem golang no host; o runtime do app não inclui toolchain)
    argv:
      - /bin/sh
      - -c
      - |
        set -e
        SRC="${MONOLITO_DIR:-$HOME/projects/estrategia/monolito}"
        podman run --rm -it \
          -v "$SRC:/go/app" \
          -v "$HOME/.ssh:/root/.ssh:ro" \
          -e GOPRIVATE=github.com/estrategiahq \
          golang:1.26.1-alpine sh -c "cd /go/app && go mod download && go mod tidy && go work vendor"

  worker:
    description: Start worker stack (+ deps)
    argv:
      - bash
      - -c
      - |
        set -euo pipefail
        M="${MONOLITO_DIR:-$HOME/projects/estrategia/monolito}"
        export MONOLITO_DIR="$M"
        export VENNON_SERVICE_DIR="$(pwd)"
        export APP_ENV="${APP_ENV:-sandbox}"
        CF=()
        ENVF="$M/.${APP_ENV}.env"
        [[ -f "$ENVF" ]] && CF+=(--env-file "$ENVF")
        exec podman compose "${CF[@]}" --profile worker -f docker-compose.yml up -d --force-recreate

  worker-debug:
    description: Worker com Delve (+ deps)
    argv:
      - bash
      - -c
      - |
        set -euo pipefail
        M="${MONOLITO_DIR:-$HOME/projects/estrategia/monolito}"
        export MONOLITO_DIR="$M"
        export VENNON_SERVICE_DIR="$(pwd)"
        export APP_ENV="${APP_ENV:-sandbox}"
        CF=()
        ENVF="$M/.${APP_ENV}.env"
        [[ -f "$ENVF" ]] && CF+=(--env-file "$ENVF")
        exec podman compose "${CF[@]}" --profile worker-debug -f docker-compose.yml up -d --force-recreate
