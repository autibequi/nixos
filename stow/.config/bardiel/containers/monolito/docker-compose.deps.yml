services:
  postgres:
    image: postgres:16-alpine
    container_name: vennon-dk-monolito-postgres
    cpus: "2"
    environment:
      POSTGRES_USER: ${DB_USER:-estrategia}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-estrategia}
      POSTGRES_DB: ${DB_NAME:-estrategia}
    volumes:
      - monolito-pgdata:/var/lib/postgresql/data
      - ./init:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-estrategia}"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  # Nome do serviço NÃO pode ser só "redis": Podman costuma colocar "127.0.0.1 redis" em /etc/hosts
  # do app e isso ganha do DNS da rede — o cliente Go conecta em localhost e falha.
  monolito-redis:
    image: redis:7-alpine
    container_name: vennon-dk-monolito-redis
    cpus: "1"
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - default

  localstack:
    image: localstack/localstack:3.8
    container_name: vennon-dk-monolito-localstack
    cpus: "2"
    environment:
      SERVICES: sqs,s3
      DEFAULT_REGION: us-east-1
    ports:
      - "4566:4566"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health >/dev/null 2>&1 || exit 1"]
      interval: 8s
      timeout: 5s
      retries: 15
      start_period: 20s
    networks:
      - default

volumes:
  monolito-pgdata:

networks:
  default:
    name: nixos_default
    external: true
