# Copiar para ~/.config/bardiel/bardiel.yaml (ou deixar `bardiel init` criar a primeira vers..o).
# Usado para: BARDIEL_PATH (repo bardiel), NIXOS_PATH, binds opcionais do workspace.

# Raiz do checkout bardiel (cont..m crates/plug, justfile).
BARDIEL_PATH: ~/projects/pessoal/bardiel

# Flake / NixOS no host.
NIXOS_PATH: ~/nixos

# --- Opcional: um ..nico mount para /workspace/{self,obsidian,projects,host}
# WORKSPACE_ROOT: ~/vennon

# --- Opcional: target do projeto para yaa/compose (se n..o usares `yaa -d`)
# YAA_TARGET_DIR: ~/projects

# --- Opcional: paths separados (alternativa a WORKSPACE_ROOT)
# SELF_PATH: ...
# OBSIDIAN_PATH: ...
# DEFAULT_TARGET_PATH: ...
BARDIEL_SELF: ~/projects/pessoal/bardiel
BARDIEL_OBSIDIAN: ~/.ovault/Work
BARDIEL_PROJECTS: ~/projects

# --- Estrat..gia / binds do c..digo nos plugs (sem c..pia: podman monta o diret..rio)
# Ordem de resolu....o: vari..vel de ambiente (MONOLITO_DIR, ...) ... CONTAINER_SOURCES ...
# MONOLITO_PATH / BO_CONTAINER_PATH / FRONT_STUDENT_PATH ... ESTRATEGIA_ROOT/<repo> ... ~/projects/estrategia/<repo>
#
# Uma raiz comum:
# ESTRATEGIA_ROOT: ~/projects/estrategia
#
# Ou caminho por repo (equivalente a tr..s entradas em CONTAINER_SOURCES):
MONOLITO_PATH: ~/projects/estrategia/monolito
BO_CONTAINER_PATH: ~/projects/estrategia/bo-container
FRONT_STUDENT_PATH: ~/projects/estrategia/front-student
#
# Overrides pontuais:
# CONTAINER_SOURCES:
#   bo-container: ~/src/bo-container
~
