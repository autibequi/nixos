# Alacritty — config principal
# Otimizado para múltiplas instâncias abertas simultaneamente

[general]
import = ["~/.config/alacritty/dark-theme.toml"]

[window]
padding = { x = 4, y = 4 }
decorations = "None"          # sem barra de título do WM — Hyprland cuida disso
opacity = 1.0                 # sem transparência = sem compositing overhead
dynamic_padding = false
decorations_theme_variant = "Dark"

[scrolling]
history = 2000                # padrão é 10000 — reduz RAM por instância
multiplier = 3

[font]
size = 12.0
builtin_box_drawing = true    # desenha box chars na GPU, não via fonte

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[selection]
save_to_clipboard = false     # evita roundtrip desnecessário ao clipboard

[cursor]
style = { shape = "Block", blinking = "Off" }   # sem blink = sem redraw periódico
unfocused_hollow = true

[terminal]
osc52 = "OnlyCopy"

# Bell: flash vermelho + som. O command externo (bell-cmd.sh) usa paths
# absolutos do NixOS (/run/current-system/sw/bin/play) pra evitar colisão
# com binários homônimos no PATH do user (ex: ~/.local/bin/play do dev).
[bell]
animation = "EaseOutExpo"
color = "#ff2040"
duration = 250
command = { program = "sh", args = ["-c", "$HOME/.config/alacritty/bell-cmd.sh"] }

# Claude Shift Return?
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

# Ctrl+C = copy; Ctrl+Shift+C = SIGINT
# ATENCAO: ctrl+c nao envia ^C — use ctrl+shift+c pra cancelar comandos
[[keyboard.bindings]]
key = "C"
mods = "Control"
action = "Copy"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
chars = "\x03"

# Ctrl+V = paste
[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"

# Ctrl+Shift+V = ^V literal (quoted insert), simétrico ao Ctrl+Shift+C
[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
chars = "\x16"
