# Alacritty — config principal
# Otimizado para múltiplas instâncias abertas simultaneamente

[general]
import = ["~/.config/alacritty/dark-theme.toml"]

[window]
padding = { x = 4, y = 4 }
decorations = "None"          # sem barra de título do WM — Hyprland cuida disso
opacity = 1.0                 # sem transparência = sem compositing overhead
dynamic_padding = false
decorations_theme_variant = "Dark"

[scrolling]
history = 2000                # padrão é 10000 — reduz RAM por instância
multiplier = 3

[font]
size = 12.0
builtin_box_drawing = true    # desenha box chars na GPU, não via fonte

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[selection]
save_to_clipboard = false     # evita roundtrip desnecessário ao clipboard

[cursor]
style = { shape = "Block", blinking = "Off" }   # sem blink = sem redraw periódico
unfocused_hollow = true

[terminal]
osc52 = "OnlyCopy"

# Bell: flash vermelho + som. O command externo (bell-cmd.sh) usa paths
# absolutos do NixOS (/run/current-system/sw/bin/play) pra evitar colisão
# com binários homônimos no PATH do user (ex: ~/.local/bin/play do dev).
[bell]
animation = "EaseOutExpo"
color = "#ff2040"
duration = 250
command = { program = "sh", args = ["-c", "$HOME/.config/alacritty/bell-cmd.sh"] }

# Claude Shift Return?
[[keyboard.bindings]]
key = "Return"
mods = "Shift"
chars = "\u001B\r"

# Ctrl+C = copy; Ctrl+Shift+C = SIGINT
# ATENCAO: ctrl+c nao envia ^C — use ctrl+shift+c pra cancelar comandos
[[keyboard.bindings]]
key = "C"
mods = "Control"
action = "Copy"

[[keyboard.bindings]]
key = "C"
mods = "Control|Shift"
chars = "\x03"

# Ctrl+V = paste
[[keyboard.bindings]]
key = "V"
mods = "Control"
action = "Paste"

# Ctrl+Shift+V = ^V literal (quoted insert), simétrico ao Ctrl+Shift+C
[[keyboard.bindings]]
key = "V"
mods = "Control|Shift"
chars = "\x16"

# Hint: Ctrl+clique (ou Ctrl+Shift+O) em "path:linha" abre o arquivo no Zed.
# O agente emite o path DESDE A RAIZ DO PROJETO (ex: "self/.../SKILL.md:30",
# "apps/.../scoring.go:129"). Como o mesmo formato relativo serve a vários repos,
# o wrapper TESTA em qual raiz conhecida o arquivo existe e abre nessa. Também
# aceita absoluto do host (/home/...) e do container (/workspace/*, traduzido).
# Range "129-147" vira "129" — o zed CLI só aceita uma linha (file:line).
[[hints.enabled]]
regex = '/?(?:[\w.+-]+/)+[\w.+-]+\.[a-z]+:[0-9]+(?:-[0-9]+)?'
hyperlinks = false
post_processing = true
persist = false
mouse = { enabled = true, mods = "Control" }
binding = { key = "O", mods = "Control|Shift" }

[hints.enabled.command]
program = "sh"
args = [
  "-c",
  '''
ref="$(printf '%s' "$1" | sed -E 's/(:[0-9]+)-[0-9]+$/\1/')"
case "$ref" in
  /workspace/*)
    f="$(printf '%s' "$ref" | sed -E -e 's#^/workspace/host/#/home/pedrinho/nixos/#' -e 's#^/workspace/obsidian/#/home/pedrinho/.ovault/Work/#' -e 's#^/workspace/target/#/home/pedrinho/projects/estrategia/coruja/#' -e 's#^/workspace/yaa/#/home/pedrinho/projects/pessoal/yaa/#')"
    exec /run/current-system/sw/bin/zeditor "$f" ;;
  /*) exec /run/current-system/sw/bin/zeditor "$ref" ;;
esac
p="${ref%%:*}"
for root in /home/pedrinho/projects/estrategia/coruja /home/pedrinho/projects/pessoal/yaa /home/pedrinho/nixos /home/pedrinho/.ovault/Work; do
  [ -e "$root/$p" ] && exec /run/current-system/sw/bin/zeditor "$root/$ref"
done
exec /run/current-system/sw/bin/zeditor "/home/pedrinho/projects/estrategia/coruja/$ref"
''',
  "zed-open",
]
