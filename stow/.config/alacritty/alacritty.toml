# Alacritty — config principal
# Otimizado para múltiplas instâncias abertas simultaneamente

[general]
import = ["~/.config/alacritty/dark-theme.toml"]

[window]
padding = { x = 4, y = 4 }
decorations = "None"          # sem barra de título do WM — Hyprland cuida disso
opacity = 1.0                 # sem transparência = sem compositing overhead
dynamic_padding = false
decorations_theme_variant = "Dark"

[scrolling]
history = 2000                # padrão é 10000 — reduz RAM por instância
multiplier = 3

[font]
size = 12.0
builtin_box_drawing = true    # desenha box chars na GPU, não via fonte

[font.normal]
family = "JetBrainsMono Nerd Font"
style = "Regular"

[font.bold]
family = "JetBrainsMono Nerd Font"
style = "Bold"

[font.italic]
family = "JetBrainsMono Nerd Font"
style = "Italic"

[selection]
save_to_clipboard = false     # evita roundtrip desnecessário ao clipboard

[cursor]
style = { shape = "Block", blinking = "Off" }   # sem blink = sem redraw periódico
unfocused_hollow = true

[terminal]
osc52 = "OnlyCopy"

[keyboard]
bindings = []
