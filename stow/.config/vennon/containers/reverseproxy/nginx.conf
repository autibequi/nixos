# Reverse proxy — estrategia local
#
#   local.estrategia-sandbox.com.br       -> front-student  :3005
#   admin.local.estrategia-sandbox.com.br -> bo-container   :9090
#   api.local.estrategia-sandbox.com.br   -> monolito       :4004

server_names_hash_bucket_size 128;

# Só enviar Connection: upgrade quando o cliente pedir (WebSocket). Fixar "upgrade" em todo GET
# quebra muitos upstreams HTTP/1.1 → nginx 502.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# front-student
server {
    listen 80;
    server_name local.estrategia-sandbox.com.br
                carreiras-juridicas.local.estrategia-sandbox.com.br
                concursos.local.estrategia-sandbox.com.br
                medicina.local.estrategia-sandbox.com.br
                militares.local.estrategia-sandbox.com.br;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name local.estrategia-sandbox.com.br
                carreiras-juridicas.local.estrategia-sandbox.com.br
                concursos.local.estrategia-sandbox.com.br
                medicina.local.estrategia-sandbox.com.br
                militares.local.estrategia-sandbox.com.br;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }
}

# bo-container
server {
    listen 80;
    server_name admin.local.estrategia-sandbox.com.br;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name admin.local.estrategia-sandbox.com.br;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    location / {
        proxy_pass https://127.0.0.1:9090;
        proxy_http_version 1.1;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}

# monolito
server {
    listen 80;
    server_name api.local.estrategia-sandbox.com.br
                localhost;
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api.local.estrategia-sandbox.com.br
                localhost;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    location / {
        proxy_pass http://127.0.0.1:4004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
