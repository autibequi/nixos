services:
  claude:
    image: vennon-claude:latest
    container_name: vennon-claude
    mem_limit: 12g
    memswap_limit: 12g
    network_mode: host
    stdin_open: true
    tty: true
    working_dir: /workspace/home
    entrypoint:
    - /entrypoint.sh
    command:
    - /bin/bash
    - -c
    - sleep infinity
    volumes:
    - /home/pedrinho/nixos/leech/self:/workspace/self
    - /home/pedrinho/.ovault/Work:/workspace/obsidian
    - /home/pedrinho/projects:/workspace/projects:rw
    - /home/pedrinho:/workspace/home:rw
    - /home/pedrinho/nixos/leech/self/claude.bypass.json:/home/claude/.claude/settings.json:rw
    - /home/pedrinho/nixos/leech/self/skills:/home/claude/.claude/skills
    - /home/pedrinho/nixos/leech/self/commands:/home/claude/.claude/commands
    - /home/pedrinho/nixos/leech/self/ego:/home/claude/.claude/agents
    - /home/pedrinho/nixos/vennon/containers/claude/hooks:/home/claude/.claude/hooks:ro
    - /home/pedrinho/nixos/leech/self/scripts:/home/claude/.claude/scripts
    - /home/pedrinho/.claude.json:/home/claude/.claude.json
    - /home/pedrinho/.claude/projects:/home/claude/.claude/projects
    - /home/pedrinho/.leech:/home/claude/.leech:rw
    - /proc/meminfo:/host/proc/meminfo:ro
    - /proc/loadavg:/host/proc/loadavg:ro
    - /proc/uptime:/host/proc/uptime:ro
    - /proc/cpuinfo:/host/proc/cpuinfo:ro
    - /proc/version:/host/proc/version:ro
    - /var/log/journal:/workspace/logs/host/journal:ro
    - /var/log:/workspace/logs/host/var-log:ro
    - /home/pedrinho/nixos:/workspace/host:rw
    environment:
      CLAUDE_ENV: container
      DOCKER_HOST: tcp://localhost:2375
      GIT_AUTHOR_EMAIL: pedro.correa@estrategia.com
      GIT_AUTHOR_NAME: Pedro Correa
      GIT_COMMITTER_EMAIL: pedro.correa@estrategia.com
      GIT_COMMITTER_NAME: Pedro Correa
      PATH: /home/claude/.local/bin:/home/claude/.nix-profile/bin:/root/.nix-profile/bin:/usr/bin:/bin
      VENNON_GID: '100'
      VENNON_UID: '1000'
      XDG_CACHE_HOME: /workspace/.ephemeral/cache
    tmpfs:
    - /tmp:size=512m,mode=1777
    cap_drop:
    - NET_RAW
    - SYS_PTRACE
    - SYS_RAWIO
    - MKNOD
    - AUDIT_WRITE
    - NET_BIND_SERVICE
    extra_hosts:
    - host.docker.internal:host-gateway
  docker-proxy:
    image: docker.io/library/nginx:alpine
    container_name: vennon-docker-proxy
    restart: unless-stopped
    ports:
    - 127.0.0.1:2375:2375
    volumes:
    - /var/run/docker.sock:/var/run/docker.sock
    - /home/pedrinho/nixos/vennon/containers/leech/docker-socket-filter.conf:/etc/nginx/conf.d/default.conf:ro
networks:
  default:
    external: true
    name: nixos_default
