services:
  app:
    build:
      context: ${FRONT_STUDENT_DIR}
      dockerfile: ${VENNON_SERVICE_DIR}/Dockerfile
    container_name: vennon-dk-front-student-app
    cpus: "14.4"
    env_file:
      - ./env/${APP_ENV_FILE:-local}.env
    environment:
      - FORCE_COLOR=1
      - TERM=xterm-256color
      - VERTICAL=${VERTICAL:-carreiras-juridicas}
      - NPM_SCRIPT_ENV=${NPM_SCRIPT_ENV:-local}
      - PORT=3005
      # Desabilita call HTTP de telemetria que trava o boot
      - NUXT_TELEMETRY_DISABLED=1
      # Mais RAM pro webpack — evita OOM matar o processo silenciosamente
      - NODE_OPTIONS=--max-old-space-size=4096
    tty: true
    volumes:
      # Bind mount completo: source + node_modules (gerado por vennon docker install)
      - ${FRONT_STUDENT_DIR}:/app
      # Canal de comunicação rápida host ↔ container
      - ${HOME}/.vennon:/.vennon:rw
    extra_hosts:
      - "api.local.estrategia-sandbox.com.br:host-gateway"
    ports:
      - "3005:3005"
    networks:
      - default
    restart: unless-stopped

networks:
  default:
    name: nixos_default
    external: true
