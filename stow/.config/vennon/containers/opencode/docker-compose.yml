services:
  opencode:
    image: vennon-opencode:latest
    container_name: vennon-opencode
    mem_limit: 12g
    memswap_limit: 12g
    network_mode: host
    stdin_open: true
    tty: true
    working_dir: /workspace/home
    entrypoint:
    - /entrypoint.sh
    command:
    - /bin/bash
    - -c
    - sleep infinity
    volumes:
    - /home/pedrinho/nixos/vennon/self:/workspace/self
    - /home/pedrinho/.ovault/Work:/workspace/obsidian
    - /home/pedrinho/projects:/workspace/projects:rw
    - /home/pedrinho:/workspace/home:rw
    - /home/pedrinho/nixos/vennon/self/claude.bypass.json:/home/claude/.claude/settings.json:rw
    - /home/pedrinho/nixos/vennon/self/skills:/home/claude/.claude/skills
    - /home/pedrinho/nixos/vennon/self/commands:/home/claude/.claude/commands
    - /home/pedrinho/nixos/vennon/self/ego:/home/claude/.claude/agents
    - /home/pedrinho/nixos/vennon/containers/opencode/hooks:/home/claude/.claude/hooks:ro
    - /home/pedrinho/nixos/vennon/self/scripts:/home/claude/.claude/scripts
    - /home/pedrinho/.claude.json:/home/claude/.claude.json
    - /home/pedrinho/.claude/projects:/home/claude/.claude/projects
    - /home/pedrinho/.vennon:/home/claude/.vennon:rw
    - /proc/meminfo:/host/proc/meminfo:ro
    - /proc/loadavg:/host/proc/loadavg:ro
    - /proc/uptime:/host/proc/uptime:ro
    - /proc/cpuinfo:/host/proc/cpuinfo:ro
    - /proc/version:/host/proc/version:ro
    - /var/log/journal:/workspace/logs/host/journal:ro
    - /var/log:/workspace/logs/host/var-log:ro
    - /home/pedrinho/nixos:/workspace/host:rw
    - /home/pedrinho/.config/opencode:/home/claude/.config/opencode
    environment:
      CLAUDE_ENV: container
      ENGINE: OPENCODE
      GIT_AUTHOR_EMAIL: pedro.correa@estrategia.com
      GIT_AUTHOR_NAME: Pedro Correa
      GIT_COMMITTER_EMAIL: pedro.correa@estrategia.com
      GIT_COMMITTER_NAME: Pedro Correa
      PATH: /home/claude/.local/bin:/home/claude/.nix-profile/bin:/root/.nix-profile/bin:/usr/bin:/bin
      VENNON_GID: '100'
      VENNON_UID: '1000'
      XDG_CACHE_HOME: /workspace/.ephemeral/cache
      YAA_TARGET_DIR: /home/pedrinho/projects
    tmpfs:
    - /tmp:size=512m,mode=1777
    cap_drop:
    - NET_RAW
    - SYS_PTRACE
    - SYS_RAWIO
    - MKNOD
    - AUDIT_WRITE
    - NET_BIND_SERVICE
    extra_hosts:
    - host.docker.internal:host-gateway
networks:
  default:
    external: true
    name: nixos_default
