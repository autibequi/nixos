# ===================================================================
#                           PROGRAM ALIASES
# ===================================================================
$hyprutils = ~/.config/hypr/hyprutils.sh

# Apps
$terminal          = ghostty
$fileManager       = nautilus -w
$menu              = leech-menu
$lock              = hyprlock
$obsidian          = obsidian
$chrome            = google-chrome-stable --renderer-process-limit=4 --disk-cache-size=52428800
$cursor	           = cursor
# $zed               = ~/.local/zed.app/bin/zed
$zed               = zeditor
$yaak              = appimage-run ~/apps/yaak.AppImage
$colorPicker       = hyprpicker --autocopy --lowercase-hex


# System Tools
$displayManager    = nwg-displays
$networkManager    = nmtui
$audioManager      = ghostty -e wiremix
$emojiPicker       = rofimoji --skin-tone neutral --action copy

# Shortcuts
# $settings          = $zed ~/nixos
$settings          = $cursor ~/nixos
$workObsidian      = $obsidian "obsidian://open?vault=Work"
$personalObsidian  = $obsidian "obsidian://open?vault=.ovault"

# Personal Webapps
$youtubeMusic      = $chrome --app=https://music.youtube.com
$monkeyType        = $chrome --app=https://monkeytype.com
$rainmaker         = $chrome --app=https://www.youtube.com/watch?v=1Xiwqm94T4k

# Work Webapps
$nixSearch         = $chrome --new-window https://search.nixos.org/
$gemini            = $chrome --app=https://gemini.google.com/

$calendar          = $chrome --app=https://calendar.google.com
$chat              = $chrome --app=https://chat.google.com
$youtube           = $chrome --app=https://www.youtube.com
$jira              = $chrome --new-window https://estrategia.atlassian.net/jira/software/c/projects/FUK2/boards/323?quickFilter=1182
$yaak              = notify-send "abrindo yaaaaak" && ~/apps/yaak.AppImage

# Leech (PATH explícito para keybinds)
$claude     = $chrome --app=https://claude.ai/new
$leech       = ghostty -e bash -c 'export PATH="$HOME/nixos/stow/.local/bin:$PATH"; leech; exec bash -i'
$leechResume = ghostty -e bash -c 'export PATH="$HOME/nixos/stow/.local/bin:$PATH"; leech resume; exec bash -i'
$leechShell  = ghostty -e bash -c 'export PATH="$HOME/nixos/stow/.local/bin:$PATH"; leech shell; exec bash -i'
$openclaw   = ghostty -e bash -c 'export PATH="$HOME/nixos/stow/.local/bin:$PATH"; leech openclaw; exec bash -i'
$opencode   = ghostty -e bash -c 'export PATH="$HOME/nixos/stow/.local/bin:$PATH"; leech open; exec bash -i'
$leechRelay  = google-chrome-stable --remote-debugging-port=9222 --user-data-dir=/tmp/chrome-relay --no-first-run --no-default-browser-check
# ===================================================================
#                          APP KEYBINDS
# ===================================================================

# Quick Apps
bind = MOD3, Space,  exec, $menu
bind = MOD3 SHIFT, Space, exec, anyrun
bind = MOD3, t,      exec, $terminal
bind = MOD3, v,      exec, $cursor
bind = MOD3, e,      exec, ghostty -e yazi
bind = MOD3, z,      exec, $zed
bind = MOD3, period, exec, $emojiPicker
bind = MOD3, a,      exec, $audioManager
bind = MOD3, y,      exec, $yaak

# others
bind = MOD3, b,     exec, $chrome
bind = MOD3, g,     exec, $gemini
bind = MOD3 ALT, c,     exec, $claude
bind = MOD3, c,        exec, $leech
bind = MOD3 SHIFT, c,  exec, $leechResume
bind = MOD3, o,        exec, $opencode

# MOD3+p: Leech (respeita ~/.leech)
bind = MOD3, p,        exec, $leech
bind = MOD3 SHIFT, p,  exec, $leechResume

# # Custom Vibecoded Shader
