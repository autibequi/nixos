# ===================================================================
#                           PROGRAM ALIASES
# ===================================================================
$hyprutils = ~/.config/hypr/hyprutils.sh

# Apps (uwsm app -- garante escopo correto na sessão UWSM)
$ghostty 					 = uwsm app -- nvidia-offload ghostty --gtk-single-instance=true # but fast?
$terminal          = uwsm app -- nvidia-offload alacritty
$fileManager       = uwsm app -- nautilus -w
$menu              = uwsm app -- rofi -show drun
$lock              = hyprlock
$obsidian          = uwsm app -- obsidian
$chrome            = uwsm app -- nvidia-offload google-chrome-stable --ozone-platform=x11
$vivaldi           = uwsm app -- vivaldi
$cursor	           = uwsm app -- nvidia-offload cursor
$zed               = uwsm app -- nvidia-offload zeditor
$yaak              = nvidia-offload appimage-run ~/apps/yaak.AppImage
$colorPicker       = hyprpicker --autocopy --lowercase-hex
$quickShell        = qs ipc call overview toggle


# System Tools
$displayManager    = uwsm app -- nwg-displays
$networkManager    = nmtui
$audioManager      = $terminal  -e wiremix
$emojiPicker       = uwsm app -- rofimoji --skin-tone neutral --action copy

# Shortcuts
# $settings          = $zed ~/nixos
$settings          = $zed ~/nixos
$workObsidian      = $obsidian "obsidian://open?vault=Work"
$personalObsidian  = $obsidian "obsidian://open?vault=.ovault"

# Personal Webapps
$youtubeMusic      = $chrome --app=https://music.youtube.com
$monkeyType        = $chrome --app=https://monkeytype.com
$rainmaker         = $chrome --app=https://www.youtube.com/watch?v=1Xiwqm94T4k

# Work Webapps
$nixSearch         = $chrome --new-window https://search.nixos.org/
$gemini            = $chrome --app=https://gemini.google.com/

$calendar          = $chrome --app=https://calendar.google.com
$chat              = $chrome --app=https://chat.google.com
$youtube           = $chrome --app=https://www.youtube.com
$jira              = $chrome --new-window https://estrategia.atlassian.net/jira/software/c/projects/FUK2/boards/323?quickFilter=1182
$yaak              = notify-send "abrindo yaaaaak" && nvidia-offload ~/apps/yaak.AppImage

# vennon (PATH explícito para keybinds)
$claude     = $chrome --app=https://claude.ai/new
$vennon       = $terminal  -e env CLAUDECODE=1 zsh -c 'vennon claude'

$yaaFast      = $terminal  -e env CLAUDECODE=1 zsh -c 'yaa --model=haiku'
$yaa      		= $terminal  -e env CLAUDECODE=1 zsh -c 'yaa --model="sonnet[1]"'
# ===================================================================
#                          APP KEYBINDS
# ===================================================================

# Quickshell Overview
bind = SUPER, Space, exec, $quickShell

# Quick Apps
bind = MOD3, Space,  exec, $menu
bind = MOD3, t,      exec, $terminal
# bind = MOD3, v,      exec, $cursor
bind = MOD3, z,      exec, $zed
bind = MOD3, period, exec, $emojiPicker
bind = MOD3, a,      exec, $audioManager


# others
bind = MOD3, b,     exec, $chrome
bind = MOD3, g,     exec, $gemini
bind = MOD3 ALT, c,     exec, $claude
bind = MOD3, c,        exec, $yaaFast
bind = MOD3 SHIFT, c,  exec, $yaa
bind = MOD3, o,        exec, $opencode

# MOD3+p: vennon (respeita ~/.vennon)
bind = MOD3, p,        exec, $vennon
bind = MOD3 SHIFT, p,  exec, $vennonResume

