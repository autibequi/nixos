

# =============================================
#            CONFIGURATION IMPORTS
# =============================================
# Default Monitor
monitor = ,highres,auto,2
source = ~/.config/hypr/monitors.conf

# Core
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/application.conf
source = ~/.config/hypr/systemtools.conf
source = ~/.config/hypr/workspace.conf
source = ~/.config/hypr/special-workspaces.conf

# Generated theme colors (vennon-theme-apply)
source = ~/.config/hypr/generated-colors.conf

# Plugins
# source = ~/.config/hypr/plugins/hyprexpo.conf
# source = ~/.config/hypr/plugins/dynamic-cursors.conf  # desativado: tilt/shake = overhead GPU
# source = ~/.config/hypr/plugins/hyprspace.conf
# source = ~/.config/hypr/plugins/hyprtasking.conf
# source = ~/.config/hypr/plugins/hyprtrails.conf

# Electron apps (Cursor, VSCode) — Wayland nativo evita popup-behind-tiled via XWayland
env = ELECTRON_OZONE_PLATFORM_HINT,auto

# DGPU
# env = AQ_DRM_DEVICES,/dev/dri/card0:/dev/dri/card1


# ===========================================
#            Startup
# ===========================================
# Cursor
exec-once = hyprctl setcursor rose-pine-hyprcursor 50
env = HYPRCURSOR_THEME,rose-pine-hyprcursor
env = HYPRCURSOR_SIZE,50

# session core
exec-once = systemctl --user start hyprpolkitagent
exec-once = uwsm app -- waybar
exec-once = uwsm app -- qs
exec-once = uwsm app -- swww-daemon
exec-once = swww img "$HOME/assets/wallpapers/the-wild-hunt-of-odin.jpg" --transition-type none
exec-once = uwsm app -- swaync # notifications
# hypridle gerenciado pelo systemd user service (services.hypridle.enable = true no NixOS)

# init utils
exec-once = uwsm app -- wl-paste --watch cliphist store # clipboard
# exec-once = uwsm app -- hyprshade auto # shaders — desativado: overhead GPU por ciclo

# scripts
exec-once = $hyprutils dark_theme

# Whisper PTT — on-demand: systemctl --user start whisper-ptt (+ eww daemon sobe junto)
# exec-once = eww daemon
# exec-once = systemctl --user start whisper-ptt

# Services
# exec-once = uwsm app -- lm-studio # for tabcompletion

# FAST GHOSTTY
# exec-once = uwsm app -- ghostty --gtk-single-instance=true --quit-after-last-window-closed=false --initial-window=false

# ===================================================================
#                  GENERAL WORKSPACE CONFIGURATION
# ===================================================================
general {
    gaps_in                  = 5
    gaps_out                 = 5
    border_size              = 3
    col.active_border        = rgba(7c3aedff) rgba(00ff41ff) 45deg
    # col.inactive_border      = rgba(2d1b4eaa) rgba(003d11aa) 45deg
    layout                   = scrolling #dwindle
    allow_tearing            = false
    resize_on_border         = false
    extend_border_grab_area  = 10
}

scrolling {
    column_width             = 0.50
    fullscreen_on_one_column = true
    focus_fit_method         = 1        # 0 = center, 1 = fit
    follow_focus             = false   # don't scroll when focus moves to another monitor
    follow_min_visible       = 0.0
    explicit_column_widths   = 0.2, 0.25, 0.333, 0.5, 0.667, 1.0
}
# unscale XWayland
# xwayland {
#   force_zero_scaling = true
# }

misc {
    vrr = 2  # 0=off, 1=all monitors, 2=fullscreen only — evita freeze em monitor sem cursor
    vfr = false
    initial_workspace_tracking = on;
    focus_on_activate = true
    animate_manual_resizes = false

    animate_mouse_windowdragging = false
}

render {
    new_render_scheduling = true
    direct_scanout = false  # evita tearing ao entrar/sair de fullscreen
}

decoration {
    blur:enabled = false
    shadow:enabled = false
    rounding = 0
}

# ============================================
#                INPUT SETTINGS
# ============================================
# ref: https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout    = us
    kb_variant   = altgr-intl
    kb_options   = caps:hyper # your caps is now MOD3, use wisely
    follow_mouse = 1          # focus only on click, not hover
    float_switch_override_focus = 0  # impede floating popup de perder foco ao mover mouse

    scroll_factor = 0.7

    touchpad {
        natural_scroll         = true
        disable_while_typing   = true
        tap-to-click           = true
        drag_lock              = false
        clickfinger_behavior   = false
    }
}

# ===========================================
#           ANIMATION SETTINGS
# ===========================================
animations {
    enabled = true

    # Instant — aggressive ease-out, feels like zero delay
    bezier = instant, 0.16, 1.0, 0.3, 1.0

    # Overshot — slight bounce for special workspaces
    bezier = overshot, 0.05, 0.9, 0.1, 1.05

    animation = windows,          1, 1, instant
    animation = windowsOut,       1, 1, instant, popin 90%
    animation = windowsMove,      1, 1, instant
    animation = border,           1, 1, instant
    animation = borderangle,      0, 1, instant
    animation = fade,             1, 1, instant
    animation = workspaces,       1, 1, instant, slide

    # Magic workspaces
    animation = specialWorkspace, 1, 1, overshot, slidevert
}

# ============================================
#              GESTURE BINDINGS
# ============================================
# Workspace switching
gesture = 3, horizontal, workspace

# Resize
gesture = 4, horizontal, scale:0.5, resize
gesture = 4, vertical, scale:0.5, resize

# Cursor zoom
# gesture = 2, pinchin, cursorZoom
# gesture = 2, pinchout, cursorZoom
