# ~/.config/hypr/hypridle.conf
# Wiki: before_sleep locks via loginctl → lock_cmd (hyprlock); after_sleep only turns display on.
general {
    ignore_dbus_inhibit = true
    lock_cmd = pidof hyprlock || hyprlock
    #region agent log
    before_sleep_cmd = /run/current-system/sw/bin/printf "{\"sessionId\":\"1605cf\",\"runId\":\"sleep-debug\",\"hypothesisId\":\"H1,H2\",\"location\":\"stow/.config/hypr/hypridle.conf:before_sleep_cmd\",\"message\":\"hypridle before_sleep\",\"data\":{},\"timestamp\":%s}\n" "$(/run/current-system/sw/bin/date +%s%3N)" >> /home/pedrinho/nixos/.cursor/debug-1605cf.log; pidof hyprlock || hyprlock
    after_sleep_cmd = /run/current-system/sw/bin/printf "{\"sessionId\":\"1605cf\",\"runId\":\"sleep-debug\",\"hypothesisId\":\"H1,H3\",\"location\":\"stow/.config/hypr/hypridle.conf:after_sleep_cmd\",\"message\":\"hypridle after_sleep\",\"data\":{},\"timestamp\":%s}\n" "$(/run/current-system/sw/bin/date +%s%3N)" >> /home/pedrinho/nixos/.cursor/debug-1605cf.log; hyprctl dispatch dpms on
    #endregion
}

listener {
    timeout = 150                                # 2.5min — dim backlight (OLED-safe)
    on-timeout = brightnessctl -s set 10
    on-resume = brightnessctl -r
}

listener {
    timeout = 300                                # 5min — tela apagada
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}

listener {
    timeout = 600                                # 10min — travar tela
    on-timeout = pidof hyprlock || hyprlock
}

listener {
    # 30min — suspend se na bateria
    timeout = 1800
    on-timeout = cat /sys/class/power_supply/ADP*/online 2>/dev/null | grep -q 1 || systemctl suspend
    on-resume = notify-send -u low "Voltou da bateria"
}

listener {
    # 1h — suspend mesmo na energia (AC)
    timeout = 3600
    on-timeout = systemctl suspend
    on-resume = notify-send -u low "Voltou da energia"
}
