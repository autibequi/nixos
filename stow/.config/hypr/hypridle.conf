# ~/.config/hypr/hypridle.conf
# Wiki: before_sleep locks via loginctl → lock_cmd (hyprlock); after_sleep only turns display on.
general {
    ignore_dbus_inhibit = true
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock
    # After wake from suspend, turn display on (avoids having to press key twice)
    after_sleep_cmd = hyprctl dispatch dpms on
    # When lock screen activates: gradual dim over 5s then DPMS off. CPU keeps running.
    on_lock_cmd = bash ~/.config/hypr/dim-on-lock.sh &
    # When unlock: turn monitors back on and restore brightness
    on_unlock_cmd = brightnessctl -r 2>/dev/null; hyprctl dispatch dpms on
}
# Idle 10min -> suspend-then-hibernate (suspend now, hibernate after 30min per systemd HibernateDelaySec)
listener {
    timeout = 900
    on-resume = notify-send "Welcome back!"
    on-timeout = systemctl suspend
}

listener {
    timeout = 150                                # 2.5min.
    on-timeout = brightnessctl -s set 10         # set monitor backlight to minimum, avoid 0 on OLED monitor.
    on-resume = brightnessctl -r                 # monitor backlight restore.
}

listener {
    timeout = 600                                     # 10min
    on-timeout = pidof hyprlock || hyprlock           # lock screen when timeout has passed
}
