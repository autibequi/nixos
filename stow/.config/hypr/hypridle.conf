# ~/.config/hypr/hypridle.conf
# Wiki: before_sleep locks via loginctl → lock_cmd (hyprlock); after_sleep only turns display on.
general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = pidof hyprlock || hyprlock
    after_sleep_cmd = brightnessctl -r 2>/dev/null; ~/.config/hypr/dpms-all-on.sh
    on_unlock_cmd = brightnessctl -r 2>/dev/null; ~/.config/hypr/dpms-all-on.sh
}

listener {
    timeout = 300                                     # 5min idle: lock (respeita inhibitor)
    on-timeout = pidof hyprlock || hyprlock
}

listener {
    timeout = 30                                      # 30s idle: desliga tela SE lockado (ignora inhibitor)
    on-timeout = pgrep -x hyprlock > /dev/null && hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
    ignore_dbus_inhibit = true
}

listener {
    timeout = 1200                                    # 20min idle: suspend (bloqueado se inhibitor ativo)
    on-timeout = systemctl suspend-then-hibernate
}
