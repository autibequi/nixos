# bind = SUPER SHIFT, J, movetoworkspacesilent, special:jira

# Gemini
workspace = special:gemini, gapsout:$defaultGaps, on-created-empty: $gemini, layout:scrolling,layoutopt:direction:right
windowrule = match:workspace special:gemini, border_color rgba(7c3aedcc)
bind = SUPER, G, exec, $hyprutils workspace_switch special:gemini
bind = SUPER SHIFT, G, movetoworkspacesilent, special:gemini


# ===================================================================
#              Fs WORKSPACES CONFIGURATION
# ===================================================================

# Bleh (sem on-created-empty para não reabrir Alacritty ao fechar a janela)
workspace = special:bleh, gapsout:$defaultGaps, on-created-empty: $workObsidian, on-created-empty: $claudinho
windowrule = match:workspace special:bleh, border_color rgba(fff700dd)
bind = SUPER, grave, exec, $hyprutils workspace_switch special:bleh
bind = SUPER SHIFT, grave, movetoworkspacesilent, special:bleh

# F1 Help
workspace = special:f1, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right, on-created-empty: $workObsidian
windowrule = match:workspace special:f1, border_color rgba(7c3aedcc)
bind = SUPER, F1, exec, $hyprutils workspace_switch special:f1
bind = SUPER SHIFT, F1, movetoworkspacesilent, special:f1

# F2 Slot
workspace = special:f2, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right, on-created-empty: $settings
windowrule = match:workspace special:f2, border_color rgba(7c3aedcc)
bind = SUPER, F2, exec, $hyprutils workspace_switch special:f2
bind = SUPER SHIFT, F2, movetoworkspacesilent, special:f2

# F3 Slot
workspace = special:f3, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right
windowrule = match:workspace special:f3, border_color rgba(7c3aedcc)
bind = SUPER, F3, exec, $hyprutils workspace_switch special:f3
bind = SUPER SHIFT, F3, movetoworkspacesilent, special:f3

# F4 Slot
workspace = special:f4, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right
windowrule = match:workspace special:f4, border_color rgba(7c3aedcc)
bind = SUPER, F4, exec, $hyprutils workspace_switch special:f4
bind = SUPER SHIFT, F4, movetoworkspacesilent, special:f4

# ===================================================================
#              Private Fs WORKSPACES CONFIGURATION
# ===================================================================
# F5 Slot (Private)
workspace = special:f5, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right, on-created-empty: $chat
windowrule = match:workspace special:f5, border_color rgba(7c3aedcc), no_screen_share on
bind = SUPER, F5, exec, $hyprutils workspace_switch special:f5
bind = SUPER SHIFT, F5, movetoworkspacesilent, special:f5

# F6 Slot (Private)
workspace = special:f6, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right
