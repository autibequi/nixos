# ===================================================================
#                  SPECIAL WORKSPACES CONFIGURATION
# ===================================================================

$defaultGaps = 32

# Bleh
workspace = special:bleh, gapsout:$defaultGaps, on-created-empty: $terminal, layout:scrolling, layoutopt:direction:right
windowrule = match:workspace special:bleh, border_color rgba(fff700dd)
bind = SUPER, grave, exec, $hyprutils workspace_switch special:bleh
bind = SUPER SHIFT, grave, movetoworkspacesilent, special:bleh

# Jira
workspace = special:jira, gapsout:$defaultGaps, on-created-empty: $jira
windowrule = match:workspace special:jira, border_color rgba(1e68dacc)
bind = SUPER, J, exec, $hyprutils workspace_switch special:jira
bind = SUPER SHIFT, J, movetoworkspacesilent, special:jira

# Obsidian
workspace = special:kwiki, gapsout:$defaultGaps, on-created-empty: $workObsidian
windowrule = match:workspace special:kwiki, border_color rgba(34a853cc)
bind = SUPER, K, exec, $hyprutils workspace_switch special:kwiki
bind = SUPER SHIFT, K, movetoworkspacesilent, special:kwiki

# Settings
workspace = special:settings, gapsout:$defaultGaps, on-created-empty: $settings
windowrule = match:workspace special:settings, border_color rgba(7c3aedcc)
bind = SUPER, comma, exec, $hyprutils workspace_switch special:settings
bind = SUPER SHIFT, comma, movetoworkspacesilent, special:settings

# Yaak
workspace = special:yaak, gapsout:$defaultGaps, on-created-empty: $yaak
windowrule = match:workspace special:yaak, border_color rgba(7c3aedcc)
bind = SUPER, Y, exec, $hyprutils workspace_switch special:yaak
bind = SUPER SHIFT, Y, movetoworkspacesilent, special:yaak

# Call
workspace = special:call, gapsout:$defaultGaps, on-created-empty: $chrome
windowrule = match:workspace special:call, border_color rgba(34a853cc)
bind = SUPER, V, exec, $hyprutils workspace_switch special:call
bind = SUPER SHIFT, V, movetoworkspacesilent, special:call

# Gemini
workspace = special:gemini, gapsout:$defaultGaps, on-created-empty: $gemini, layout:scrolling,layoutopt:direction:right
windowrule = match:workspace special:gemini, border_color rgba(7c3aedcc)
bind = SUPER, G, exec, $hyprutils workspace_switch special:gemini
bind = SUPER SHIFT, G, movetoworkspacesilent, special:gemini

# Chat
workspace = special:chat, gapsout:$defaultGaps,on-created-empty: $chat
windowrule = match:workspace special:chat, border_color rgba(34a853cc)
bind = SUPER, C, exec, $hyprutils workspace_switch special:chat
bind = SUPER SHIFT, C, movetoworkspacesilent, special:chat

# ===================================================================
#                  PRIVATE WORKSPACES CONFIGURATION
# ===================================================================
workspace = special:obsidian, gapsout:$defaultGaps, on-created-empty: $personalObsidian
windowrule = match:workspace special:obsidian, border_color rgba(ffffffcc), no_screen_share on
bind = SUPER, o, exec, $hyprutils workspace_switch special:obsidian
bind = SUPER SHIFT, o, movetoworkspacesilent, special:obsidian

# music
workspace = special:music, gapsout:$defaultGaps, on-created-empty: $youtubeMusic
windowrule = match:workspace special:music, border_color rgba(ff0000cc), no_screen_share on
bind = SUPER, M, exec, $hyprutils workspace_switch special:music
bind = SUPER SHIFT, M, movetoworkspacesilent, special:music

# ===================================================================
#                  Fs WORKSPACES CONFIGURATION
# ===================================================================
# Nix Search
workspace = special:f1, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right, on-created-empty: $nixSearch
windowrule = match:workspace special:f1, border_color rgba(7c3aedcc), no_screen_share on
bind = SUPER, F1, exec, $hyprutils workspace_switch special:f1
bind = SUPER SHIFT, F1, movetoworkspacesilent, special:f1

# F2 Slot
workspace = special:f2, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right
windowrule = match:workspace special:f2, border_color rgba(7c3aedcc), no_screen_share on
bind = SUPER, F2, exec, $hyprutils workspace_switch special:f2
bind = SUPER SHIFT, F2, movetoworkspacesilent, special:f2

# F3 Slot
workspace = special:f3, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right
windowrule = match:workspace special:f3, border_color rgba(7c3aedcc), no_screen_share on
bind = SUPER, F3, exec, $hyprutils workspace_switch special:f3
bind = SUPER SHIFT, F3, movetoworkspacesilent, special:f3

# F4 Slot
workspace = special:f4, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right
windowrule = match:workspace special:f4, border_color rgba(7c3aedcc), no_screen_share on
bind = SUPER, F4, exec, $hyprutils workspace_switch special:f4
bind = SUPER SHIFT, F4, movetoworkspacesilent, special:f4
