bind = SUPER, F6, exec, $hyprutils workspace_switch special:f6
bind = SUPER SHIFT, F6, movetoworkspacesilent, special:f6

# F7 Slot (Private)
workspace = special:f7, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right
windowrule = match:workspace special:f7, border_color rgba(7c3aedcc), no_screen_share on
bind = SUPER, F7, exec, $hyprutils workspace_switch special:f7
bind = SUPER SHIFT, F7, movetoworkspacesilent, special:f7

# F8 Slot (Private)
workspace = special:f8, gapsout:$defaultGaps, layout:scrolling, layoutopt:direction:right
windowrule = match:workspace special:f8, border_color rgba(7c3aedcc), no_screen_share on
