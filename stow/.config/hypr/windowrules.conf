# ============================================
#              WINDOW RULES
# ============================================
# File explorer (Nautilus) as floating popup, centered
windowrule = match:class (org\.gnome\.Nautilus|nautilus), float on, center on, size 1100 700

# File picker dialogs from Cursor/other apps (match by title so embedded pickers float too)
windowrule = match:title (Open File|Save As|Select File|Choose File|Select Folder|Open Folder|Save File|Select Directory|Choose Folder), float on, center on, size 1100 700

# Whisper PTT overlay (eww widget)
windowrule = match:class (eww-whisper-ptt), float on, pin on

# ── Cursor / VSCode — floating popups ficam na frente ────────────────────────
# Problema: apps Electron via XWayland abrem popups que somem atrás de janelas tiled.
# Fix: tag + stay_focused garante que o popup mantém foco até ser fechado.
# ELECTRON_OZONE_PLATFORM_HINT=auto (hyprland.conf) faz rodar Wayland nativo quando possível.

windowrule = tag +electron-popup, match:class (cursor|code|code-url-handler|Cursor|Code) match:float true
windowrule = min_size 1 1,        match:class (cursor|code|code-url-handler|Cursor|Code) match:float true
windowrule = stay_focused on,     match:tag electron-popup

# Portal de arquivo do sistema (xdg-desktop-portal-gtk)
windowrule = float on,   match:class (xdg-desktop-portal-gtk)
windowrule = center on,  match:class (xdg-desktop-portal-gtk)
windowrule = size 70% 60%, match:class (xdg-desktop-portal-gtk)

# Claude session borders
windowrule = match:title (Claude\[pessoal\]), border_color rgba(7c3aedee)
windowrule = match:title (Claude\[trabalho\]), border_color rgba(ff9900ee)
windowrule = match:title (Claude\[worker\]), border_color rgba(00ff41ee)
windowrule = match:title (Claude\[auto\]), border_color rgba(00ccffee)
