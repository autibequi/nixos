# ============================================
#              WINDOW RULES
# ============================================
# File explorer (Nautilus) as floating popup, centered
windowrule = match:class (org\.gnome\.Nautilus|nautilus), float on, center on, size 1100 700

# File picker dialogs from Cursor/other apps (match by title so embedded pickers float too)
windowrule = match:title (Open File|Save As|Select File|Choose File|Select Folder|Open Folder|Save File|Select Directory|Choose Folder), float on, center on, size 1100 700

# Whisper PTT overlay (eww widget)
windowrule = match:class (eww-whisper-ptt), float on, pin on

# Alacritty — 25% width no layout scrolling
windowrule = match:class (Alacritty), col_width 0.25

# Claude session borders
windowrule = match:title (Claude\[pessoal\]), border_color rgba(7c3aedee)
windowrule = match:title (Claude\[trabalho\]), border_color rgba(ff9900ee)
windowrule = match:title (Claude\[worker\]), border_color rgba(00ff41ee)
windowrule = match:title (Claude\[auto\]), border_color rgba(00ccffee)
