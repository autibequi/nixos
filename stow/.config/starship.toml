# Starship — Pure style
# dir + branch + status na esquerda | hora na direita | ❯ embaixo

scan_timeout = 100
command_timeout = 1000
add_newline = false

format = """
$directory\
$git_branch\
$git_status\
$nix_shell\
$cmd_duration\
$line_break\
$character"""

right_format = "$time"

[directory]
style = "bold cyan"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true

[git_branch]
symbol = " "
style = "bold purple"
format = "on [$symbol$branch]($style) "
truncation_length = 24
truncation_symbol = "…"

[git_status]
style = "bold red"
format = '[$all_status$ahead_behind]($style) '
stashed = "📦${count}"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "=${count}"

[nix_shell]
format = "[❄️ $state](dimmed blue) "

[cmd_duration]
min_time = 3000
style = "bold yellow"
format = "took [$duration]($style) "

[time]
disabled = false
time_format = "%H:%M"
style = "dimmed white"
format = "[$time]($style)"

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"

[package]
disabled = true

[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[nodejs]
disabled = true

[rust]
disabled = true

[golang]
disabled = true
