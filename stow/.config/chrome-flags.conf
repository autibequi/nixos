# Google Chrome flags — lido pelo wrapper Nix antes de iniciar o binário
# 1 flag por linha, comentários com #

# Wayland nativo — XWayland era necessário para PRIME offload via GLX (gpu-toggle.nix,
# deletado em 04211b5e). Sem offload ativo, Wayland é melhor: sem startup delay de
# XWayland (freeze de 1-2s na primeira abertura) e sem overhead de composição dupla.
--ozone-platform=wayland
