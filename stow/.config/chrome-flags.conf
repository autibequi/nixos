# Google Chrome flags — lido pelo wrapper Nix antes de iniciar o binário
# 1 flag por linha, comentários com #

# Wayland nativo — XWayland era necessário para PRIME offload via GLX (gpu-toggle.nix,
# deletado em 04211b5e). Sem offload ativo, Wayland é melhor: sem startup delay de
# XWayland (freeze de 1-2s na primeira abertura) e sem overhead de composição dupla.
--ozone-platform=wayland

# 2026-07-02: mesmo com ozone=wayland acima, o Chrome renderizava minúsculo com
# xwayland.force_zero_scaling=true no hyprland.lua (confirmado: desligar a flag
# resolvia). force_zero_scaling força o XWayland a reportar scale=1 pros clients —
# se o Chrome cai em XWayland por qualquer motivo (fallback silencioso, comum com
# NVIDIA proprietário), ele desenha em 1x sem compensar. force-device-scale-factor
# compensa no lado do Chrome, sem precisar mexer na flag global do Hyprland (que
# o Pedro quer manter true pra seguir identificando outros apps presos em XWayland).
--force-device-scale-factor=2
