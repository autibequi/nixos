# Google Chrome flags — lido pelo wrapper Nix antes de iniciar o binário
# 1 flag por linha, comentários com #

# XWayland em vez de Wayland nativo (PRIME offload via GLX funciona com x11)
--ozone-platform=x11

# VAAPI bridge NVIDIA está quebrada — sem isso aparece
# "failed Initialize()ing the frame pool" a cada vídeo
--disable-features=UseChromeOSDirectVideoDecoder,VaapiVideoDecoder
