# ── Auto-playlist ─────────────────────────────────────────────────
# Ao abrir qualquer vídeo, carrega todos os vídeos da pasta como playlist
autocreate-playlist=filter

# ── uosc — substitui o OSC padrão ─────────────────────────────────
osc=no
osd-bar=no

# ── FSRCNNX x2 upscaler ───────────────────────────────────────────
glsl-shader=~~/shaders/FSRCNNX_x2_8-0-4-1.glsl
scale=ewa_lanczos
cscale=ewa_lanczos
video-sync=display-resample
interpolation=yes
tscale=oversample

# ── Audio ──────────────────────────────────────────────────────────
volume=100
volume-max=200
audio-pitch-correction=yes

# ── Legendas ───────────────────────────────────────────────────────
sub-font-size=44
sub-border-size=2.5
sub-ass-override=yes

# ── Comportamento ──────────────────────────────────────────────────
keep-open=yes              # não fecha a janela ao terminar a playlist
save-position-on-quit=yes  # retoma de onde parou
