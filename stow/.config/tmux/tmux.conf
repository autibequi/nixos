# ┌──────────────────────────────────────────────────────────┐
# │  tmux.conf — deep dark theme                             │
# │  Prefix: C-Space  |  Vi mode  |  Mouse on               │
# └──────────────────────────────────────────────────────────┘

# ── Core ────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g mouse on
set -g set-clipboard on

# ── Prefix: C-Space ─────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Reload config ───────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ── Splits — manter cwd ─────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navegação de panes (vim-style) ──────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize de panes ─────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ─────────────────────────────────────────────────
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ── Vi copy mode ────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Bordas de pane ──────────────────────────────────────────
set -g pane-border-style         "fg=#2a2f3a"
set -g pane-active-border-style  "fg=#00d4ff"

# ── Mensagens ───────────────────────────────────────────────
set -g message-style         "fg=#0a0e14,bg=#ffb454,bold"
set -g message-command-style "fg=#0a0e14,bg=#ff79c6,bold"

# ── Status bar ──────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1a1f29,fg=#9ca3af"

# Left — session name com powerline
set -g status-left-length 40
set -g status-left "#[fg=#0a0e14,bg=#00d4ff,bold] #S #[fg=#00d4ff,bg=#1a1f29,nobold]"

# Right — prefix indicator + data + hora
set -g status-right-length 80
set -g status-right "#{?client_prefix,#[fg=#ff79c6#,bold] C-SPC #[nobold],}#[fg=#4a5568] %a %d/%m  #[fg=#e6e6e6,bold]%H:%M#[nobold]  #[fg=#00d4ff]#H "

# ── Janelas ─────────────────────────────────────────────────
set -g window-status-separator "  "
set -g window-status-format         "#[fg=#4a5568] #I #W"
set -g window-status-current-format "#[fg=#00d4ff,bold] #I #W#[nobold]"
set -g window-status-activity-style "fg=#ffb454"
set -g window-status-bell-style     "fg=#ff6b6b,bold"

# ── Modo de cópia ────────────────────────────────────────────
set -g mode-style "fg=#0a0e14,bg=#00d4ff"
