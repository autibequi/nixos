# ┌──────────────────────────────────────────────────────────┐
# │  tmux.conf — deep dark theme                             │
# │  Prefix: C-Space  |  Vi mode  |  Mouse on               │
# └──────────────────────────────────────────────────────────┘

# ── Core ────────────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g history-limit 50000
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g mouse on
set -g set-clipboard on

# ── Prefix: C-Space ─────────────────────────────────────────
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# ── Reload config ───────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ── Splits — manter cwd ─────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Navegação de panes (vim-style) ──────────────────────────
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ── Resize de panes ─────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Windows ─────────────────────────────────────────────────
bind -n M-h previous-window
bind -n M-l next-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# ── Vi copy mode ────────────────────────────────────────────
set -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi C-v send -X rectangle-toggle
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ── Catppuccin Mocha ────────────────────────────────────────
# base=#1e1e2e  surface0=#313244  surface1=#45475a  surface2=#585b70
# text=#cdd6f4  mauve=#cba6f7     blue=#89b4fa      peach=#fab387
# red=#f38ba8   yellow=#f9e2af    teal=#94e2d5

# ── Bordas de pane ──────────────────────────────────────────
set -g pane-border-style         "fg=#313244"
set -g pane-active-border-style  "fg=#cba6f7"

# ── Mensagens ───────────────────────────────────────────────
set -g message-style         "fg=#1e1e2e,bg=#f9e2af,bold"
set -g message-command-style "fg=#1e1e2e,bg=#cba6f7,bold"

# ── Status bar ──────────────────────────────────────────────
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"

# Left — session name com powerline arrow
set -g status-left-length 40
set -g status-left "#[fg=#1e1e2e,bg=#cba6f7,bold]  #S #[fg=#cba6f7,bg=#1e1e2e,nobold]"

# Right — prefix + git branch + data + hora + host
set -g status-right-length 120
set -g status-right "#{?client_prefix,#[fg=#f38ba8,bold] C-SPC #[nobold],}#[fg=#45475a]#(cd #{pane_current_path} && git branch --show-current 2>/dev/null | sed 's/.*/ &/')  #[fg=#585b70]%a %d/%m  #[fg=#cdd6f4,bold]%H:%M#[nobold]  #[fg=#cba6f7]#H "

# ── Janelas ─────────────────────────────────────────────────
set -g window-status-separator "  "
set -g window-status-format         "#[fg=#585b70] #I  #W"
set -g window-status-current-format "#[fg=#89b4fa,bold] #I  #W#[nobold]"
set -g window-status-activity-style "fg=#f9e2af"
set -g window-status-bell-style     "fg=#f38ba8,bold"

# ── Modo de cópia ────────────────────────────────────────────
set -g mode-style "fg=#1e1e2e,bg=#cba6f7"
