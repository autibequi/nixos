force_keyboard_focus = true
close_when_open = true
click_to_close = true
selection_wrap = false
exact_search_prefix = "'"
theme = "dash"
debug = false
ext_background_effect_blur = false
hide_quick_activation = true
keybind_symbols = true
single_click_activation = true

[shell]
anchor_top = false
anchor_bottom = false
anchor_left = false
anchor_right = false

[placeholders]
"default" = { input = "Apps  ·  ! hub  : clip  = calc  > run  / files  @ web  } estratégia", list = "Apps + Downloads/Screenshots · preview →" }
"menus:dashboard" = { input = "Buscar apps, downloads, screenshots…", list = "Status acima · digite para buscar" }
"desktopapplications" = { input = "Apps", list = "Sem apps · Ctrl+P fixar no topo" }
"menus:dash" = { input = "Hub", list = "Status ao vivo · Enter abre · preview →" }
"calc" = { input = "Calculate", list = "Enter expression" }
"runner" = { input = "Run command", list = "No commands" }
"files" = { input = "Arquivos", list = "Downloads · Screenshots · preview →" }
"websearch" = { input = "Search web", list = "" }
"clipboard" = { input = "Clipboard", list = "Clipboard empty" }
"symbols" = { input = "Symbols", list = "No symbols" }
"unicode" = { input = "Unicode", list = "No characters" }
"windows" = { input = "Windows", list = "No windows" }
"providerlist" = { input = "Providers", list = "No providers" }
"menus:wifi" = { input = "Wi-Fi", list = "No networks" }
"menus:power" = { input = "Power", list = "Sem ações" }
"menus:screenshot" = { input = "Screenshot", list = "Sem captura" }
"menus:clock" = { input = "Relógio", list = "Carregando…" }
"menus:estrategia" = { input = "Estratégia", list = "ambiente › pasta › site" }
"wireplumber" = { input = "Áudio", list = "Sem dispositivos" }

[keybinds]
close = ["Escape", "ctrl q"]
next = ["Down", "ctrl j"]
previous = ["Up", "ctrl k"]
toggle_exact = ["ctrl e"]
resume_last_query = ["ctrl r"]

[providers]
default = ["desktopapplications", "files"]
empty = []
ignore_preview = ["desktopapplications", "runner", "windows", "websearch", "providerlist", "menus:power", "menus:screenshot", "menus:clock", "menus:dashboard", "menus:estrategia", "calc", "symbols"]
max_results = 40

[providers.max_results_provider]
desktopapplications = 10
files = 16
runner = 15
clipboard = 12
windows = 12
"menus:power" = 6
"menus:screenshot" = 4
"menus:clock" = 4
"menus:dashboard" = 1
"menus:dash" = 20
"menus:estrategia" = 24
websearch = 8

[[providers.prefixes]]
prefix = "!todo"
provider = "menus:todo"

[[providers.prefixes]]
prefix = "!"
provider = "menus:dash"

[[providers.prefixes]]
prefix = ";"
provider = "providerlist"

[[providers.prefixes]]
prefix = ">"
provider = "runner"

[[providers.prefixes]]
prefix = "/"
provider = "files"

[[providers.prefixes]]
prefix = "="
provider = "calc"

[[providers.prefixes]]
prefix = "@"
provider = "websearch"

[[providers.prefixes]]
prefix = ":"
provider = "clipboard"

[[providers.prefixes]]
prefix = "e:"
provider = "symbols"

[[providers.prefixes]]
prefix = "u:"
provider = "unicode"

[[providers.prefixes]]
prefix = "w:"
provider = "windows"

[[providers.prefixes]]
prefix = "}"
provider = "menus:estrategia"

[[providers.prefixes]]
prefix = "b:"
provider = "bookmarks"

[[providers.prefixes]]
prefix = "vol:"
provider = "wireplumber"

[[providers.prefixes]]
prefix = "m:"
provider = "playerctl"

[providers.clipboard]
time_format = "relative"

[providers.actions]
dmenu = [
  { action = "select", label = "connect", default = true, bind = "Return" },
]

desktopapplications = [
  { action = "start", default = true, bind = "Return", label = "open", after = "Close" },
  { action = "start:keep", bind = "shift Return", label = "open+next", after = "KeepOpen" },
  { action = "pin", bind = "ctrl p", label = "pin", after = "AsyncReload" },
  { action = "unpin", bind = "ctrl p", after = "AsyncReload" },
]

"menus:dash" = [
  { action = "activate", default = true, bind = "Return", label = "open", after = "Close" },
]

"menus:dashboard" = [
  { action = "activate", default = true, bind = "Return", label = "open", after = "Close" },
]

"menus:estrategia" = [
  { action = "open", default = true, bind = "Return", label = "entrar", after = "AsyncClearReload" },
  { action = "activate", bind = "Return", label = "abrir", after = "Close" },
  { action = "back", bind = "Escape", label = "voltar", after = "AsyncClearReload" },
]

files = [
  { action = "open", default = true, bind = "Return", label = "abrir", after = "Close" },
  { action = "copypath", bind = "ctrl c", label = "copiar path", after = "Close" },
]

"menus:power" = [
  { action = "activate", default = true, bind = "Return", label = "run", after = "Close" },
]

"menus:screenshot" = [
  { action = "activate", default = true, bind = "Return", after = "Close" },
]

"menus:clock" = [
  { action = "activate", default = true, bind = "Return", label = "run", after = "Close" },
]

"menus:wifi" = [
  { action = "connect", default = true, bind = "Return", label = "connect", after = "Close" },
  { action = "activate", bind = "Return", label = "run", after = "AsyncReload" },
  { action = "ask", bind = "ctrl a", label = "senha", after = "Close" },
  { action = "rescan", global = true, bind = "ctrl f", label = "rescan", after = "AsyncClearReload" },
]

clipboard = [
  { action = "copy", default = true, bind = "Return", label = "copy", after = "Close" },
  { action = "remove", bind = "ctrl d", after = "AsyncClearReload" },
  { action = "remove_all", label = "clear", bind = "ctrl shift d", after = "AsyncClearReload" },
  { action = "show_images_only", label = "only images", bind = "ctrl i", after = "AsyncClearReload" },
  { action = "show_text_only", label = "only text", bind = "ctrl i", after = "AsyncClearReload" },
  { action = "show_combined", label = "show all", bind = "ctrl i", after = "AsyncClearReload" },
  { action = "pause", bind = "ctrl shift p" },
  { action = "unpause", bind = "ctrl shift p" },
  { action = "unpin", bind = "ctrl p", after = "AsyncClearReload" },
  { action = "pin", bind = "ctrl p", after = "AsyncClearReload" },
  { action = "edit", bind = "ctrl o" },
]

wireplumber = [
  { action = "set_default_device", default = true, bind = "Return", label = "padrão", after = "Close" },
  { action = "increase_volume", bind = "plus", label = "vol+", after = "Nothing" },
  { action = "increase_volume", bind = "equal", label = "vol+", after = "Nothing" },
  { action = "decrease_volume", bind = "minus", label = "vol-", after = "Nothing" },
  { action = "increase_volume", bind = "ctrl Up", label = "vol+", after = "Nothing" },
  { action = "decrease_volume", bind = "ctrl Down", label = "vol-", after = "Nothing" },
  { action = "mute", bind = "ctrl m", label = "mute", after = "Nothing" },
  { action = "unmute", bind = "ctrl m", label = "mute", after = "Nothing" },
]
